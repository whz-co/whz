<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakhourani | Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2070') center/cover;
            opacity: 0.1;
            animation: zoom 20s infinite alternate;
        }
        
        @keyframes zoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.3);
            padding: 50px;
            width: 100%;
            max-width: 550px;
            animation: slideUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo i {
            font-size: 60px;
            color: #3498db;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .logo h1 {
            font-size: 36px;
            background: linear-gradient(45deg, #2c3e50, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 10px;
        }
        
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 15px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-icon {
            position: absolute;
            left: 15px;
            color: #999;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s;
            background: white;
        }
        
        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }
        
        input:focus + .input-icon {
            color: #3498db;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }
        
        .password-toggle:hover {
            color: #3498db;
        }
        
        .strength-meter {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .strength-bars {
            display: flex;
            gap: 5px;
            flex: 1;
        }
        
        .strength-bar {
            height: 6px;
            flex: 1;
            background: #e0e0e0;
            border-radius: 3px;
            transition: all 0.3s;
        }
        
        .strength-bar.active:nth-child(1) { background: #e74c3c; }
        .strength-bar.active:nth-child(2) { background: #f39c12; }
        .strength-bar.active:nth-child(3) { background: #f1c40f; }
        .strength-bar.active:nth-child(4) { background: #2ecc71; }
        
        .strength-text {
            font-size: 14px;
            font-weight: 600;
            min-width: 80px;
        }
        
        .validation-feedback {
            font-size: 13px;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .valid-feedback {
            color: #27ae60;
        }
        
        .invalid-feedback {
            color: #e74c3c;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-google, .btn-github {
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .btn-google:hover {
            border-color: #db4437;
            color: #db4437;
            transform: translateY(-3px);
        }
        
        .btn-github:hover {
            border-color: #333;
            color: #333;
            transform: translateY(-3px);
        }
        
        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
            color: #666;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ddd, transparent);
        }
        
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        
        .alert {
            padding: 16px 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .alert-error {
            background: #fde8e8;
            color: #c53030;
            border: 2px solid #fed7d7;
        }
        
        .alert-success {
            background: #e6fffa;
            color: #234e52;
            border: 2px solid #b2f5ea;
        }
        
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .terms-group {
            margin: 20px 0;
        }
        
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3498db;
        }
        
        .checkbox-wrapper label {
            margin-bottom: 0;
            cursor: pointer;
        }
        
        .terms-link {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
        
        .terms-link:hover {
            text-decoration: underline;
        }
        
        .links {
            text-align: center;
            margin-top: 30px;
        }
        
        .links a {
            color: #3498db;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .links a:hover {
            color: #2980b9;
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h2 { font-size: 28px; }
            .btn { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <h1>Zakhourani</h1>
        </div>
        
        <h2>Create Account</h2>
        <p class="subtitle">Join thousands of learners mastering English</p>
        
        <div id="alert" class="alert">
            <i class="fas fa-exclamation-circle"></i>
            <span id="alertMessage"></span>
        </div>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="name"><i class="fas fa-user-circle"></i> Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="name" name="name" placeholder="Dr. Waleed Hussien Zakhourani" required autocomplete="name">
                </div>
                <div id="nameFeedback" class="validation-feedback"></div>
            </div>
            
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email">
                </div>
                <div id="emailFeedback" class="validation-feedback"></div>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="6" autocomplete="new-password">
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                </div>
                <div class="strength-meter">
                    <div class="strength-bars" id="strengthBars">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                    <span class="strength-text" id="strengthText">Enter password</span>
                </div>
                <div id="passwordFeedback" class="validation-feedback"></div>
                <div style="font-size: 13px; color: #666; margin-top: 8px;">
                    <i class="fas fa-info-circle"></i> Minimum 6 characters with at least 1 number and 1 letter
                </div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required autocomplete="new-password">
                    <i class="fas fa-eye password-toggle" id="toggleConfirmPassword"></i>
                </div>
                <div id="confirmPasswordFeedback" class="validation-feedback"></div>
            </div>
            
            <div class="terms-group">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a></label>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" id="submitBtn">
                <div class="spinner" id="submitSpinner"></div>
                <span id="submitText"><i class="fas fa-user-plus"></i> Create Account</span>
            </button>
        </form>
        
        <div class="divider">or sign up with</div>
        
        <button id="googleSignup" class="btn btn-google">
            <i class="fab fa-google"></i> Continue with Google
        </button>
        
        <button id="githubSignup" class="btn btn-github">
            <i class="fab fa-github"></i> Continue with GitHub
        </button>
        
        <div class="links">
            <p style="margin-bottom: 10px;">
                <i class="fas fa-sign-in-alt"></i> Already have an account? 
                <a href="login.html">Login here</a>
            </p>
            <p>
                <i class="fas fa-home"></i> 
                <a href="index.html">Back to Home</a>
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // ==============================================
        // FIREBASE CONFIGURATION
        // ==============================================
        const firebaseConfig = {
            apiKey: "AIzaSyAE8wf24HXrfmpMluaFOv1OHPrf_YFfqTQ",
            authDomain: "www.whzco.com",
            projectId: "whaai-c388e",
            storageBucket: "whaai-c388e.firebasestorage.app",
            messagingSenderId: "640598205524",
            appId: "1:640598205524:web:c975f5e8b371b1043e39c1",
            measurementId: "G-1MHE0JBZJR"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log('✅ Firebase initialized');
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // DOM Elements
        const signupForm = document.getElementById('signupForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const termsCheckbox = document.getElementById('terms');
        const submitBtn = document.getElementById('submitBtn');
        const submitSpinner = document.getElementById('submitSpinner');
        const submitText = document.getElementById('submitText');
        const alertDiv = document.getElementById('alert');
        const alertMessage = document.getElementById('alertMessage');
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');

        // Helper Functions
        function showAlert(message, type = 'error') {
            alertMessage.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'flex';
            alertDiv.style.alignItems = 'center';
            alertDiv.style.gap = '10px';
            if (type === 'success') {
                setTimeout(() => alertDiv.style.display = 'none', 5000);
            }
        }

        function hideAlert() {
            alertDiv.style.display = 'none';
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitSpinner.style.display = isLoading ? 'inline-block' : 'none';
            submitText.innerHTML = isLoading ? 'Creating Account...' : '<i class="fas fa-user-plus"></i> Create Account';
        }

        // Password Strength
        function checkPasswordStrength(password) {
            const strengthBars = document.querySelectorAll('.strength-bar');
            const strengthText = document.getElementById('strengthText');
            strengthBars.forEach(bar => bar.classList.remove('active'));
            
            if (!password) {
                strengthText.textContent = 'Enter password';
                return;
            }
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            strength = Math.min(strength, 4);
            
            for (let i = 0; i < strength; i++) strengthBars[i].classList.add('active');
            
            const texts = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
            const colors = ['#e74c3c', '#e74c3c', '#f39c12', '#f1c40f', '#27ae60'];
            strengthText.textContent = texts[strength];
            strengthText.style.color = colors[strength];
        }

        // Validations
        nameInput.addEventListener('input', function() {
            const feedback = document.getElementById('nameFeedback');
            if (this.value.trim().length < 2) {
                feedback.innerHTML = '<i class="fas fa-times-circle invalid-feedback"></i> Name must be at least 2 characters';
                this.style.borderColor = '#e74c3c';
            } else {
                feedback.innerHTML = '<i class="fas fa-check-circle valid-feedback"></i> Looks good!';
                this.style.borderColor = '#27ae60';
            }
        });

        emailInput.addEventListener('input', function() {
            const feedback = document.getElementById('emailFeedback');
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(this.value)) {
                feedback.innerHTML = '<i class="fas fa-times-circle invalid-feedback"></i> Enter a valid email';
                this.style.borderColor = '#e74c3c';
            } else {
                feedback.innerHTML = '<i class="fas fa-check-circle valid-feedback"></i> Valid email';
                this.style.borderColor = '#27ae60';
            }
        });

        passwordInput.addEventListener('input', function() {
            checkPasswordStrength(this.value);
            const feedback = document.getElementById('passwordFeedback');
            const hasLetter = /[a-zA-Z]/.test(this.value);
            const hasNumber = /[0-9]/.test(this.value);
            
            if (this.value.length < 6) {
                feedback.innerHTML = '<i class="fas fa-times-circle invalid-feedback"></i> Minimum 6 characters';
                this.style.borderColor = '#e74c3c';
            } else if (!hasLetter || !hasNumber) {
                feedback.innerHTML = '<i class="fas fa-times-circle invalid-feedback"></i> Include 1 letter and 1 number';
                this.style.borderColor = '#e74c3c';
            } else {
                feedback.innerHTML = '<i class="fas fa-check-circle valid-feedback"></i> Strong password';
                this.style.borderColor = '#27ae60';
            }
            if (confirmPasswordInput.value) validateConfirmPassword();
        });

        function validateConfirmPassword() {
            const feedback = document.getElementById('confirmPasswordFeedback');
            if (passwordInput.value !== confirmPasswordInput.value) {
                feedback.innerHTML = '<i class="fas fa-times-circle invalid-feedback"></i> Passwords do not match';
                confirmPasswordInput.style.borderColor = '#e74c3c';
                return false;
            } else if (confirmPasswordInput.value) {
                feedback.innerHTML = '<i class="fas fa-check-circle valid-feedback"></i> Passwords match';
                confirmPasswordInput.style.borderColor = '#27ae60';
                return true;
            }
            return false;
        }

        confirmPasswordInput.addEventListener('input', validateConfirmPassword);

        // Password Toggle
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            togglePassword.className = type === 'password' ? 'fas fa-eye password-toggle' : 'fas fa-eye-slash password-toggle';
        });
        
        toggleConfirmPassword.addEventListener('click', () => {
            const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
            confirmPasswordInput.type = type;
            toggleConfirmPassword.className = type === 'password' ? 'fas fa-eye password-toggle' : 'fas fa-eye-slash password-toggle';
        });

        // Save User to Firestore
        async function saveUserToFirestore(user, provider = 'email') {
            try {
                await db.collection('users').doc(user.uid).set({
                    uid: user.uid,
                    email: user.email,
                    displayName: user.displayName || user.email.split('@')[0],
                    photoURL: user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || user.email)}&size=200&background=3498db&color=fff&bold=true`,
                    provider: provider,
                    emailVerified: user.emailVerified || false,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                return true;
            } catch (error) {
                console.error('Firestore error:', error);
                return false;
            }
        }

        // Email Signup
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();
            
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            
            if (name.length < 2) return showAlert('Please enter your full name');
            if (!emailRegex.test(email)) return showAlert('Enter a valid email');
            if (password.length < 6) return showAlert('Password must be at least 6 characters');
            if (!hasLetter || !hasNumber) return showAlert('Password must include 1 letter and 1 number');
            if (password !== confirmPasswordInput.value) return showAlert('Passwords do not match');
            if (!termsCheckbox.checked) return showAlert('Accept Terms of Service');
            
            setLoading(true);
            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                await userCredential.user.updateProfile({ displayName: name });
                await saveUserToFirestore(userCredential.user, 'email');
                showAlert('✅ Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } catch (error) {
                let msg = 'Signup failed: ';
                if (error.code === 'auth/email-already-in-use') msg += 'Email already registered';
                else if (error.code === 'auth/weak-password') msg += 'Password too weak';
                else msg += error.message;
                showAlert(msg);
            } finally {
                setLoading(false);
            }
        });

        // Google Signup
        document.getElementById('googleSignup').addEventListener('click', async () => {
            setLoading(true);
            submitBtn.disabled = true;
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const userCredential = await auth.signInWithPopup(provider);
                await saveUserToFirestore(userCredential.user, 'google');
                window.location.href = 'index.html';
            } catch (error) {
                if (error.code === 'auth/unauthorized-domain') {
                    showAlert('Google signup failed: Domain not authorized. Please add www.whzco.com to Firebase authorized domains.');
                } else {
                    showAlert('Google signup failed: ' + error.message);
                }
                setLoading(false);
                submitBtn.disabled = false;
            }
        });

        // GitHub Signup
        document.getElementById('githubSignup').addEventListener('click', async () => {
            setLoading(true);
            submitBtn.disabled = true;
            try {
                const provider = new firebase.auth.GithubAuthProvider();
                const userCredential = await auth.signInWithPopup(provider);
                await saveUserToFirestore(userCredential.user, 'github');
                window.location.href = 'index.html';
            } catch (error) {
                if (error.code === 'auth/unauthorized-domain') {
                    showAlert('GitHub signup failed: Domain not authorized. Please add www.whzco.com to Firebase authorized domains.');
                } else {
                    showAlert('GitHub signup failed: ' + error.message);
                }
                setLoading(false);
                submitBtn.disabled = false;
            }
        });

        // Auto-redirect if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) window.location.href = 'index.html';
        });

        console.log('✅ Signup page ready | Domain:', window.location.hostname);
    </script>
</body>
</html>
