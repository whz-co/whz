<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zakhourani AI - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.95);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.06);
            --gradient-main: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
            --gradient-critical: linear-gradient(135deg, #dc2626, #ef4444);
        }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Loading Screen */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }
        
        .loader-overlay.hidden {
            display: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .loader-text {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .loader-bar {
            width: 300px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .loader-bar-fill {
            height: 100%;
            background: var(--gradient-main);
            width: 0%;
            transition: width 0.3s;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo {
            width: 48px;
            height: 48px;
            background: var(--gradient-main);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3);
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        
        .badge-success {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }
        
        .badge-warning {
            background: rgba(234, 179, 8, 0.15);
            color: var(--warning);
        }
        
        .badge-info {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-light);
        }
        
        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .btn-primary {
            background: var(--gradient-main);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: rgba(30, 41, 59, 0.6);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #22c55e, #06b6d4);
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.3);
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 22px;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-main);
            opacity: 0.5;
        }
        
        .stat-card.danger::before {
            background: var(--gradient-critical);
            opacity: 1;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .stat-card .label {
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card .value {
            font-size: 28px;
            font-weight: 800;
            margin: 4px 0 2px;
        }
        
        .stat-card .value.danger {
            color: var(--danger);
        }
        
        .stat-card .sub {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .stat-card .icon {
            position: absolute;
            right: 16px;
            top: 16px;
            font-size: 28px;
            opacity: 0.08;
        }
        
        /* Table List */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        
        .table-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 22px;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .table-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.1);
        }
        
        .table-card .name {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .table-card .name i {
            color: var(--accent);
        }
        
        .table-card .info {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 6px;
        }
        
        .table-card .info span {
            margin-right: 16px;
        }
        
        .table-card .status {
            margin-top: 10px;
            font-size: 12px;
        }
        
        /* Data Viewer */
        .viewer {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            backdrop-filter: blur(12px);
            margin-bottom: 24px;
        }
        
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .viewer-header h3 {
            font-size: 16px;
            font-weight: 700;
        }
        
        .viewer-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .viewer-controls select,
        .viewer-controls input {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 14px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }
        
        .viewer-controls select:focus,
        .viewer-controls input:focus {
            border-color: var(--accent);
        }
        
        .table-wrap {
            overflow-x: auto;
            max-height: 480px;
            overflow-y: auto;
        }
        
        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .table-wrap th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 10;
            border-bottom: 2px solid var(--border);
        }
        
        .table-wrap td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .table-wrap tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .null {
            color: var(--text-secondary);
            font-style: italic;
        }
        
        .bool {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .bool.true {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
        }
        
        .bool.false {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 32px;
            display: block;
            margin-bottom: 12px;
        }
        
        .record-count {
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* Schema Viewer */
        .schema-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            backdrop-filter: blur(12px);
        }
        
        .schema-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .schema-header h3 {
            font-size: 16px;
            font-weight: 700;
        }
        
        .schema-grid {
            display: grid;
            gap: 10px;
        }
        
        .schema-item {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 12px;
            align-items: center;
        }
        
        .schema-item .col {
            font-weight: 600;
            color: var(--accent-light);
        }
        
        .schema-item .type {
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        .schema-item .tag {
            font-size: 10px;
            font-weight: 600;
        }
        
        .tag-pk {
            color: var(--warning);
        }
        
        .tag-fk {
            color: var(--accent);
        }
        
        .alert {
            padding: 12px 18px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: none;
        }
        
        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #86efac;
        }
        
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        
        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        
        .hidden {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .table-grid {
                grid-template-columns: 1fr;
            }
            .schema-item {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            .header h1 {
                font-size: 20px;
            }
        }
        
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">Connecting to Supabase...</div>
        <div class="loader-bar">
            <div class="loader-bar-fill" id="loaderBar"></div>
        </div>
        <div class="loader-text" style="font-size:12px;color:var(--text-secondary);" id="loaderDetail">Initializing...</div>
    </div>

    <!-- Main Dashboard -->
    <div class="container" id="dashboard" style="display:none;">

        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="logo"><i class="fas fa-brain"></i></div>
                <div>
                    <h1>Zakhourani AI</h1>
                    <div class="header-subtitle">
                        <i class="fas fa-database"></i> Supabase Dashboard
                        <span class="badge badge-success" id="statusBadge"><i class="fas fa-check-circle"></i> Connected</span>
                    </div>
                </div>
            </div>
            <div>
                <button class="btn btn-secondary" onclick="refreshAll()"><i class="fas fa-sync"></i> Refresh</button>
                <button class="btn btn-primary" onclick="exportData()"><i class="fas fa-download"></i> Export</button>
            </div>
        </div>

        <!-- Alert -->
        <div id="alert" class="alert"></div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="icon"><i class="fas fa-table"></i></div>
                <div class="label">Tables</div>
                <div class="value" id="statTables">0</div>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fas fa-database"></i></div>
                <div class="label">Total Records</div>
                <div class="value" id="statRecords">0</div>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fas fa-columns"></i></div>
                <div class="label">Columns</div>
                <div class="value" id="statColumns">0</div>
            </div>
            <div class="stat-card">
                <div class="icon"><i class="fas fa-clock"></i></div>
                <div class="label">Last Updated</div>
                <div class="value" id="statUpdated" style="font-size:18px;">-</div>
            </div>
        </div>

        <!-- Table List -->
        <div class="section-title"><i class="fas fa-list"></i> Tables</div>
        <div class="table-grid" id="tableGrid"></div>

        <!-- Data Viewer -->
        <div class="viewer">
            <div class="viewer-header">
                <h3><i class="fas fa-eye"></i> <span id="viewerTitle">Table Data</span></h3>
                <div class="viewer-controls">
                    <select id="tableSelect" onchange="loadTableData()">
                        <option value="">Select a table...</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search..." oninput="searchData()" />
                    <button class="btn btn-secondary" onclick="loadTableData()" style="padding:6px 14px;font-size:11px;">
                        <i class="fas fa-sync"></i> Load
                    </button>
                </div>
            </div>
            <div class="table-wrap" id="dataWrapper">
                <div class="empty-state">
                    <i class="fas fa-hand-pointer"></i>
                    Select a table to view data
                </div>
            </div>
            <div class="record-count" id="recordCount">-</div>
        </div>

        <!-- Schema -->
        <div class="schema-section">
            <div class="schema-header">
                <h3><i class="fas fa-code"></i> Schema</h3>
                <button class="btn btn-secondary" onclick="toggleSchema()" style="padding:6px 14px;font-size:11px;">
                    <i class="fas fa-chevron-down"></i> Toggle
                </button>
            </div>
            <div id="schemaContent">
                <div class="empty-state">Loading schema...</div>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://wkgldyfxsmkjyalrldtq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZ2xkeWZ4c21ranlhbGxyZHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTg0OTQsImV4cCI6MjA5MjkzNDQ5NH0.WgXSHB6teuUiEKYgeR2ADAK-8A_6VnbEl-wv0RSuxjA';

        // ============================================================
        // STATE
        // ============================================================
        let client = null;
        let tables = [];
        let dataCache = {};
        let schemas = {};
        let currentTable = '';
        let searchTerm = '';

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            try {
                updateLoader('Connecting to Supabase...', 10);
                client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                updateLoader('Fetching tables...', 30);
                await discoverTables();

                updateLoader('Loading schema...', 60);
                await loadSchemas();

                updateLoader('Loading data...', 80);
                await loadCounts();

                updateLoader('Ready!', 100);
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('dashboard').style.display = 'block';
                    renderAll();
                    showAlert('✅ Connected successfully!', 'success');
                }, 400);

            } catch (err) {
                console.error('Init error:', err);
                document.getElementById('loaderText').textContent = '❌ Connection failed';
                document.getElementById('loaderDetail').textContent = err.message || 'Check your credentials';
                document.getElementById('statusBadge').className = 'badge badge-danger';
                document.getElementById('statusBadge').innerHTML = '<i class="fas fa-times-circle"></i> Error';
                showAlert('❌ Failed to connect: ' + (err.message || 'Unknown error'), 'error');

                // Fallback
                tables = ['users', 'daily_usage', 'transactions', 'questions'];
                await loadSchemas();
                await loadCounts();
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('dashboard').style.display = 'block';
                    renderAll();
                }, 1000);
            }
        }

        // ============================================================
        // DISCOVER TABLES
        // ============================================================
        async function discoverTables() {
            try {
                const { data, error } = await client
                    .from('information_schema.tables')
                    .select('table_name')
                    .eq('table_schema', 'public')
                    .eq('table_type', 'BASE TABLE');

                if (!error && data && data.length > 0) {
                    tables = data.map(t => t.table_name)
                        .filter(t => !t.startsWith('_') && !t.startsWith('pg_'));
                    return;
                }
            } catch (e) {}

            // Fallback
            const common = ['users', 'daily_usage', 'transactions', 'questions'];
            const found = [];
            for (const t of common) {
                try {
                    const { error } = await client.from(t).select('count', { count: 'exact', head: true });
                    if (!error || error.code !== '42P01') found.push(t);
                } catch (e) {}
            }
            tables = found.length ? found : common;
        }

        // ============================================================
        // LOAD SCHEMAS
        // ============================================================
        async function loadSchemas() {
            for (const table of tables) {
                try {
                    const { data, error } = await client.from(table).select('*').limit(1);
                    if (error) {
                        schemas[table] = { error: error.message, columns: [] };
                        continue;
                    }
                    if (data && data.length > 0) {
                        const cols = Object.keys(data[0]).map(k => ({
                            name: k,
                            type: typeof data[0][k],
                            sample: data[0][k],
                            nullable: data[0][k] === null
                        }));
                        schemas[table] = { columns: cols, sample: data[0] };
                    } else {
                        schemas[table] = { columns: [], sample: null };
                    }
                } catch (e) {
                    schemas[table] = { error: e.message, columns: [] };
                }
            }
        }

        // ============================================================
        // LOAD COUNTS
        // ============================================================
        async function loadCounts() {
            for (const table of tables) {
                try {
                    const { count, error } = await client
                        .from(table)
                        .select('*', { count: 'exact', head: true });
                    dataCache[table] = { count: count || 0, loaded: false };
                } catch (e) {
                    dataCache[table] = { count: 0, loaded: false };
                }
            }
        }

        // ============================================================
        // LOAD TABLE DATA
        // ============================================================
        async function loadTableData() {
            const table = document.getElementById('tableSelect').value;
            if (!table) return;

            currentTable = table;
            document.getElementById('viewerTitle').textContent = 'Table: ' + table;

            try {
                const { data, error } = await client.from(table).select('*').limit(100);
                if (error) throw error;

                dataCache[table].data = data || [];
                dataCache[table].loaded = true;

                renderData(table, data || []);
                document.getElementById('recordCount').textContent =
                    `Showing ${(data || []).length} of ${dataCache[table].count || '?'} records`;

            } catch (err) {
                showAlert('❌ Error loading table: ' + err.message, 'error');
                document.getElementById('dataWrapper').innerHTML =
                    `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i>Error: ${err.message}</div>`;
            }
        }

        // ============================================================
        // RENDER DATA
        // ============================================================
        function renderData(table, data) {
            const wrap = document.getElementById('dataWrapper');

            if (!data || data.length === 0) {
                wrap.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i>No data in "${table}"</div>`;
                return;
            }

            const cols = Object.keys(data[0]);
            const search = searchTerm.toLowerCase();

            let filtered = data;
            if (search) {
                filtered = data.filter(row =>
                    Object.values(row).some(v => String(v).toLowerCase().includes(search))
                );
            }

            let html = '<table><thead><tr>';
            cols.forEach(c => html += `<th>${c}</th>`);
            html += '</tr></thead><tbody>';

            filtered.forEach(row => {
                html += '<tr>';
                cols.forEach(c => {
                    const v = row[c];
                    let display = '';
                    if (v === null || v === undefined) {
                        display = '<span class="null">null</span>';
                    } else if (typeof v === 'boolean') {
                        display = `<span class="bool ${v}">${v}</span>`;
                    } else if (v instanceof Date || (typeof v === 'object' && v !== null && v.toISOString)) {
                        display = new Date(v).toLocaleString();
                    } else if (typeof v === 'object') {
                        display = JSON.stringify(v).substring(0, 40) + (JSON.stringify(v).length > 40 ? '...' : '');
                    } else {
                        display = String(v);
                        if (display.length > 50) display = display.substring(0, 50) + '...';
                    }
                    html += `<td title="${String(v)}">${display}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';

            if (filtered.length === 0 && search) {
                html = `<div class="empty-state"><i class="fas fa-search"></i>No results for "${search}"</div>`;
            }

            wrap.innerHTML = html;
        }

        // ============================================================
        // SEARCH
        // ============================================================
        function searchData() {
            searchTerm = document.getElementById('searchInput').value;
            if (currentTable && dataCache[currentTable]?.data) {
                renderData(currentTable, dataCache[currentTable].data);
            }
        }

        // ============================================================
        // RENDER ALL
        // ============================================================
        function renderAll() {
            renderTables();
            renderSchema();
            updateStats();

            const sel = document.getElementById('tableSelect');
            sel.innerHTML = '<option value="">Select a table...</option>' +
                tables.map(t =>
                    `<option value="${t}">${t} (${dataCache[t]?.count || 0})</option>`
                ).join('');

            if (tables.length > 0) {
                sel.value = tables[0];
                loadTableData();
            }
        }

        // ============================================================
        // RENDER TABLES
        // ============================================================
        function renderTables() {
            const grid = document.getElementById('tableGrid');

            if (tables.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">No tables found</div>`;
                return;
            }

            grid.innerHTML = tables.map(t => {
                const count = dataCache[t]?.count || 0;
                const schema = schemas[t];
                const cols = schema?.columns?.length || 0;
                const hasErr = schema?.error;

                let status = 'badge-success';
                let statusText = 'Active';
                if (hasErr) { status = 'badge-danger';
                    statusText = 'Error'; } else if (count === 0) { status = 'badge-warning';
                    statusText = 'Empty'; }

                const preview = schema?.columns?.slice(0, 3).map(c => c.name).join(', ') || '';

                return `<div class="table-card" onclick="selectTable('${t}')">
                    <div class="name"><i class="fas fa-table"></i> ${t}</div>
                    <div class="info">
                        <span><i class="fas fa-database"></i> ${count.toLocaleString()} records</span>
                        <span><i class="fas fa-columns"></i> ${cols} columns</span>
                    </div>
                    <div class="status">
                        <span class="badge ${status}">${statusText}</span>
                        ${preview ? `<span style="margin-left:10px;font-size:11px;color:var(--text-secondary);">${preview}</span>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // ============================================================
        // RENDER SCHEMA
        // ============================================================
        function renderSchema() {
            const content = document.getElementById('schemaContent');

            if (tables.length === 0) {
                content.innerHTML = `<div class="empty-state">No tables found</div>`;
                return;
            }

            let html = '';
            for (const table of tables) {
                const schema = schemas[table];
                const count = dataCache[table]?.count || 0;

                html += `<div style="margin-bottom:16px;">
                    <div style="font-weight:600;font-size:15px;color:var(--accent-light);margin-bottom:8px;">
                        <i class="fas fa-table"></i> ${table}
                        <span style="font-size:12px;color:var(--text-secondary);font-weight:400;margin-left:8px;">
                            (${count.toLocaleString()} records)
                        </span>
                    </div>`;

                if (schema?.error) {
                    html += `<div style="color:var(--danger);font-size:12px;padding:8px;background:rgba(239,68,68,0.05);border-radius:8px;">
                        Error: ${schema.error}
                    </div>`;
                } else if (schema?.columns && schema.columns.length > 0) {
                    html += '<div class="schema-grid">';
                    schema.columns.forEach(col => {
                        const isPK = ['id', 'uid', 'user_id'].includes(col.name);
                        const isFK = col.name.includes('_id') && col.name !== 'id';
                        html += `<div class="schema-item">
                            <span class="col">${col.name}</span>
                            <span class="type">${col.type}${col.nullable ? ' (nullable)' : ''}</span>
                            <span>
                                ${isPK ? '<span class="tag tag-pk">🔑 PK</span>' : ''}
                                ${isFK ? '<span class="tag tag-fk">🔗 FK</span>' : ''}
                                ${col.sample !== undefined && col.sample !== null ? 
                                    `<span style="font-size:10px;color:var(--text-secondary);">sample: ${String(col.sample).substring(0,20)}</span>` : ''}
                            </span>
                        </div>`;
                    });
                    html += '</div>';
                } else {
                    html += `<div style="color:var(--text-secondary);font-size:12px;padding:8px;">No schema info</div>`;
                }

                html += '</div>';
            }

            content.innerHTML = html;
        }

        // ============================================================
        // UPDATE STATS
        // ============================================================
        function updateStats() {
            const totalTables = tables.length;
            const totalRecords = Object.values(dataCache).reduce((s, d) => s + (d.count || 0), 0);
            const totalColumns = Object.values(schemas).reduce((s, sch) => s + (sch?.columns?.length || 0), 0);

            document.getElementById('statTables').textContent = totalTables;
            document.getElementById('statRecords').textContent = totalRecords.toLocaleString();
            document.getElementById('statColumns').textContent = totalColumns;
            document.getElementById('statUpdated').textContent = new Date().toLocaleString();
        }

        // ============================================================
        // UI HELPERS
        // ============================================================
        function updateLoader(text, progress) {
            document.getElementById('loaderText').textContent = text;
            document.getElementById('loaderBar').style.width = progress + '%';
            const detail = document.getElementById('loaderDetail');
            if (progress < 30) detail.textContent = 'Connecting...';
            else if (progress < 60) detail.textContent = 'Loading data...';
            else if (progress < 90) detail.textContent = 'Processing...';
            else detail.textContent = 'Ready!';
        }

        function selectTable(table) {
            document.getElementById('tableSelect').value = table;
            loadTableData();
            document.getElementById('dataWrapper').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleSchema() {
            const content = document.getElementById('schemaContent');
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
        }

        function showAlert(msg, type = 'info') {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = `alert alert-${type}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function refreshAll() {
            showAlert('🔄 Refreshing...', 'info');
            loadSchemas();
            loadCounts();
            setTimeout(() => {
                renderAll();
                showAlert('✅ Refreshed!', 'success');
            }, 800);
        }

        function exportData() {
            const data = {
                generated: new Date().toISOString(),
                tables: tables.map(t => ({
                    name: t,
                    count: dataCache[t]?.count || 0,
                    schema: schemas[t]?.columns || []
                }))
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `zakhourani-export-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showAlert('📥 Exported!', 'success');
        }

        // ============================================================
        // START
        // ============================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
