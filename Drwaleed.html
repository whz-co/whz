<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIboard - Supabase Data Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        :root {
            --bg-primary:#0a0e1a; --bg-secondary:#111827; --bg-card:rgba(17,24,39,0.95);
            --text-primary:#f1f5f9; --text-secondary:#94a3b8; --accent:#3b82f6;
            --accent-light:#60a5fa; --success:#22c55e; --warning:#eab308; --danger:#ef4444;
            --border:rgba(255,255,255,0.06);
            --gradient-main:linear-gradient(135deg,#3b82f6,#8b5cf6,#06b6d4);
        }
        body { background:var(--bg-primary); color:var(--text-primary); min-height:100vh; padding:16px; }
        .container { max-width:1600px; margin:0 auto; }

        /* Loading */
        .loading-screen {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:var(--bg-primary); display:flex; align-items:center; justify-content:center;
            z-index:9999; flex-direction:column; gap:20px;
        }
        .loading-screen.hidden { display:none; }
        .loader { width:50px; height:50px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading-text { color:var(--text-secondary); font-size:14px; }
        .loading-progress { width:400px; max-width:80%; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
        .loading-progress-bar { height:100%; background:var(--gradient-main); width:0%; transition:width 0.5s; }

        /* Header */
        .header {
            display:flex; justify-content:space-between; align-items:center; padding:16px 0 28px; flex-wrap:wrap; gap:16px;
        }
        .header-left { display:flex; align-items:center; gap:16px; }
        .logo {
            width:52px; height:52px; background:var(--gradient-main); border-radius:16px;
            display:flex; align-items:center; justify-content:center; font-size:24px; color:white;
            box-shadow:0 8px 30px rgba(59,130,246,0.3);
        }
        .header h1 { font-size:28px; font-weight:800; background:var(--gradient-main); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header-subtitle { color:var(--text-secondary); font-size:13px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .status-badge {
            padding:3px 12px; border-radius:20px; font-size:11px; font-weight:600;
            background:rgba(34,197,94,0.15); color:var(--success);
        }
        .status-badge.error { background:rgba(239,68,68,0.15); color:var(--danger); }

        .btn {
            padding:10px 20px; border:none; border-radius:12px; font-weight:600; cursor:pointer;
            transition:all 0.3s; display:inline-flex; align-items:center; gap:8px; font-size:13px;
        }
        .btn-primary { background:var(--gradient-main); color:white; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(59,130,246,0.3); }
        .btn-secondary { background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border); }
        .btn-secondary:hover { background:rgba(30,41,59,0.6); }
        .btn-success { background:linear-gradient(135deg,#22c55e,#06b6d4); color:white; }
        .btn-danger { background:linear-gradient(135deg,#dc2626,#ef4444); color:white; }

        /* Stats Grid */
        .stats-grid {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px;
        }
        .stat-card {
            background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:20px 24px;
            backdrop-filter:blur(12px); transition:all 0.3s; position:relative; overflow:hidden;
        }
        .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--gradient-main); opacity:0.5; }
        .stat-card .label { color:var(--text-secondary); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }
        .stat-card .value { font-size:30px; font-weight:800; margin:6px 0 2px; }
        .stat-card .icon-bg { position:absolute; right:16px; top:16px; font-size:32px; opacity:0.08; }

        /* Table List */
        .table-list {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin-bottom:24px;
        }
        .table-card {
            background:var(--bg-card); border:1px solid var(--border); border-radius:20px;
            padding:20px 24px; backdrop-filter:blur(12px); transition:all 0.3s; cursor:pointer;
        }
        .table-card:hover { transform:translateY(-4px); border-color:var(--accent); }
        .table-card .table-name { font-size:18px; font-weight:700; display:flex; align-items:center; gap:12px; }
        .table-card .table-name i { color:var(--accent); }
        .table-card .table-count { color:var(--text-secondary); font-size:13px; margin-top:4px; }
        .table-card .table-status { font-size:12px; margin-top:8px; }
        .table-card .table-status .badge { padding:2px 12px; border-radius:12px; font-size:11px; font-weight:600; }
        .badge-success { background:rgba(34,197,94,0.15); color:var(--success); }
        .badge-warning { background:rgba(234,179,8,0.15); color:var(--warning); }
        .badge-danger { background:rgba(239,68,68,0.15); color:var(--danger); }

        /* Data Viewer */
        .data-viewer {
            background:var(--bg-card); border:1px solid var(--border); border-radius:20px;
            padding:24px; backdrop-filter:blur(12px); margin-bottom:24px;
        }
        .data-viewer .viewer-header {
            display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;
        }
        .data-viewer .viewer-header h3 { font-size:17px; font-weight:700; }
        .data-viewer .viewer-controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .data-viewer .viewer-controls select,
        .data-viewer .viewer-controls input {
            background:var(--bg-primary); border:1px solid var(--border); border-radius:10px;
            padding:8px 14px; color:var(--text-primary); font-size:13px; outline:none;
        }
        .data-viewer .viewer-controls select:focus,
        .data-viewer .viewer-controls input:focus { border-color:var(--accent); }
        .table-wrapper { overflow-x:auto; max-height:500px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th {
            text-align:left; padding:12px; color:var(--text-secondary); font-weight:600;
            font-size:11px; text-transform:uppercase; letter-spacing:0.5px;
            position:sticky; top:0; background:var(--bg-card); z-index:10;
            border-bottom:2px solid var(--border);
        }
        td { padding:12px; border-bottom:1px solid var(--border); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        tr:hover td { background:rgba(255,255,255,0.02); }
        .cell-null { color:var(--text-secondary); font-style:italic; }
        .cell-boolean { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; }
        .cell-boolean.true { background:rgba(34,197,94,0.15); color:var(--success); }
        .cell-boolean.false { background:rgba(239,68,68,0.15); color:var(--danger); }

        /* Schema Viewer */
        .schema-viewer {
            background:var(--bg-card); border:1px solid var(--border); border-radius:20px;
            padding:24px; backdrop-filter:blur(12px);
        }
        .schema-viewer .schema-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
        .schema-viewer h3 { font-size:17px; font-weight:700; }
        .schema-grid { display:grid; gap:12px; }
        .schema-item {
            background:var(--bg-primary); border:1px solid var(--border); border-radius:12px; padding:12px 16px;
            display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center;
        }
        .schema-item .col-name { font-weight:600; color:var(--accent-light); }
        .schema-item .col-type { color:var(--text-secondary); font-size:12px; }
        .col-pk { color:var(--warning); font-size:10px; font-weight:600; }
        .col-fk { color:var(--accent); font-size:10px; font-weight:600; }

        .alert {
            padding:14px 20px; border-radius:12px; margin-bottom:16px; display:none;
        }
        .alert-success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.2); color:#86efac; }
        .alert-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#fca5a5; }
        .alert-info { background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); color:#60a5fa; }

        .hidden { display:none !important; }

        @media (max-width:768px) {
            .stats-grid { grid-template-columns:repeat(2,1fr); }
            .table-list { grid-template-columns:1fr; }
            .schema-item { grid-template-columns:1fr; gap:4px; }
        }
        @media (max-width:480px) { .stats-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div class="loading-text" id="loadingText">🔌 Connecting to Supabase...</div>
        <div class="loading-progress"><div class="loading-progress-bar" id="loadingProgress"></div></div>
        <div class="loading-text" style="font-size:12px;color:var(--text-secondary);" id="loadingDetail">Initializing...</div>
    </div>

    <div class="container" id="dashboardContent" style="display:none;">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="logo"><i class="fas fa-database"></i></div>
                <div>
                    <h1>AIboard · Supabase Data Viewer</h1>
                    <div class="header-subtitle">
                        <i class="fas fa-server"></i> <span id="supabaseUrl"></span>
                        <span class="status-badge" id="connectionStatus"><i class="fas fa-check-circle"></i> Connected</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="refreshData()"><i class="fas fa-sync"></i> Refresh</button>
                <button class="btn btn-primary" onclick="exportSchema()"><i class="fas fa-file-export"></i> Export Schema</button>
                <button class="btn btn-success" onclick="showSQL()"><i class="fas fa-code"></i> Show SQL</button>
            </div>
        </div>

        <div id="alert" class="alert"></div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="icon-bg"><i class="fas fa-table"></i></div>
                <div class="label">Total Tables</div>
                <div class="value" id="totalTables">0</div>
            </div>
            <div class="stat-card">
                <div class="icon-bg"><i class="fas fa-database"></i></div>
                <div class="label">Total Records</div>
                <div class="value" id="totalRecords">0</div>
            </div>
            <div class="stat-card">
                <div class="icon-bg"><i class="fas fa-columns"></i></div>
                <div class="label">Total Columns</div>
                <div class="value" id="totalColumns">0</div>
            </div>
            <div class="stat-card">
                <div class="icon-bg"><i class="fas fa-clock"></i></div>
                <div class="label">Last Updated</div>
                <div class="value" id="lastUpdated" style="font-size:20px;">-</div>
            </div>
        </div>

        <!-- Table List -->
        <h3 style="margin-bottom:12px;"><i class="fas fa-list"></i> Tables in Database</h3>
        <div class="table-list" id="tableList"></div>

        <!-- Data Viewer -->
        <div class="data-viewer" id="dataViewer">
            <div class="viewer-header">
                <h3><i class="fas fa-eye"></i> <span id="viewerTitle">Table Data</span></h3>
                <div class="viewer-controls">
                    <select id="tableSelector" onchange="loadTableData()">
                        <option value="">Select a table...</option>
                    </select>
                    <input type="text" id="searchInput" placeholder="Search..." oninput="searchTableData()" />
                    <button class="btn btn-secondary" onclick="loadTableData()" style="padding:6px 14px;font-size:11px;">
                        <i class="fas fa-sync"></i> Load
                    </button>
                </div>
            </div>
            <div class="table-wrapper" id="tableDataWrapper">
                <div style="text-align:center;padding:40px;color:var(--text-secondary);">
                    <i class="fas fa-hand-pointer" style="font-size:32px;display:block;margin-bottom:12px;"></i>
                    Select a table from the dropdown to view data
                </div>
            </div>
            <div style="margin-top:12px;font-size:12px;color:var(--text-secondary);" id="recordCount">-</div>
        </div>

        <!-- Schema Viewer -->
        <div class="schema-viewer" id="schemaViewer">
            <div class="schema-header">
                <h3><i class="fas fa-code"></i> Database Schema</h3>
                <button class="btn btn-secondary" onclick="toggleSchema()" style="padding:6px 14px;font-size:11px;">
                    <i class="fas fa-chevron-down"></i> Toggle
                </button>
            </div>
            <div id="schemaContent">
                <div style="text-align:center;padding:20px;color:var(--text-secondary);">Loading schema...</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // SUPABASE CONFIG - YOUR KEY INTEGRATED
        // ============================================================
        const SUPABASE_URL = 'https://wkgldyfxsmkjyalrldtq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZ2xkeWZ4c21ranlhbGxyZHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTg0OTQsImV4cCI6MjA5MjkzNDQ5NH0.WgXSHB6teuUiEKYgeR2ADAK-8A_6VnbEl-wv0RSuxjA';

        // ============================================================
        // STATE
        // ============================================================
        let supabase = null;
        let allTables = [];
        let tableData = {};
        let tableSchemas = {};
        let currentTable = '';
        let searchTerm = '';

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            try {
                updateLoading('🔌 Connecting to Supabase...', 10);
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                document.getElementById('supabaseUrl').textContent = SUPABASE_URL;

                updateLoading('📡 Testing connection...', 20);
                
                // Try to get tables by querying pg_tables or information_schema
                updateLoading('📊 Fetching table list...', 40);
                await fetchTableList();

                if (allTables.length === 0) {
                    // If no tables found, try with known table names
                    const knownTables = ['users', 'daily_usage', 'transactions', 'questions'];
                    for (const table of knownTables) {
                        try {
                            const { count, error } = await supabase
                                .from(table)
                                .select('*', { count: 'exact', head: true });
                            if (!error || error.code !== '42P01') {
                                allTables.push(table);
                            }
                        } catch (e) {}
                    }
                    allTables = [...new Set(allTables)];
                }

                updateLoading('📈 Loading schema...', 60);
                await fetchAllSchemas();

                updateLoading('📋 Loading data...', 80);
                await loadAllTableCounts();

                updateLoading('✅ Done!', 100);
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                    document.getElementById('dashboardContent').style.display = 'block';
                    renderDashboard();
                    updateStats();
                    if (allTables.length > 0) {
                        document.getElementById('tableSelector').value = allTables[0];
                        loadTableData();
                    }
                }, 500);

            } catch (error) {
                console.error('Init error:', error);
                document.getElementById('loadingText').textContent = '❌ Error connecting to Supabase';
                document.getElementById('loadingDetail').textContent = error.message || 'Check your credentials';
                document.getElementById('connectionStatus').className = 'status-badge error';
                document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-times-circle"></i> Error';
                showAlert('❌ Failed to connect: ' + (error.message || 'Unknown error'), 'error');
                
                // Try with known tables anyway
                allTables = ['users', 'daily_usage', 'transactions', 'questions'];
                await fetchAllSchemas();
                await loadAllTableCounts();
                setTimeout(() => {
                    document.getElementById('loadingScreen').classList.add('hidden');
                    document.getElementById('dashboardContent').style.display = 'block';
                    renderDashboard();
                    updateStats();
                    if (allTables.length > 0) {
                        document.getElementById('tableSelector').value = allTables[0];
                        loadTableData();
                    }
                }, 1000);
            }
        }

        // ============================================================
        // FETCH TABLE LIST
        // ============================================================
        async function fetchTableList() {
            try {
                // Try to query pg_tables using RPC
                const { data, error } = await supabase.rpc('get_tables');
                if (!error && data && data.length > 0) {
                    allTables = data.map(t => t.table_name || t).filter(t => t && !t.startsWith('_') && !t.startsWith('pg_'));
                    return;
                }
            } catch (e) {}

            // Try information_schema
            try {
                const { data, error } = await supabase
                    .from('information_schema.tables')
                    .select('table_name')
                    .eq('table_schema', 'public')
                    .eq('table_type', 'BASE TABLE')
                    .limit(20);

                if (!error && data && data.length > 0) {
                    allTables = data.map(t => t.table_name).filter(t => !t.startsWith('_') && !t.startsWith('pg_'));
                    return;
                }
            } catch (e) {}

            // Fallback: Try common tables
            const commonTables = ['users', 'daily_usage', 'transactions', 'questions'];
            const foundTables = [];
            for (const table of commonTables) {
                try {
                    const { data, error } = await supabase
                        .from(table)
                        .select('count', { count: 'exact', head: true });
                    if (!error || error.code !== '42P01') {
                        foundTables.push(table);
                    }
                } catch (e) {}
            }
            allTables = foundTables;
        }

        // ============================================================
        // FETCH SCHEMA
        // ============================================================
        async function fetchAllSchemas() {
            for (const table of allTables) {
                try {
                    const { data, error } = await supabase
                        .from(table)
                        .select('*')
                        .limit(1);

                    if (error) {
                        tableSchemas[table] = { error: error.message, columns: [] };
                        continue;
                    }

                    if (data && data.length > 0) {
                        const columns = Object.keys(data[0]).map(col => ({
                            name: col,
                            type: typeof data[0][col],
                            sample: data[0][col],
                            isNullable: data[0][col] === null
                        }));
                        tableSchemas[table] = { columns, sample: data[0] };
                    } else {
                        tableSchemas[table] = { columns: [], sample: null };
                    }
                } catch (e) {
                    tableSchemas[table] = { error: e.message, columns: [] };
                }
            }
        }

        // ============================================================
        // LOAD TABLE COUNTS
        // ============================================================
        async function loadAllTableCounts() {
            for (const table of allTables) {
                try {
                    const { count, error } = await supabase
                        .from(table)
                        .select('*', { count: 'exact', head: true });

                    if (!error) {
                        tableData[table] = { count: count || 0, loaded: false };
                    } else {
                        tableData[table] = { count: 0, loaded: false };
                    }
                } catch (e) {
                    tableData[table] = { count: 0, loaded: false };
                }
            }
        }

        // ============================================================
        // LOAD TABLE DATA
        // ============================================================
        async function loadTableData() {
            const table = document.getElementById('tableSelector').value;
            if (!table) return;

            currentTable = table;
            document.getElementById('viewerTitle').textContent = `Table: ${table}`;

            try {
                const { data, error } = await supabase
                    .from(table)
                    .select('*')
                    .limit(100);

                if (error) throw error;

                tableData[table].data = data || [];
                tableData[table].loaded = true;

                renderTableData(table, data || []);
                document.getElementById('recordCount').textContent =
                    `Showing ${(data || []).length} of ${tableData[table].count || '?'} records`;

            } catch (error) {
                console.error('Error loading table data:', error);
                showAlert(`❌ Error loading table "${table}": ${error.message}`, 'error');
                const wrapper = document.getElementById('tableDataWrapper');
                wrapper.innerHTML = `<div style="text-align:center;padding:40px;color:var(--danger);">
                    <i class="fas fa-exclamation-triangle" style="font-size:32px;display:block;margin-bottom:12px;"></i>
                    Error loading data: ${error.message}
                </div>`;
            }
        }

        // ============================================================
        // RENDER TABLE DATA
        // ============================================================
        function renderTableData(table, data) {
            const wrapper = document.getElementById('tableDataWrapper');

            if (!data || data.length === 0) {
                wrapper.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-secondary);">
                    <i class="fas fa-inbox" style="font-size:32px;display:block;margin-bottom:12px;"></i>
                    No data found in "${table}"
                </div>`;
                return;
            }

            const columns = Object.keys(data[0]);
            const search = searchTerm.toLowerCase();

            let filteredData = data;
            if (search) {
                filteredData = data.filter(row => {
                    return Object.values(row).some(val =>
                        String(val).toLowerCase().includes(search)
                    );
                });
            }

            let html = '<table><thead><tr>';
            columns.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += '</tr></thead><tbody>';

            filteredData.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    const val = row[col];
                    let display = '';

                    if (val === null || val === undefined) {
                        display = '<span class="cell-null">null</span>';
                    } else if (typeof val === 'boolean') {
                        display = `<span class="cell-boolean ${val}">${val}</span>`;
                    } else if (val instanceof Date || (typeof val === 'object' && val !== null && val.toISOString)) {
                        display = new Date(val).toLocaleString();
                    } else if (typeof val === 'object') {
                        display = JSON.stringify(val).substring(0, 50) + (JSON.stringify(val).length > 50 ? '...' : '');
                    } else {
                        display = String(val);
                        if (display.length > 50) display = display.substring(0, 50) + '...';
                    }

                    html += `<td title="${String(val)}">${display}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';

            if (filteredData.length === 0 && search) {
                html = `<div style="text-align:center;padding:40px;color:var(--text-secondary);">
                    <i class="fas fa-search" style="font-size:32px;display:block;margin-bottom:12px;"></i>
                    No results found for "${search}"
                </div>`;
            }

            wrapper.innerHTML = html;
        }

        // ============================================================
        // SEARCH TABLE DATA
        // ============================================================
        function searchTableData() {
            searchTerm = document.getElementById('searchInput').value;
            if (currentTable && tableData[currentTable]?.data) {
                renderTableData(currentTable, tableData[currentTable].data);
            }
        }

        // ============================================================
        // RENDER DASHBOARD
        // ============================================================
        function renderDashboard() {
            // Render table list
            const list = document.getElementById('tableList');
            
            if (allTables.length === 0) {
                list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-secondary);grid-column:1/-1;">
                    <i class="fas fa-database" style="font-size:32px;display:block;margin-bottom:12px;"></i>
                    No tables found in database. Create tables first.
                </div>`;
                return;
            }

            list.innerHTML = allTables.map(table => {
                const count = tableData[table]?.count || 0;
                const schema = tableSchemas[table];
                const hasError = schema?.error;
                const colCount = schema?.columns?.length || 0;

                let statusClass = 'badge-success';
                let statusText = '✅ Active';
                if (hasError) { statusClass = 'badge-danger';
                    statusText = '❌ Error'; } else if (count === 0) { statusClass = 'badge-warning';
                    statusText = '⚠️ Empty'; }

                return `<div class="table-card" onclick="selectTable('${table}')">
                    <div class="table-name">
                        <i class="fas fa-table"></i> ${table}
                    </div>
                    <div class="table-count">
                        <i class="fas fa-database"></i> ${count.toLocaleString()} records
                        <span style="margin-left:12px;"><i class="fas fa-columns"></i> ${colCount} columns</span>
                    </div>
                    <div class="table-status">
                        <span class="badge ${statusClass}">${statusText}</span>
                        ${schema?.columns?.length > 0 ? `<span style="margin-left:8px;font-size:11px;color:var(--text-secondary);">
                            ${schema.columns.slice(0, 3).map(c => c.name).join(', ')}${schema.columns.length > 3 ? '...' : ''}
                        </span>` : ''}
                    </div>
                </div>`;
            }).join('');

            // Populate table selector
            const selector = document.getElementById('tableSelector');
            selector.innerHTML = '<option value="">Select a table...</option>' +
                allTables.map(table =>
                    `<option value="${table}">${table} (${tableData[table]?.count || 0} records)</option>`
                ).join('');

            // Render schema
            renderSchema();
        }

        // ============================================================
        // RENDER SCHEMA
        // ============================================================
        function renderSchema() {
            const content = document.getElementById('schemaContent');

            if (allTables.length === 0) {
                content.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-secondary);">No tables found</div>`;
                return;
            }

            let html = '';
            for (const table of allTables) {
                const schema = tableSchemas[table];
                const count = tableData[table]?.count || 0;

                html += `<div style="margin-bottom:16px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <div style="font-weight:600;font-size:15px;color:var(--accent-light);">
                            <i class="fas fa-table"></i> ${table}
                            <span style="font-size:12px;color:var(--text-secondary);font-weight:400;margin-left:8px;">
                                (${count.toLocaleString()} records)
                            </span>
                        </div>
                    </div>`;

                if (schema?.error) {
                    html += `<div style="color:var(--danger);font-size:12px;padding:8px;background:rgba(239,68,68,0.05);border-radius:8px;">
                        Error: ${schema.error}
                    </div>`;
                } else if (schema?.columns && schema.columns.length > 0) {
                    html += '<div class="schema-grid">';
                    schema.columns.forEach(col => {
                        const isPK = col.name === 'id' || col.name === 'uid' || col.name === 'user_id';
                        const isFK = col.name.includes('_id') && col.name !== 'id';
                        html += `<div class="schema-item">
                            <span class="col-name">${col.name}</span>
                            <span class="col-type">${col.type}${col.isNullable ? ' (nullable)' : ''}</span>
                            <span>
                                ${isPK ? '<span class="col-pk">🔑 PK</span>' : ''}
                                ${isFK ? '<span class="col-fk">🔗 FK</span>' : ''}
                                ${col.sample !== undefined && col.sample !== null ? `<span style="font-size:10px;color:var(--text-secondary);">sample: ${String(col.sample).substring(0,20)}</span>` : ''}
                            </span>
                        </div>`;
                    });
                    html += '</div>';
                } else {
                    html += `<div style="color:var(--text-secondary);font-size:12px;padding:8px;">No schema information available</div>`;
                }

                html += '</div>';
            }

            content.innerHTML = html;
        }

        // ============================================================
        // UPDATE STATS
        // ============================================================
        function updateStats() {
            const totalTables = allTables.length;
            const totalRecords = Object.values(tableData).reduce((sum, d) => sum + (d.count || 0), 0);
            const totalColumns = Object.values(tableSchemas).reduce((sum, s) => sum + (s?.columns?.length || 0), 0);

            document.getElementById('totalTables').textContent = totalTables;
            document.getElementById('totalRecords').textContent = totalRecords.toLocaleString();
            document.getElementById('totalColumns').textContent = totalColumns;
            document.getElementById('lastUpdated').textContent = new Date().toLocaleString();
        }

        // ============================================================
        // UI HELPERS
        // ============================================================
        function updateLoading(text, progress) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingProgress').style.width = progress + '%';
            if (progress < 30) document.getElementById('loadingDetail').textContent = 'Connecting...';
            else if (progress < 60) document.getElementById('loadingDetail').textContent = 'Fetching data...';
            else if (progress < 90) document.getElementById('loadingDetail').textContent = 'Processing...';
            else document.getElementById('loadingDetail').textContent = 'Ready!';
        }

        function selectTable(table) {
            document.getElementById('tableSelector').value = table;
            loadTableData();
            document.getElementById('dataViewer').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleSchema() {
            const content = document.getElementById('schemaContent');
            if (content.style.display === 'none') {
                content.style.display = 'block';
            } else {
                content.style.display = 'none';
            }
        }

        function showAlert(message, type = 'info') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        function refreshData() {
            showAlert('🔄 Refreshing data...', 'info');
            fetchAllSchemas();
            loadAllTableCounts();
            setTimeout(() => {
                renderDashboard();
                updateStats();
                if (currentTable) loadTableData();
                showAlert('✅ Data refreshed!', 'success');
            }, 1000);
        }

        function exportSchema() {
            const schema = {
                generated: new Date().toISOString(),
                supabaseUrl: SUPABASE_URL,
                tables: {}
            };

            for (const table of allTables) {
                schema.tables[table] = {
                    columns: tableSchemas[table]?.columns || [],
                    recordCount: tableData[table]?.count || 0,
                    hasData: !!tableData[table]?.data
                };
            }

            const blob = new Blob([JSON.stringify(schema, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `schema-export-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showAlert('📥 Schema exported!', 'success');
        }

        function showSQL() {
            let sql = '-- ============================================================\n';
            sql += `-- SUPABASE DATABASE SCHEMA\n`;
            sql += `-- Generated: ${new Date().toISOString()}\n`;
            sql += `-- Tables: ${allTables.join(', ')}\n`;
            sql += '-- ============================================================\n\n';

            for (const table of allTables) {
                const schema = tableSchemas[table];
                if (!schema?.columns || schema.columns.length === 0) continue;

                sql += `-- Table: ${table}\n`;
                sql += `CREATE TABLE IF NOT EXISTS ${table} (\n`;

                const cols = schema.columns.map(col => {
                    let type = col.type;
                    // Map JavaScript types to SQL types
                    if (type === 'string') type = 'TEXT';
                    else if (type === 'number') type = 'NUMERIC';
                    else if (type === 'boolean') type = 'BOOLEAN';
                    else if (type === 'object') type = 'JSONB';
                    else if (type === 'bigint') type = 'BIGINT';
                    else if (type.includes('timestamp')) type = 'TIMESTAMPTZ';
                    else if (type.includes('date')) type = 'DATE';

                    const nullable = col.isNullable !== false ? '' : ' NOT NULL';
                    const pk = (col.name === 'id' || col.name === 'uid') ? ' PRIMARY KEY' : '';
                    return `    ${col.name} ${type}${nullable}${pk}`;
                });

                sql += cols.join(',\n');
                sql += '\n);\n\n';
            }

            // Show in modal
            const modal = document.createElement('div');
            modal.style.cssText = `
                position:fixed; top:0; left:0; right:0; bottom:0;
                background:rgba(0,0,0,0.95); z-index:99999;
                display:flex; align-items:center; justify-content:center; padding:20px;
            `;
            modal.innerHTML = `
                <div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:24px;
                    max-width:900px; width:100%; max-height:90vh; padding:32px; overflow:hidden; display:flex; flex-direction:column;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                        <h2 style="font-size:20px;font-weight:700;"><i class="fas fa-code"></i> SQL Schema</h2>
                        <button onclick="this.closest('div[style]').remove()" style="background:var(--bg-primary);border:1px solid var(--border);color:var(--text-primary);padding:8px 20px;border-radius:12px;cursor:pointer;font-weight:600;">Close</button>
                    </div>
                    <div style="overflow-y:auto;flex:1;background:var(--bg-primary);border-radius:12px;padding:16px;">
                        <pre style="color:var(--text-secondary);font-family:'Courier New',monospace;font-size:12px;white-space:pre-wrap;word-wrap:break-word;">${sql}</pre>
                    </div>
                    <div style="margin-top:12px;display:flex;gap:8px;">
                        <button onclick="navigator.clipboard.writeText(this.parentElement.previousElementSibling.textContent);showAlert('✅ Copied!','success')" 
                            style="padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                        <button onclick="downloadSQL()" 
                            style="padding:8px 16px;background:var(--success);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;">
                            <i class="fas fa-download"></i> Download
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            window._sqlContent = sql;
        }

        function downloadSQL() {
            if (window._sqlContent) {
                const blob = new Blob([window._sqlContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `schema-${new Date().toISOString().slice(0,10)}.sql`;
                a.click();
                URL.revokeObjectURL(url);
                showAlert('📥 SQL downloaded!', 'success');
            }
        }

        // ============================================================
        // START
        // ============================================================
        init();
    </script>
</body>
</html>
