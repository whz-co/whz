<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakhourani AI · Premium Assistant</title>
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        :root {
            --bg: #0a0e17;
            --bg-card: #111827;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --border: rgba(255,255,255,0.08);
            --danger: #ef4444;
            --success: #22c55e;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        
        #app {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background: var(--bg-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
        }
        
        .chat-header h2 {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
        }
        .status-dot.offline { background: var(--danger); }
        
        #chatContainer {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        #chatContainer::-webkit-scrollbar { width: 4px; }
        #chatContainer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        
        .welcome {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        
        .welcome-icon { font-size: 3rem; margin-bottom: 10px; }
        .welcome h3 { font-size: 1.2rem; margin-bottom: 8px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px; }
        
        .suggestions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        
        .chip {
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            transition: all 0.2s;
        }
        .chip:hover { border-color: var(--accent); color: var(--text); }
        
        .message {
            margin: 8px 0;
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 85%;
            line-height: 1.6;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
        
        .user-message {
            background: var(--accent);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        
        .ai-message {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        
        .engine-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
            color: var(--accent);
            display: inline-block;
            margin-top: 6px;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
        
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        
        .input-wrapper {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 6px 6px 16px;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }
        
        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            padding: 10px 0;
            outline: none;
        }
        #messageInput::placeholder { color: var(--text-secondary); }
        
        #sendButton {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            color: white;
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        #sendButton:hover:not(:disabled) { transform: translateY(-1px); }
        #sendButton:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 20px;
            z-index: 1000;
            font-size: 14px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
        
        @media (max-width: 600px) {
            #app { height: 100vh; border-radius: 0; max-width: 100%; }
            .suggestions { grid-template-columns: 1fr; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div id="app">
        <div class="chat-header">
            <h2>
                <span style="font-size:24px;">🧠</span> Zakhourani AI
                <span class="status-dot" id="statusDot"></span>
            </h2>
            <button onclick="newChat()" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;">
                <i class="fas fa-plus"></i> New
            </button>
        </div>

        <div id="chatContainer">
            <div class="welcome" id="welcomeMsg">
                <div class="welcome-icon">🤖</div>
                <h3>Zakhourani AI</h3>
                <p>Your premium intelligent assistant. Ask me anything!</p>
                <div class="suggestions">
                    <div class="chip" data-prompt="Who is Dr. Waleed Zakhourani?">👨‍🎓 About Dr. Waleed</div>
                    <div class="chip" data-prompt="Explain AI in simple terms">🧠 What is AI?</div>
                    <div class="chip" data-prompt="Write a short poem about technology">📝 Write a poem</div>
                    <div class="chip" data-prompt="What are the benefits of learning English?">📚 Learn English</div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Ask Zakhourani..." autocomplete="off">
                <button id="sendButton"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" style="display:none;"></div>

    <script>
        const CONFIG = {
            workerUrl: 'https://aged-recipe-80db.wabdo3762.workers.dev/'
        };

        let isProcessing = false;
        let isOnline = false;

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const welcomeMsg = document.getElementById('welcomeMsg');
        const statusDot = document.getElementById('statusDot');
        const toast = document.getElementById('toast');

        function showToast(msg, duration = 3000) {
            toast.textContent = msg;
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.style.display = 'none', duration);
        }

        function addMessage(content, role, engine = null) {
            if (welcomeMsg.parentNode) welcomeMsg.remove();
            
            const div = document.createElement('div');
            div.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
            
            let html = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\n/g, '<br>');
            
            div.innerHTML = html;
            
            if (engine && role === 'assistant') {
                div.innerHTML += `<div class="engine-badge">🤖 ${engine}</div>`;
            }
            
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'typing-indicator';
            div.id = 'typingIndicator';
            div.innerHTML = '<span></span><span></span><span></span> <small style="color:var(--text-secondary);margin-left:8px;">Thinking...</small>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function callAI(prompt) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 25000);
                
                const response = await fetch(CONFIG.workerUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, history: [] }),
                    signal: controller.signal
                });
                
                clearTimeout(timeout);
                
                const data = await response.json();
                console.log('Worker response:', data);
                
                if (data.success && data.reply) {
                    isOnline = !data.engine?.includes('Offline');
                    updateStatus();
                    return data;
                }
                
                throw new Error(data.error || 'No reply');
            } catch (error) {
                console.error('API Error:', error);
                isOnline = false;
                updateStatus();
                throw error;
            }
        }

        function getLocalResponse(prompt) {
            const lower = prompt.toLowerCase();
            if (lower.includes('waleed') || lower.includes('zakhourani')) {
                return "**Dr. Waleed Hussein Zakhourani** is a Harvard-educated linguist, creator of the JIHAN Universal Dictionary, and founder of Zakhourani. He bridges English, Arabic, and Kurdish cultures through language education and AI-powered learning tools.";
            }
            if (lower.includes('hello') || lower.includes('hi')) {
                return "Hello! I'm Zakhourani AI. How can I help you today?";
            }
            if (lower.includes('who are you')) {
                return "I'm **Zakhourani AI**, your premium intelligent assistant. I can help answer questions, explain concepts, and more!";
            }
            return "I'm Zakhourani AI. I'm currently in offline mode but can help with basic questions. What would you like to know?";
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;
            
            isProcessing = true;
            sendButton.disabled = true;
            messageInput.disabled = true;
            
            addMessage(text, 'user');
            messageInput.value = '';
            addTypingIndicator();
            
            try {
                const result = await callAI(text);
                removeTypingIndicator();
                addMessage(result.reply, 'assistant', result.engine);
            } catch (error) {
                removeTypingIndicator();
                const fallback = getLocalResponse(text);
                addMessage(fallback, 'assistant', 'Offline Mode');
                showToast('📡 Offline mode - AI engines unavailable');
            } finally {
                isProcessing = false;
                sendButton.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }

        function updateStatus() {
            statusDot.className = isOnline ? 'status-dot' : 'status-dot offline';
        }

        function newChat() {
            chatContainer.innerHTML = '';
            chatContainer.appendChild(welcomeMsg);
            showToast('✨ New conversation');
        }

        // Test connection on load
        async function testConnection() {
            try {
                const response = await fetch(CONFIG.workerUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: 'Hello', history: [] })
                });
                const data = await response.json();
                isOnline = data.success && !data.engine?.includes('Offline');
            } catch (e) {
                isOnline = false;
            }
            updateStatus();
            console.log('Connection status:', isOnline ? 'Online' : 'Offline');
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                messageInput.value = chip.dataset.prompt;
                sendMessage();
            });
        });

        // Initialize
        testConnection();
        messageInput.focus();
        console.log('✅ Zakhourani AI ready');
    </script>
</body>
</html>
