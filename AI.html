<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zakhourani AI</title>
    <meta name="theme-color" content="#0a0e17">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg: #0a0e17;
            --bg2: #111827;
            --bg3: #1a1f2e;
            --text: #f1f5f9;
            --text2: #94a3b8;
            --accent: #3b82f6;
            --accent2: #8b5cf6;
            --border: rgba(255,255,255,0.06);
            --radius: 12px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        /* ZAKHOURANI NETWORK SYMBOL */
        .network-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
        }
        .network-dot {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 3s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:0.8;transform:scale(2)} }
        
        /* APP CONTAINER */
        #app {
            width: 100%;
            max-width: 900px;
            height: 100dvh;
            max-height: 100dvh;
            background: var(--bg2);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }
        
        /* HEADER */
        .header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
            text-decoration: none;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
        }
        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 4px;
        }
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--bg2); color: var(--text); }
        .icon-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
        
        /* SIDEBAR */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 300px;
            max-width: 85vw;
            background: var(--bg);
            border-right: 1px solid var(--border);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            display: none;
        }
        .sidebar-overlay.show { display: block; }
        
        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .new-chat-btn {
            width: calc(100% - 32px);
            margin: 12px 16px;
            padding: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-list::-webkit-scrollbar { width: 3px; }
        .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        
        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            font-size: 13px;
        }
        .chat-item:hover { background: rgba(255,255,255,0.03); }
        .chat-item.active { background: rgba(59,130,246,0.1); }
        .chat-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-item-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 0.2s; }
        .chat-item:hover .chat-item-actions { opacity: 1; }
        .chat-item-actions button {
            width: 24px; height: 24px; border-radius: 4px; border: none;
            background: transparent; color: var(--text2); cursor: pointer; font-size: 10px;
        }
        .chat-item-actions button:hover { background: rgba(255,255,255,0.1); color: var(--text); }
        .chat-item-actions button.del:hover { color: #ef4444; }
        
        /* USER INFO */
        .user-info {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: white; font-size: 14px;
        }
        .usage-bar {
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 1px;
            margin-top: 4px;
            overflow: hidden;
        }
        .usage-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 1px;
            transition: width 0.5s;
        }
        
        /* CHAT AREA */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            scroll-behavior: smooth;
        }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        
        /* MESSAGES */
        .msg {
            margin: 6px 0;
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 88%;
            line-height: 1.6;
            font-size: 14px;
            animation: msgIn 0.3s ease;
        }
        @keyframes msgIn { from { opacity:0; transform:translateY(8px); } }
        .msg-user {
            background: var(--accent);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .msg-ai {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        .msg-ai strong { color: var(--accent); }
        .msg-ai code {
            background: var(--bg);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.85em;
            font-family: monospace;
        }
        .msg-ai pre {
            background: var(--bg);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 6px 0;
            font-size: 0.85em;
            border-left: 3px solid var(--accent);
        }
        .engine-tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.2);
            color: var(--accent);
            display: inline-block;
            margin-top: 4px;
        }
        
        /* TYPING */
        .typing { display:flex; gap:4px; padding:10px 14px; margin:6px 0; }
        .typing span {
            width:5px;height:5px;background:var(--text2);border-radius:50%;
            animation:bounce 1.4s infinite;
        }
        .typing span:nth-child(2){animation-delay:0.2s}
        .typing span:nth-child(3){animation-delay:0.4s}
        @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
        
        /* INPUT */
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            background: var(--bg);
        }
        .input-wrap {
            display: flex;
            gap: 8px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 4px 4px 4px 16px;
        }
        .input-wrap:focus-within { border-color: var(--accent); }
        #msgInput {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            padding: 8px 0;
            outline: none;
        }
        #msgInput::placeholder { color: var(--text2); }
        #sendBtn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            border-radius: 50px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
        }
        #sendBtn:disabled { opacity: 0.4; }
        
        /* TOAST */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 20px;
            z-index: 200;
            font-size: 13px;
            animation: toastIn 0.3s ease;
            display: none;
        }
        @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } }
        
        /* MOBILE */
        @media (min-width: 768px) {
            #app { border-radius: 16px; height: 95dvh; }
            .sidebar { position: static; transform: none; width: 280px; flex-shrink: 0; }
            .sidebar-overlay { display: none !important; }
            #menuBtn { display: none; }
        }
    </style>
</head>
<body>

    <!-- NETWORK BACKGROUND -->
    <div class="network-bg" id="networkBg"></div>

    <!-- APP -->
    <div id="app">
        <!-- SIDEBAR OVERLAY -->
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
        
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="#" class="logo">
                    <div class="logo-icon">🧠</div>
                    Zakhourani AI
                </a>
                <button class="icon-btn" onclick="toggleSidebar()">✕</button>
            </div>
            <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
            <div class="chat-list" id="chatList"></div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">Z</div>
                <div style="flex:1;min-width:0;">
                    <div style="font-weight:600;font-size:13px;" id="userName">User</div>
                    <div style="font-size:11px;color:var(--text2);" id="usageText">50/50 remaining</div>
                    <div class="usage-bar"><div class="usage-fill" id="usageFill" style="width:100%"></div></div>
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
            <!-- HEADER -->
            <div class="header">
                <button class="icon-btn" id="menuBtn" onclick="toggleSidebar()">☰</button>
                <span class="logo">
                    <div class="logo-icon">🧠</div>
                    Zakhourani
                </span>
                <div class="header-actions">
                    <button class="icon-btn" onclick="exportChats()" title="Export">📥</button>
                    <button class="icon-btn" onclick="clearChat()" title="Clear">🗑️</button>
                </div>
            </div>

            <!-- CHAT -->
            <div class="chat-container" id="chatContainer">
                <div style="text-align:center;padding:40px 20px;" id="welcomeMsg">
                    <div style="font-size:3rem;margin-bottom:12px;">🧠</div>
                    <h2 style="background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.4rem;margin-bottom:8px;">Zakhourani AI</h2>
                    <p style="color:var(--text2);font-size:14px;">Precision intelligence. Sharp answers.</p>
                </div>
            </div>

            <!-- INPUT -->
            <div class="input-area">
                <div class="input-wrap">
                    <input type="text" id="msgInput" placeholder="Message Zakhourani..." autocomplete="off">
                    <button id="sendBtn" onclick="sendMsg()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://wkgldyfxsmkjyallrdtq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZ2xkeWZ4c21ranlhbGxyZHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTg0OTQsImV4cCI6MjA5MjkzNDQ5NH0.WgXSHB6teuUiEKYgeR2ADAK-8A_6VnbEl-wv0RSuxjA';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const WORKER_URL = 'https://aged-recipe-80db.wabdo3762.workers.dev/';
        const USER_EMAIL = 'user@zakhourani.com'; // Simple user identification

        let currentChatId = null;
        let isProcessing = false;

        // ============================================================
        // NETWORK BACKGROUND
        // ============================================================
        function createNetwork() {
            const bg = document.getElementById('networkBg');
            for (let i = 0; i < 20; i++) {
                const dot = document.createElement('div');
                dot.className = 'network-dot';
                dot.style.left = Math.random() * 100 + '%';
                dot.style.top = Math.random() * 100 + '%';
                dot.style.animationDelay = Math.random() * 3 + 's';
                bg.appendChild(dot);
            }
        }

        // ============================================================
        // TOAST
        // ============================================================
        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            clearTimeout(t._t);
            t._t = setTimeout(() => t.style.display = 'none', 2500);
        }

        // ============================================================
        // SIDEBAR
        // ============================================================
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        // ============================================================
        // SUPABASE OPERATIONS
        // ============================================================
        async function checkDailyLimit() {
            const { data, error } = await supabase.rpc('check_daily_limit', { user_email: USER_EMAIL });
            if (error) { console.error(error); return { canAsk: true, remaining: 50, total: 50 }; }
            return data[0] || { canAsk: true, remaining: 50, total: 50 };
        }

        async function incrementUsage() {
            await supabase.rpc('increment_usage', { user_email: USER_EMAIL });
        }

        async function loadChats() {
            const { data: user } = await supabase.from('users').select('id').eq('email', USER_EMAIL).single();
            if (!user) return [];
            
            const { data } = await supabase.from('conversations')
                .select('*').eq('user_id', user.id).order('updated_at', { ascending: false });
            return data || [];
        }

        async function createChat(title = 'New Chat') {
            const { data: user } = await supabase.from('users').select('id').eq('email', USER_EMAIL).single();
            if (!user) {
                await supabase.from('users').insert({ email: USER_EMAIL, username: 'User' });
                return createChat(title);
            }
            
            const { data } = await supabase.from('conversations').insert({
                user_id: user.id, title
            }).select().single();
            return data;
        }

        async function deleteChat(id) {
            await supabase.from('conversations').delete().eq('id', id);
        }

        async function renameChat(id, title) {
            await supabase.from('conversations').update({ title }).eq('id', id);
        }

        async function loadMessages(chatId) {
            const { data } = await supabase.from('messages')
                .select('*').eq('conversation_id', chatId).order('created_at', { ascending: true });
            return data || [];
        }

        async function saveMessage(chatId, role, content, engine = 'Zakhourani AI') {
            await supabase.from('messages').insert({
                conversation_id: chatId, role, content, engine
            });
        }

        // ============================================================
        // RENDER CHATS
        // ============================================================
        async function renderChatList() {
            const chats = await loadChats();
            const list = document.getElementById('chatList');
            list.innerHTML = chats.map(c => `
                <div class="chat-item ${c.id === currentChatId ? 'active' : ''}" onclick="openChat('${c.id}')">
                    <span class="chat-item-title">${c.title}</span>
                    <div class="chat-item-actions">
                        <button onclick="event.stopPropagation();renameChatPrompt('${c.id}','${c.title}')" title="Rename">✏️</button>
                        <button class="del" onclick="event.stopPropagation();deleteChatConfirm('${c.id}')" title="Delete">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            if (chats.length === 0) {
                list.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;font-size:13px;">No chats yet</div>';
            }
        }

        async function openChat(id) {
            currentChatId = id;
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            
            const messages = await loadMessages(id);
            if (messages.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:40px 20px;">
                        <div style="font-size:3rem;margin-bottom:12px;">🧠</div>
                        <p style="color:var(--text2);">Start the conversation</p>
                    </div>`;
            } else {
                messages.forEach(m => addMsgToDOM(m.content, m.role, m.engine, false));
            }
            
            container.scrollTop = container.scrollHeight;
            renderChatList();
            toggleSidebar();
            updateUsage();
        }

        async function newChat() {
            const chat = await createChat();
            currentChatId = chat.id;
            document.getElementById('chatContainer').innerHTML = `
                <div style="text-align:center;padding:40px 20px;">
                    <div style="font-size:3rem;margin-bottom:12px;">🧠</div>
                    <p style="color:var(--text2);">Start the conversation</p>
                </div>`;
            renderChatList();
            toggleSidebar();
        }

        async function deleteChatConfirm(id) {
            if (!confirm('Delete this chat?')) return;
            await deleteChat(id);
            if (currentChatId === id) {
                const chats = await loadChats();
                if (chats.length > 0) {
                    openChat(chats[0].id);
                } else {
                    const newChat = await createChat();
                    openChat(newChat.id);
                }
            }
            renderChatList();
            toast('Chat deleted');
        }

        async function renameChatPrompt(id, oldTitle) {
            const title = prompt('Rename chat:', oldTitle);
            if (title && title.trim()) {
                await renameChat(id, title.trim());
                renderChatList();
                toast('Chat renamed');
            }
        }

        // ============================================================
        // MESSAGES
        // ============================================================
        function addMsgToDOM(content, role, engine, save = true) {
            const container = document.getElementById('chatContainer');
            const welcome = container.querySelector('#welcomeMsg') || container.querySelector('div[style]');
            if (welcome && container.children.length <= 1) welcome.remove();
            
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-ai'}`;
            
            let html = content
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^### (.*$)/gm, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            
            div.innerHTML = html;
            
            if (role === 'assistant' && engine) {
                div.innerHTML += `<div class="engine-tag">${engine}</div>`;
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || isProcessing) return;
            
            // Check limit
            const limit = await checkDailyLimit();
            if (!limit.canAsk) {
                toast('⏰ Daily limit reached. Resets tomorrow.');
                return;
            }
            
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;
            
            // Ensure chat exists
            if (!currentChatId) {
                const chat = await createChat();
                currentChatId = chat.id;
                renderChatList();
            }
            
            // Add user message
            addMsgToDOM(text, 'user');
            await saveMessage(currentChatId, 'user', text);
            await incrementUsage();
            await updateUsage();
            input.value = '';
            
            // Typing indicator
            const container = document.getElementById('chatContainer');
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
            
            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, history: [] })
                });
                
                const data = await response.json();
                typing.remove();
                
                if (data.success && data.reply) {
                    addMsgToDOM(data.reply, 'assistant', data.engine);
                    await saveMessage(currentChatId, 'assistant', data.reply, data.engine);
                    
                    // Update chat title if first message
                    const msgs = await loadMessages(currentChatId);
                    if (msgs.length <= 2) {
                        const title = text.substring(0, 40) + (text.length > 40 ? '...' : '');
                        await renameChat(currentChatId, title);
                        renderChatList();
                    }
                } else {
                    throw new Error('No reply');
                }
            } catch (e) {
                typing.remove();
                const fallback = getLocalResponse(text);
                addMsgToDOM(fallback, 'assistant', 'Zakhourani');
                await saveMessage(currentChatId, 'assistant', fallback, 'Zakhourani');
            }
            
            isProcessing = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
            renderChatList();
        }

        function getLocalResponse(prompt) {
            const p = prompt.toLowerCase();
            if (p.includes('waleed') || p.includes('zakhourani')) return "**Dr. Waleed Hussein Zakhourani** is a Harvard-educated linguist and founder of Zakhourani.";
            if (p.includes('hello') || p.includes('hi')) return "Hello! How can I help you today?";
            return "I'm Zakhourani AI. How can I assist you?";
        }

        async function updateUsage() {
            const limit = await checkDailyLimit();
            const remaining = limit.remaining;
            const total = limit.total;
            const percent = (remaining / total) * 100;
            
            document.getElementById('usageText').textContent = `${remaining}/${total} remaining`;
            document.getElementById('usageFill').style.width = percent + '%';
            document.getElementById('usageFill').style.background = percent < 20 ? '#ef4444' : percent < 50 ? '#eab308' : 'var(--accent)';
        }

        function clearChat() {
            if (confirm('Clear current chat messages?')) {
                document.getElementById('chatContainer').innerHTML = `
                    <div style="text-align:center;padding:40px 20px;">
                        <div style="font-size:3rem;margin-bottom:12px;">🧠</div>
                        <p style="color:var(--text2);">Chat cleared</p>
                    </div>`;
                toast('Chat cleared');
            }
        }

        async function exportChats() {
            const chats = await loadChats();
            let text = 'ZAKHOURANI AI - CHAT EXPORT\n\n';
            for (const chat of chats) {
                text += `=== ${chat.title} ===\n`;
                const msgs = await loadMessages(chat.id);
                msgs.forEach(m => text += `[${m.role}] ${m.content}\n`);
                text += '\n';
            }
            const blob = new Blob([text], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'zakhourani-chats.txt';
            a.click();
            toast('Chats exported');
        }

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            createNetwork();
            
            // Initialize user
            await supabase.from('users').upsert({ email: USER_EMAIL, username: 'User' }, { onConflict: 'email' });
            
            // Load chats
            let chats = await loadChats();
            if (chats.length === 0) {
                await createChat();
                chats = await loadChats();
            }
            
            currentChatId = chats[0].id;
            await openChat(currentChatId);
            await updateUsage();
            
            // Event listeners
            document.getElementById('msgInput').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
            });
            
            document.getElementById('msgInput').focus();
        }

        init();
    </script>
</body>
</html>
