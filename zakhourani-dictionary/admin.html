<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Zakhourani Dictionary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        .form-card { background: white; border-radius: 20px; padding: 2rem; margin-bottom: 2rem; box-shadow: var(--shadow); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
        .form-grid input, .form-grid select, .form-grid textarea { padding: 0.75rem; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; }
        .form-grid textarea { grid-column: span 2; resize: vertical; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 0.75rem 2rem; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-delete { background: #e74c3c; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; margin-left: 0.5rem; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer; }
        .words-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; }
        .words-table th { background: var(--primary); color: white; padding: 1rem; text-align: left; }
        .words-table td { padding: 0.75rem; border-bottom: 1px solid #eee; }
        .words-table tr:hover { background: #f5f5f5; }
        .edit-form { display: none; background: #f8f9fa; padding: 1rem; margin-top: 0.5rem; border-radius: 10px; }
        .edit-form.active { display: block; }
        .message { padding: 1rem; border-radius: 10px; margin-bottom: 1rem; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><i class="fas fa-user-shield"></i><h1>Admin<span>Panel</span></h1></div>
            <nav class="nav-links">
                <a href="index.html"><i class="fas fa-book"></i> Dictionary</a>
                <a href="admin.html" class="active"><i class="fas fa-user-shield"></i> Admin</a>
            </nav>
        </div>
    </header>

    <div class="admin-container">
        <div class="form-card">
            <h2><i class="fas fa-plus-circle"></i> Add New Word</h2>
            <div id="message" class="message"></div>
            
            <div class="form-grid">
                <input type="text" id="enWord" placeholder="English Word *" required>
                <input type="text" id="arWord" placeholder="Arabic Word *" required>
                <input type="text" id="kuWord" placeholder="Kurdish Word *" required>
                <input type="url" id="urlWord" placeholder="URL *" required>
                <input type="text" id="descriptionWord" placeholder="Description">
                <select id="categoryWord">
                    <option value="navigation">Navigation</option>
                    <option value="tools">Tools</option>
                    <option value="exams">Exams</option>
                    <option value="about">About</option>
                    <option value="resources">Resources</option>
                </select>
            </div>
            <button class="btn-save" onclick="addWord()"><i class="fas fa-save"></i> Add Word</button>
        </div>

        <div class="form-card">
            <h2><i class="fas fa-list"></i> Manage Words (<span id="wordCount">0</span> words)</h2>
            <div style="overflow-x: auto;">
                <table class="words-table">
                    <thead>
                        <tr><th>ID</th><th>English</th><th>Arabic</th><th>Kurdish</th><th>Category</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="wordsList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let dictionaryData = { words: [], categories: [] };

        async function loadData() {
            try {
                const response = await fetch('data.json?v=' + Date.now());
                dictionaryData = await response.json();
                displayWords();
                document.getElementById('wordCount').textContent = dictionaryData.words.length;
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function displayWords() {
            const tbody = document.getElementById('wordsList');
            tbody.innerHTML = dictionaryData.words.map(word => `
                <tr id="row-${word.id}">
                    <td>${word.id}</td>
                    <td>${word.en}</td>
                    <td>${word.ar}</td>
                    <td>${word.ku}</td>
                    <td><span class="category-tag">${word.category}</span></td>
                    <td>
                        <button class="btn-edit" onclick="showEditForm(${word.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-delete" onclick="deleteWord(${word.id})"><i class="fas fa-trash"></i> Delete</button>
                        <div id="edit-form-${word.id}" class="edit-form">
                            <h4>Edit Word</h4>
                            <input type="text" id="edit-en-${word.id}" value="${word.en}" placeholder="English" style="width:100%; margin-bottom:5px; padding:5px;">
                            <input type="text" id="edit-ar-${word.id}" value="${word.ar}" placeholder="Arabic" style="width:100%; margin-bottom:5px; padding:5px;">
                            <input type="text" id="edit-ku-${word.id}" value="${word.ku}" placeholder="Kurdish" style="width:100%; margin-bottom:5px; padding:5px;">
                            <input type="url" id="edit-url-${word.id}" value="${word.url}" placeholder="URL" style="width:100%; margin-bottom:5px; padding:5px;">
                            <input type="text" id="edit-desc-${word.id}" value="${word.description || ''}" placeholder="Description" style="width:100%; margin-bottom:5px; padding:5px;">
                            <select id="edit-cat-${word.id}" style="width:100%; margin-bottom:5px; padding:5px;">
                                ${['navigation','tools','exams','about','resources'].map(cat => `<option value="${cat}" ${word.category === cat ? 'selected' : ''}>${cat}</option>`).join('')}
                            </select>
                            <button onclick="updateWord(${word.id})" style="background:#27ae60; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Save Changes</button>
                            <button onclick="hideEditForm(${word.id})" style="background:#95a5a6; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Cancel</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function showEditForm(id) {
            document.getElementById(`edit-form-${id}`).classList.add('active');
        }

        function hideEditForm(id) {
            document.getElementById(`edit-form-${id}`).classList.remove('active');
        }

        async function addWord() {
            const newWord = {
                id: Date.now(),
                en: document.getElementById('enWord').value,
                ar: document.getElementById('arWord').value,
                ku: document.getElementById('kuWord').value,
                url: document.getElementById('urlWord').value,
                description: document.getElementById('descriptionWord').value,
                category: document.getElementById('categoryWord').value,
                dateAdded: new Date().toISOString().split('T')[0]
            };

            if (!newWord.en || !newWord.ar || !newWord.ku || !newWord.url) {
                showMessage('Please fill all required fields (*)', 'error');
                return;
            }

            dictionaryData.words.push(newWord);
            dictionaryData.lastUpdated = new Date().toISOString().split('T')[0];
            
            await saveData();
            clearForm();
            showMessage('Word added successfully!', 'success');
            loadData();
        }

        async function updateWord(id) {
            const index = dictionaryData.words.findIndex(w => w.id === id);
            if (index !== -1) {
                dictionaryData.words[index] = {
                    ...dictionaryData.words[index],
                    en: document.getElementById(`edit-en-${id}`).value,
                    ar: document.getElementById(`edit-ar-${id}`).value,
                    ku: document.getElementById(`edit-ku-${id}`).value,
                    url: document.getElementById(`edit-url-${id}`).value,
                    description: document.getElementById(`edit-desc-${id}`).value,
                    category: document.getElementById(`edit-cat-${id}`).value
                };
                dictionaryData.lastUpdated = new Date().toISOString().split('T')[0];
                await saveData();
                showMessage('Word updated successfully!', 'success');
                loadData();
                hideEditForm(id);
            }
        }

        async function deleteWord(id) {
            if (confirm('Are you sure you want to delete this word?')) {
                dictionaryData.words = dictionaryData.words.filter(w => w.id !== id);
                dictionaryData.lastUpdated = new Date().toISOString().split('T')[0];
                await saveData();
                showMessage('Word deleted successfully!', 'success');
                loadData();
            }
        }

        async function saveData() {
            try {
                const response = await fetch('save-data.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dictionaryData)
                });
                if (!response.ok) {
                    // If PHP not available, download as JSON file
                    downloadAsJSON();
                }
            } catch (error) {
                downloadAsJSON();
            }
        }

        function downloadAsJSON() {
            const dataStr = JSON.stringify(dictionaryData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'data.json';
            a.click();
            URL.revokeObjectURL(url);
            showMessage('Downloaded data.json - replace the file manually', 'success');
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }

        function clearForm() {
            document.getElementById('enWord').value = '';
            document.getElementById('arWord').value = '';
            document.getElementById('kuWord').value = '';
            document.getElementById('urlWord').value = '';
            document.getElementById('descriptionWord').value = '';
        }

        loadData();
    </script>
</body>
</html>
