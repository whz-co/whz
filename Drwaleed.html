<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zakhourani AI - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... keep all your existing styles ... */
        /* (Copy all the CSS from your original file) */
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">Initializing...</div>
        <div class="loader-bar">
            <div class="loader-bar-fill" id="loaderBar"></div>
        </div>
        <div class="loader-text" style="font-size:12px;color:var(--text-secondary);" id="loaderDetail">Setting up...</div>
    </div>

    <!-- Main Dashboard -->
    <div class="container" id="dashboard" style="display:none;">
        <!-- ... keep all your existing HTML ... -->
        <!-- (Copy the HTML from your original file) -->
    </div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        // !! UPDATE THESE WITH YOUR ACTUAL SUPABASE CREDENTIALS !!
        const SUPABASE_URL = 'YOUR_ACTUAL_SUPABASE_URL_HERE';
        const SUPABASE_KEY = 'YOUR_ACTUAL_SUPABASE_KEY_HERE';
        
        // STATIC FALLBACK DATA (if Supabase fails)
        const FALLBACK_DATA = {
            tables: ['users', 'daily_usage', 'transactions', 'questions'],
            users: [
                { id: 1, email: 'admin@zakhourani.com', created_at: '2024-01-01' },
                { id: 2, email: 'user@example.com', created_at: '2024-01-02' }
            ],
            daily_usage: [
                { id: 1, user_id: 1, date: '2024-01-01', count: 150 },
                { id: 2, user_id: 1, date: '2024-01-02', count: 200 }
            ],
            transactions: [
                { id: 1, user_id: 1, amount: 100, status: 'completed', date: '2024-01-01' },
                { id: 2, user_id: 2, amount: 50, status: 'pending', date: '2024-01-02' }
            ],
            questions: [
                { id: 1, user_id: 1, question: 'What is AI?', answer: 'Artificial Intelligence', created_at: '2024-01-01' }
            ]
        };

        // ============================================================
        // STATE
        // ============================================================
        let client = null;
        let tables = [];
        let dataCache = {};
        let schemas = {};
        let currentTable = '';
        let searchTerm = '';
        let useFallback = false;

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            try {
                updateLoader('Connecting to Supabase...', 10);
                
                // Check if URL is valid
                if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_ACTUAL_SUPABASE_URL_HERE') {
                    throw new Error('Please update SUPABASE_URL with your actual Supabase URL');
                }
                if (!SUPABASE_KEY || SUPABASE_KEY === 'YOUR_ACTUAL_SUPABASE_KEY_HERE') {
                    throw new Error('Please update SUPABASE_KEY with your actual Supabase key');
                }

                client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                updateLoader('Fetching tables...', 30);
                
                // Try to connect to Supabase
                const { data, error } = await client
                    .from('information_schema.tables')
                    .select('table_name')
                    .eq('table_schema', 'public')
                    .eq('table_type', 'BASE TABLE')
                    .limit(20);

                if (error) {
                    console.warn('Supabase query failed:', error);
                    useFallback = true;
                    tables = FALLBACK_DATA.tables;
                    setupFallbackData();
                } else if (data && data.length > 0) {
                    tables = data.map(t => t.table_name)
                        .filter(t => !t.startsWith('_') && !t.startsWith('pg_'));
                } else {
                    useFallback = true;
                    tables = FALLBACK_DATA.tables;
                    setupFallbackData();
                }

                updateLoader('Loading schema...', 60);
                await loadSchemas();

                updateLoader('Loading data...', 80);
                await loadCounts();

                updateLoader('Ready!', 100);
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('dashboard').style.display = 'block';
                    renderAll();
                    const status = useFallback ? '⚠️ Using fallback data' : '✅ Connected successfully!';
                    showAlert(status, useFallback ? 'warning' : 'success');
                    if (useFallback) {
                        document.getElementById('statusBadge').className = 'badge badge-warning';
                        document.getElementById('statusBadge').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Fallback Mode';
                    }
                }, 400);

            } catch (err) {
                console.error('Init error:', err);
                useFallback = true;
                tables = FALLBACK_DATA.tables;
                setupFallbackData();
                await loadSchemas();
                await loadCounts();
                
                document.getElementById('loaderText').textContent = '⚠️ Using fallback data';
                document.getElementById('loaderDetail').textContent = err.message || 'Could not connect to Supabase';
                document.getElementById('statusBadge').className = 'badge badge-warning';
                document.getElementById('statusBadge').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Fallback';

                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('dashboard').style.display = 'block';
                    renderAll();
                    showAlert(`⚠️ Using fallback data (${err.message})`, 'warning');
                }, 1000);
            }
        }

        // ============================================================
        // FALLBACK DATA SETUP
        // ============================================================
        function setupFallbackData() {
            // Populate dataCache with fallback data
            for (const table of tables) {
                if (FALLBACK_DATA[table]) {
                    dataCache[table] = {
                        count: FALLBACK_DATA[table].length,
                        loaded: true,
                        data: FALLBACK_DATA[table]
                    };
                } else {
                    dataCache[table] = {
                        count: 0,
                        loaded: true,
                        data: []
                    };
                }
            }
        }

        // ============================================================
        // LOAD SCHEMAS
        // ============================================================
        async function loadSchemas() {
            for (const table of tables) {
                try {
                    if (FALLBACK_DATA[table]) {
                        const sample = FALLBACK_DATA[table][0] || {};
                        const cols = Object.keys(sample).map(k => ({
                            name: k,
                            type: typeof sample[k],
                            sample: sample[k],
                            nullable: sample[k] === null
                        }));
                        schemas[table] = { columns: cols, sample: sample };
                        continue;
                    }

                    // Try to fetch schema from Supabase
                    const { data, error } = await client.from(table).select('*').limit(1);
                    if (error) {
                        schemas[table] = { error: error.message, columns: [] };
                        continue;
                    }
                    if (data && data.length > 0) {
                        const cols = Object.keys(data[0]).map(k => ({
                            name: k,
                            type: typeof data[0][k],
                            sample: data[0][k],
                            nullable: data[0][k] === null
                        }));
                        schemas[table] = { columns: cols, sample: data[0] };
                    } else {
                        schemas[table] = { columns: [], sample: null };
                    }
                } catch (e) {
                    schemas[table] = { error: e.message, columns: [] };
                }
            }
        }

        // ============================================================
        // LOAD COUNTS
        // ============================================================
        async function loadCounts() {
            for (const table of tables) {
                // Skip if we already have fallback data
                if (dataCache[table] && dataCache[table].data) continue;

                try {
                    const { count, error } = await client
                        .from(table)
                        .select('*', { count: 'exact', head: true });
                    if (error) {
                        dataCache[table] = { count: 0, loaded: false };
                        continue;
                    }
                    dataCache[table] = { count: count || 0, loaded: false };
                } catch (e) {
                    dataCache[table] = { count: 0, loaded: false };
                }
            }
        }

        // ============================================================
        // LOAD TABLE DATA
        // ============================================================
        async function loadTableData() {
            const table = document.getElementById('tableSelect').value;
            if (!table) return;

            currentTable = table;
            document.getElementById('viewerTitle').textContent = 'Table: ' + table;

            try {
                // Check if we have cached data
                if (dataCache[table]?.data) {
                    renderData(table, dataCache[table].data);
                    document.getElementById('recordCount').textContent =
                        `Showing ${dataCache[table].data.length} of ${dataCache[table].count || dataCache[table].data.length} records`;
                    return;
                }

                // Try to fetch from Supabase
                const { data, error } = await client.from(table).select('*').limit(100);
                if (error) throw error;

                dataCache[table].data = data || [];
                dataCache[table].loaded = true;

                renderData(table, data || []);
                document.getElementById('recordCount').textContent =
                    `Showing ${(data || []).length} of ${dataCache[table].count || '?'} records`;

            } catch (err) {
                // If fetch fails, check if we have fallback data
                if (FALLBACK_DATA[table]) {
                    const fallbackData = FALLBACK_DATA[table];
                    dataCache[table].data = fallbackData;
                    renderData(table, fallbackData);
                    document.getElementById('recordCount').textContent =
                        `Showing ${fallbackData.length} of ${fallbackData.length} records (fallback)`;
                    showAlert(`⚠️ Using fallback data for "${table}"`, 'warning');
                } else {
                    showAlert('❌ Error loading table: ' + err.message, 'error');
                    document.getElementById('dataWrapper').innerHTML =
                        `<div class="empty-state"><i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i>Error: ${err.message}</div>`;
                }
            }
        }

        // ============================================================
        // RENDER DATA (Keep your existing renderData function)
        // ============================================================
        // ... (copy your existing renderData, renderAll, renderTables, etc.)

        // ============================================================
        // RENDER ALL
        // ============================================================
        function renderAll() {
            renderTables();
            renderSchema();
            updateStats();

            const sel = document.getElementById('tableSelect');
            sel.innerHTML = '<option value="">Select a table...</option>' +
                tables.map(t =>
                    `<option value="${t}">${t} (${dataCache[t]?.count || 0})</option>`
                ).join('');

            if (tables.length > 0) {
                sel.value = tables[0];
                loadTableData();
            }
        }

        // ============================================================
        // RENDER TABLES
        // ============================================================
        function renderTables() {
            const grid = document.getElementById('tableGrid');

            if (tables.length === 0) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">No tables found</div>`;
                return;
            }

            grid.innerHTML = tables.map(t => {
                const count = dataCache[t]?.count || 0;
                const schema = schemas[t];
                const cols = schema?.columns?.length || 0;
                const hasErr = schema?.error;

                let status = 'badge-success';
                let statusText = 'Active';
                if (hasErr) { status = 'badge-danger';
                    statusText = 'Error'; } else if (count === 0) { status = 'badge-warning';
                    statusText = 'Empty'; }

                const preview = schema?.columns?.slice(0, 3).map(c => c.name).join(', ') || '';

                return `<div class="table-card" onclick="selectTable('${t}')">
                    <div class="name"><i class="fas fa-table"></i> ${t}</div>
                    <div class="info">
                        <span><i class="fas fa-database"></i> ${count.toLocaleString()} records</span>
                        <span><i class="fas fa-columns"></i> ${cols} columns</span>
                    </div>
                    <div class="status">
                        <span class="badge ${status}">${statusText}</span>
                        ${preview ? `<span style="margin-left:10px;font-size:11px;color:var(--text-secondary);">${preview}</span>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // ============================================================
        // RENDER SCHEMA
        // ============================================================
        function renderSchema() {
            const content = document.getElementById('schemaContent');

            if (tables.length === 0) {
                content.innerHTML = `<div class="empty-state">No tables found</div>`;
                return;
            }

            let html = '';
            for (const table of tables) {
                const schema = schemas[table];
                const count = dataCache[table]?.count || 0;

                html += `<div style="margin-bottom:16px;">
                    <div style="font-weight:600;font-size:15px;color:var(--accent-light);margin-bottom:8px;">
                        <i class="fas fa-table"></i> ${table}
                        <span style="font-size:12px;color:var(--text-secondary);font-weight:400;margin-left:8px;">
                            (${count.toLocaleString()} records)
                        </span>
                    </div>`;

                if (schema?.error) {
                    html += `<div style="color:var(--danger);font-size:12px;padding:8px;background:rgba(239,68,68,0.05);border-radius:8px;">
                        Error: ${schema.error}
                    </div>`;
                } else if (schema?.columns && schema.columns.length > 0) {
                    html += '<div class="schema-grid">';
                    schema.columns.forEach(col => {
                        const isPK = ['id', 'uid', 'user_id'].includes(col.name);
                        const isFK = col.name.includes('_id') && col.name !== 'id';
                        html += `<div class="schema-item">
                            <span class="col">${col.name}</span>
                            <span class="type">${col.type}${col.nullable ? ' (nullable)' : ''}</span>
                            <span>
                                ${isPK ? '<span class="tag tag-pk">🔑 PK</span>' : ''}
                                ${isFK ? '<span class="tag tag-fk">🔗 FK</span>' : ''}
                                ${col.sample !== undefined && col.sample !== null ? 
                                    `<span style="font-size:10px;color:var(--text-secondary);">sample: ${String(col.sample).substring(0,20)}</span>` : ''}
                            </span>
                        </div>`;
                    });
                    html += '</div>';
                } else {
                    html += `<div style="color:var(--text-secondary);font-size:12px;padding:8px;">No schema info</div>`;
                }

                html += '</div>';
            }

            content.innerHTML = html;
        }

        // ============================================================
        // UPDATE STATS
        // ============================================================
        function updateStats() {
            const totalTables = tables.length;
            const totalRecords = Object.values(dataCache).reduce((s, d) => s + (d.count || 0), 0);
            const totalColumns = Object.values(schemas).reduce((s, sch) => s + (sch?.columns?.length || 0), 0);

            document.getElementById('statTables').textContent = totalTables;
            document.getElementById('statRecords').textContent = totalRecords.toLocaleString();
            document.getElementById('statColumns').textContent = totalColumns;
            document.getElementById('statUpdated').textContent = new Date().toLocaleString();
        }

        // ============================================================
        // RENDER DATA (Your existing function)
        // ============================================================
        function renderData(table, data) {
            const wrap = document.getElementById('dataWrapper');

            if (!data || data.length === 0) {
                wrap.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i>No data in "${table}"</div>`;
                return;
            }

            const cols = Object.keys(data[0]);
            const search = searchTerm.toLowerCase();

            let filtered = data;
            if (search) {
                filtered = data.filter(row =>
                    Object.values(row).some(v => String(v).toLowerCase().includes(search))
                );
            }

            let html = '<table><thead><tr>';
            cols.forEach(c => html += `<th>${c}</th>`);
            html += '</tr></thead><tbody>';

            filtered.forEach(row => {
                html += '<tr>';
                cols.forEach(c => {
                    const v = row[c];
                    let display = '';
                    if (v === null || v === undefined) {
                        display = '<span class="null">null</span>';
                    } else if (typeof v === 'boolean') {
                        display = `<span class="bool ${v}">${v}</span>`;
                    } else if (v instanceof Date || (typeof v === 'object' && v !== null && v.toISOString)) {
                        display = new Date(v).toLocaleString();
                    } else if (typeof v === 'object') {
                        display = JSON.stringify(v).substring(0, 40) + (JSON.stringify(v).length > 40 ? '...' : '');
                    } else {
                        display = String(v);
                        if (display.length > 50) display = display.substring(0, 50) + '...';
                    }
                    html += `<td title="${String(v)}">${display}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';

            if (filtered.length === 0 && search) {
                html = `<div class="empty-state"><i class="fas fa-search"></i>No results for "${search}"</div>`;
            }

            wrap.innerHTML = html;
        }

        // ============================================================
        // SEARCH
        // ============================================================
        function searchData() {
            searchTerm = document.getElementById('searchInput').value;
            if (currentTable && dataCache[currentTable]?.data) {
                renderData(currentTable, dataCache[currentTable].data);
            }
        }

        // ============================================================
        // UI HELPERS
        // ============================================================
        function updateLoader(text, progress) {
            document.getElementById('loaderText').textContent = text;
            document.getElementById('loaderBar').style.width = progress + '%';
            const detail = document.getElementById('loaderDetail');
            if (progress < 30) detail.textContent = 'Connecting...';
            else if (progress < 60) detail.textContent = 'Loading data...';
            else if (progress < 90) detail.textContent = 'Processing...';
            else detail.textContent = 'Ready!';
        }

        function selectTable(table) {
            document.getElementById('tableSelect').value = table;
            loadTableData();
            document.getElementById('dataWrapper').scrollIntoView({ behavior: 'smooth' });
        }

        function toggleSchema() {
            const content = document.getElementById('schemaContent');
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
        }

        function showAlert(msg, type = 'info') {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = `alert alert-${type}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function refreshAll() {
            showAlert('🔄 Refreshing...', 'info');
            loadSchemas();
            loadCounts();
            setTimeout(() => {
                renderAll();
                showAlert('✅ Refreshed!', 'success');
            }, 800);
        }

        function exportData() {
            const data = {
                generated: new Date().toISOString(),
                tables: tables.map(t => ({
                    name: t,
                    count: dataCache[t]?.count || 0,
                    schema: schemas[t]?.columns || []
                }))
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `zakhourani-export-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showAlert('📥 Exported!', 'success');
        }

        // ============================================================
        // START
        // ============================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
