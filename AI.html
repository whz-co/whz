<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Zakhourani AI · Premium Assistant</title>
    <meta name="description" content="Zakhourani AI - Your Premium Intelligent Assistant">
    <meta name="theme-color" content="#0a0e17">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%233b82f6'/><stop offset='100%25' style='stop-color:%238b5cf6'/></linearGradient></defs><circle cx='50' cy='50' r='45' fill='none' stroke='url(%23g)' stroke-width='4'/><circle cx='30' cy='35' r='8' fill='%233b82f6' opacity='0.8'/><circle cx='70' cy='35' r='8' fill='%238b5cf6' opacity='0.8'/><circle cx='30' cy='65' r='8' fill='%2322c55e' opacity='0.8'/><circle cx='70' cy='65' r='8' fill='%23f59e0b' opacity='0.8'/><circle cx='50' cy='50' r='6' fill='white'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg: #0a0e17; --bg2: #111827; --bg3: #1a1f2e;
            --text: #f1f5f9; --text2: #94a3b8;
            --accent: #3b82f6; --accent2: #8b5cf6;
            --success: #22c55e; --gold: #f59e0b; --danger: #ef4444;
            --border: rgba(255,255,255,0.06);
            --gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --sidebar-w: 280px;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',-apple-system,sans-serif; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--text); height:100dvh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        
        /* Network BG */
        .net-bg { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.04; }
        .net-dot { position:absolute; width:2px; height:2px; border-radius:50%; animation:pulse 3s infinite; }
        .net-dot.c1 { background:var(--accent); } .net-dot.c2 { background:var(--accent2); }
        .net-dot.c3 { background:var(--success); } .net-dot.c4 { background:var(--gold); }
        @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:1;transform:scale(2.5)} }
        
        .net-line { position:absolute; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.1; transform-origin:left center; }
        
        #app { width:100%; max-width:1200px; height:100dvh; background:var(--bg2); display:flex; flex-direction:column; position:relative; z-index:1; }
        @media(min-width:768px){ #app { height:94dvh; border-radius:20px; border:1px solid var(--border); flex-direction:row; } }
        
        /* Sidebar */
        .sidebar { position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w); max-width:85vw; background:var(--bg); border-right:1px solid var(--border); z-index:100; transform:translateX(-100%); transition:transform 0.3s; display:flex; flex-direction:column; }
        .sidebar.open { transform:translateX(0); }
        .sidebar-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:99; display:none; }
        .sidebar-overlay.show { display:block; }
        @media(min-width:768px){ .sidebar { position:static; transform:none; width:var(--sidebar-w); flex-shrink:0; } .sidebar-overlay{display:none!important} }
        
        .sidebar-head { padding:14px; border-bottom:1px solid var(--border); }
        .logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); margin-bottom:10px; }
        .logo-icon { width:36px; height:36px; background:var(--gradient); border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative; }
        .logo-icon::after { content:''; position:absolute; width:8px; height:8px; background:white; border-radius:50%; }
        .logo-icon i { font-size:14px; color:white; z-index:1; }
        .logo-text { font-weight:700; font-size:15px; }
        .logo-badge { font-size:8px; background:linear-gradient(135deg,#f59e0b,#d97706); color:white; padding:2px 7px; border-radius:8px; font-weight:700; margin-left:2px; }
        
        .new-chat-btn { width:100%; padding:9px; background:var(--gradient); border:none; border-radius:8px; color:white; font-weight:600; font-size:13px; cursor:pointer; transition:all 0.2s; }
        .new-chat-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(59,130,246,0.3); }
        
        .chat-list { flex:1; overflow-y:auto; padding:6px; }
        .chat-list::-webkit-scrollbar { width:3px; } .chat-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
        .chat-item { padding:9px 10px; border-radius:7px; cursor:pointer; margin-bottom:1px; display:flex; align-items:center; justify-content:space-between; font-size:12px; transition:all 0.15s; }
        .chat-item:hover { background:rgba(255,255,255,0.03); }
        .chat-item.active { background:rgba(59,130,246,0.1); }
        .chat-item-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .chat-item-actions { display:flex; gap:1px; opacity:0; }
        .chat-item:hover .chat-item-actions, .chat-item.active .chat-item-actions { opacity:1; }
        .chat-item-actions button { width:24px;height:24px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:9px;border-radius:4px; }
        .chat-item-actions button:hover { background:rgba(255,255,255,0.08);color:var(--text); }
        
        .user-bar { padding:10px 14px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; font-size:11px; }
        .user-avatar { width:30px;height:30px;border-radius:50%;background:var(--gradient);display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:12px;flex-shrink:0; }
        .usage-bar { height:2px;background:rgba(255,255,255,0.08);border-radius:1px;margin-top:3px;overflow:hidden; }
        .usage-fill { height:100%;background:var(--accent);border-radius:1px;transition:width 0.5s; }
        
        /* Main */
        .main-area { flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }
        .top-bar { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; flex-shrink:0; background:var(--bg); }
        .top-bar .logo { margin:0; }
        @media(min-width:768px){ #menuBtn { display:none; } }
        .icon-btn { width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
        .icon-btn:hover { background:var(--bg3);color:var(--text); }
        .top-actions { margin-left:auto; display:flex; gap:4px; }
        
        .chat-container { flex:1; overflow-y:auto; padding:14px; -webkit-overflow-scrolling:touch; }
        .chat-container::-webkit-scrollbar { width:3px; } .chat-container::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
        
        .welcome-msg { text-align:center; padding:40px 16px; max-width:400px; margin:0 auto; }
        .welcome-icon { font-size:3rem; margin-bottom:10px; }
        .welcome-msg h2 { font-size:1.3rem; background:var(--gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; }
        .welcome-msg p { color:var(--text2); font-size:13px; }
        .chips { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:14px; }
        .chip { padding:9px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:12px; color:var(--text2); text-align:center; transition:all 0.2s; }
        .chip:hover { border-color:var(--accent); color:var(--text); }
        @media(max-width:400px){ .chips { grid-template-columns:1fr; } }
        
        .msg { margin:5px 0; padding:9px 13px; border-radius:13px; max-width:88%; line-height:1.55; font-size:13.5px; animation:msgIn 0.25s; word-wrap:break-word; }
        @keyframes msgIn { from{opacity:0;transform:translateY(6px)} }
        .msg-user { background:var(--accent); color:white; margin-left:auto; border-bottom-right-radius:3px; }
        .msg-ai { background:rgba(255,255,255,0.03); border:1px solid var(--border); margin-right:auto; border-bottom-left-radius:3px; }
        .msg-ai strong { color:var(--accent); }
        .msg-ai pre { background:var(--bg); padding:8px; border-radius:6px; overflow-x:auto; margin:4px 0; font-size:0.82em; border-left:2px solid var(--accent); }
        .msg-ai code { background:var(--bg); padding:1px 5px; border-radius:3px; font-size:0.85em; }
        .powered-by { font-size:9px; color:var(--text2); margin-top:4px; opacity:0.7; }
        
        .typing { display:flex; gap:3px; padding:9px 13px; }
        .typing span { width:4px;height:4px;background:var(--text2);border-radius:50%;animation:bounce 1.4s infinite; }
        .typing span:nth-child(2){animation-delay:0.2s}.typing span:nth-child(3){animation-delay:0.4s}
        @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
        
        .input-area { padding:10px 14px; border-top:1px solid var(--border); flex-shrink:0; background:var(--bg); }
        .input-wrap { display:flex; gap:6px; background:var(--bg3); border:1px solid var(--border); border-radius:50px; padding:3px 3px 3px 14px; }
        .input-wrap:focus-within { border-color:var(--accent); }
        #msgInput { flex:1; background:transparent; border:none; color:var(--text); font-size:14px; padding:8px 0; outline:none; min-width:0; }
        #msgInput::placeholder { color:var(--text2); }
        #sendBtn { background:var(--gradient); border:none; color:white; border-radius:50px; padding:8px 15px; cursor:pointer; font-weight:600; font-size:13px; white-space:nowrap; flex-shrink:0; }
        #sendBtn:disabled { opacity:0.4; }
        
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:9px 18px; z-index:200; font-size:12px; display:none; animation:toastIn 0.3s; }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(8px)} }
        
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:300; padding:16px; }
        .modal.show { display:flex; }
        .modal-box { background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:24px; max-width:380px; width:100%; text-align:center; animation:modalIn 0.3s; }
        @keyframes modalIn { from{opacity:0;transform:scale(0.95)} }
        .modal-box h3 { margin-bottom:8px; }
        .modal-box p { color:var(--text2); font-size:13px; margin-bottom:14px; }
        .modal-btn { width:100%; padding:10px; border:none; border-radius:25px; color:white; font-weight:600; cursor:pointer; font-size:14px; margin-top:6px; }
        .modal-btn.primary { background:var(--gradient); }
        .modal-btn.secondary { background:transparent; border:1px solid var(--border); color:var(--text2); }
        .modal-btn.gold { background:linear-gradient(135deg,#f59e0b,#d97706); }
    </style>
</head>
<body>

    <div class="net-bg" id="netBg"></div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div id="app">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-head">
                <a href="https://whzco.com" class="logo">
                    <div class="logo-icon"><i class="fas fa-brain"></i></div>
                    <span class="logo-text">Zakhourani</span>
                    <span class="logo-badge">AI</span>
                </a>
                <button class="new-chat-btn" onclick="newChat()"><i class="fas fa-plus"></i> New Chat</button>
            </div>
            <div class="chat-list" id="chatList"></div>
            <div class="user-bar">
                <div class="user-avatar">Z</div>
                <div style="flex:1;min-width:0">
                    <div style="font-weight:600;font-size:12px">Zakhourani AI</div>
                    <div style="font-size:10px;color:var(--text2)" id="usageTxt">50/50 remaining</div>
                    <div class="usage-bar"><div class="usage-fill" id="usageFill" style="width:100%"></div></div>
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <div class="main-area">
            <div class="top-bar">
                <button class="icon-btn" id="menuBtn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <a href="https://whzco.com" class="logo">
                    <div class="logo-icon"><i class="fas fa-brain"></i></div>
                    <span class="logo-text">Zakhourani AI</span>
                </a>
                <div class="top-actions">
                    <button class="icon-btn" onclick="clearChat()" title="Clear"><i class="fas fa-trash-alt"></i></button>
                    <button class="icon-btn" onclick="exportChat()" title="Export"><i class="fas fa-download"></i></button>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-msg" id="welcomeBlock">
                    <div class="welcome-icon">🧠</div>
                    <h2>Zakhourani AI</h2>
                    <p>Precision intelligence. Sharp answers.</p>
                    <div class="chips">
                        <div class="chip" data-prompt="Who is Dr. Waleed Hussein Zakhourani?">👨‍🎓 About Dr. Waleed</div>
                        <div class="chip" data-prompt="Explain quantum computing simply">⚛️ Quantum Computing</div>
                        <div class="chip" data-prompt="Write a short poem about AI">📝 AI Poem</div>
                        <div class="chip" data-prompt="Latest technology trends 2026">🚀 Tech Trends</div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrap">
                    <input type="text" id="msgInput" placeholder="Ask Zakhourani..." autocomplete="off">
                    <button id="sendBtn" onclick="sendMsg()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal" id="limitModal">
        <div class="modal-box">
            <div style="font-size:2.5rem;margin-bottom:8px">⏳</div>
            <h3>Daily Limit Reached</h3>
            <p>50 questions used today. Resets at midnight.</p>
            <div id="limitTimer" style="font-weight:600;color:var(--accent);margin:8px 0"></div>
            <button class="modal-btn gold" onclick="closeModal('limitModal')">Upgrade to Premium</button>
            <button class="modal-btn secondary" onclick="closeModal('limitModal')">OK</button>
        </div>
    </div>

    <script>
        // ============================================================
        // SUPABASE
        // ============================================================
        const ZAKH = supabase.createClient(
            'https://wkgldyfxsmkjyallrdtq.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZ2xkeWZ4c21ranlhbGxyZHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTg0OTQsImV4cCI6MjA5MjkzNDQ5NH0.WgXSHB6teuUiEKYgeR2ADAK-8A_6VnbEl-wv0RSuxjA'
        );
        const EMAIL = 'user@zakhourani.com';
        const WORKER = 'https://aged-recipe-80db.wabdo3762.workers.dev/';
        
        let chatId = null, busy = false, conversations = {};

        // ============================================================
        // NETWORK BACKGROUND
        // ============================================================
        (function createNet() {
            const bg = document.getElementById('netBg');
            for (let i = 0; i < 20; i++) {
                const dot = document.createElement('div');
                dot.className = 'net-dot c' + (Math.floor(Math.random() * 4) + 1);
                dot.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s`;
                bg.appendChild(dot);
            }
            for (let i = 0; i < 5; i++) {
                const line = document.createElement('div');
                line.className = 'net-line';
                line.style.cssText = `left:${Math.random()*80}%;top:${Math.random()*80}%;width:${60+Math.random()*100}px;transform:rotate(${Math.random()*360}deg)`;
                bg.appendChild(line);
            }
        })();

        // ============================================================
        // HELPERS
        // ============================================================
        function toast(m, d = 2000) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.display = 'block';
            clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', d);
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function showModal(id) { document.getElementById(id).classList.add('show'); }

        // ============================================================
        // SUPABASE FUNCTIONS (Fixed UUID handling)
        // ============================================================
        async function getOrCreateUser() {
            let { data } = await ZAKH.from('users').select('id').eq('email', EMAIL).maybeSingle();
            if (!data) {
                await ZAKH.from('users').insert({ email: EMAIL, username: 'User' });
                return getOrCreateUser();
            }
            return data;
        }

        async function checkLimit() {
            try {
                const { data } = await ZAKH.rpc('check_daily_limit', { user_email: EMAIL });
                return data || { can_ask: true, remaining: 50, total: 50 };
            } catch (e) { return { can_ask: true, remaining: 50, total: 50 }; }
        }

        async function incUsage() {
            try { await ZAKH.rpc('increment_usage', { user_email: EMAIL }); } catch (e) {}
        }

        async function loadChats() {
            const user = await getOrCreateUser();
            const { data } = await ZAKH.from('conversations').select('*').eq('user_id', user.id).order('updated_at', { ascending: false });
            return data || [];
        }

        async function createChat(title = 'New Chat') {
            const user = await getOrCreateUser();
            const { data } = await ZAKH.from('conversations').insert({ user_id: user.id, title }).select().single();
            return data;
        }

        async function delChat(id) {
            await ZAKH.from('conversations').delete().eq('id', id);
        }

        async function renameChat(id, title) {
            await ZAKH.from('conversations').update({ title, updated_at: new Date().toISOString() }).eq('id', id);
        }

        async function loadMsgs(convId) {
            // FIX: Only query if valid UUID
            if (!convId || convId.length < 30) return [];
            try {
                const { data } = await ZAKH.from('messages').select('*').eq('conversation_id', convId).order('created_at', { ascending: true });
                return data || [];
            } catch (e) { return []; }
        }

        async function saveMsg(convId, role, content, engine) {
            if (!convId || convId.length < 30) return;
            try {
                await ZAKH.from('messages').insert({ conversation_id: convId, role, content, engine });
                await ZAKH.from('conversations').update({ updated_at: new Date().toISOString() }).eq('id', convId);
            } catch (e) {}
        }

        // ============================================================
        // RENDER
        // ============================================================
        async function renderChats() {
            const chats = await loadChats();
            const list = document.getElementById('chatList');
            list.innerHTML = chats.length ? chats.map(c => `
                <div class="chat-item ${c.id === chatId ? 'active' : ''}" onclick="openChat('${c.id}')">
                    <span class="chat-item-title">${c.title}</span>
                    <div class="chat-item-actions">
                        <button onclick="event.stopPropagation();renamePrompt('${c.id}','${c.title}')">✏️</button>
                        <button onclick="event.stopPropagation();deleteChatConfirm('${c.id}')">🗑️</button>
                    </div>
                </div>`).join('') : '<div style="text-align:center;color:var(--text2);padding:20px;font-size:12px">No chats yet</div>';
        }

        async function openChat(id) {
            chatId = id;
            const container = document.getElementById('chatContainer');
            const msgs = await loadMsgs(id);
            
            if (!msgs || msgs.length === 0) {
                container.innerHTML = `<div class="welcome-msg"><div class="welcome-icon">🧠</div><h2>Zakhourani AI</h2><p>Start the conversation</p></div>`;
            } else {
                container.innerHTML = msgs.map(m => {
                    const content = m.content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
                    return `<div class="msg ${m.role === 'user' ? 'msg-user' : 'msg-ai'}">${content}<div class="powered-by">⚡ Powered by Zakhourani</div></div>`;
                }).join('');
            }
            
            container.scrollTop = container.scrollHeight;
            renderChats();
            toggleSidebar();
        }

        async function newChat() {
            const chat = await createChat();
            chatId = chat.id;
            document.getElementById('chatContainer').innerHTML = `<div class="welcome-msg"><div class="welcome-icon">🧠</div><h2>Zakhourani AI</h2><p>New conversation</p></div>`;
            renderChats();
            toggleSidebar();
        }

        async function deleteChatConfirm(id) {
            if (!confirm('Delete this chat?')) return;
            await delChat(id);
            if (chatId === id) {
                const chats = await loadChats();
                chats.length ? openChat(chats[0].id) : newChat();
            }
            renderChats();
            toast('Deleted');
        }

        async function renamePrompt(id, old) {
            const t = prompt('Rename:', old);
            if (t && t.trim()) { await renameChat(id, t.trim()); renderChats(); }
        }

        async function clearChat() {
            if (!chatId || !confirm('Clear messages?')) return;
            document.getElementById('chatContainer').innerHTML = `<div class="welcome-msg"><div class="welcome-icon">🧠</div><h2>Zakhourani AI</h2><p>Chat cleared</p></div>`;
            toast('Cleared');
        }

        async function exportChat() {
            const msgs = await loadMsgs(chatId);
            if (!msgs.length) { toast('Nothing to export'); return; }
            const txt = msgs.map(m => `[${m.role}] ${m.content}`).join('\n\n');
            const blob = new Blob([txt], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'zakhourani-chat.txt';
            a.click();
            toast('Exported!');
        }

        // ============================================================
        // SEND MESSAGE
        // ============================================================
        async function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || busy) return;
            
            const limit = await checkLimit();
            if (!limit.can_ask) { showModal('limitModal'); updateLimitTimer(); return; }
            
            busy = true;
            document.getElementById('sendBtn').disabled = true;
            
            if (!chatId) { const c = await createChat(); chatId = c.id; renderChats(); }
            
            // Add user message to DOM
            const container = document.getElementById('chatContainer');
            if (document.getElementById('welcomeBlock')) container.innerHTML = '';
            const userDiv = document.createElement('div');
            userDiv.className = 'msg msg-user';
            userDiv.textContent = text;
            container.appendChild(userDiv);
            
            await saveMsg(chatId, 'user', text, 'Zakhourani');
            await incUsage();
            await updateUsageUI();
            input.value = '';
            
            // Typing
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
            
            try {
                const r = await fetch(WORKER, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, history: [] })
                });
                const d = await r.json();
                typing.remove();
                
                if (d.success && d.reply) {
                    const aiDiv = document.createElement('div');
                    aiDiv.className = 'msg msg-ai';
                    aiDiv.innerHTML = d.reply.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>') + '<div class="powered-by">⚡ Powered by Zakhourani</div>';
                    container.appendChild(aiDiv);
                    await saveMsg(chatId, 'assistant', d.reply, 'Zakhourani');
                    
                    // Update title on first message
                    const msgs = await loadMsgs(chatId);
                    if (msgs.length <= 2) {
                        const title = text.substring(0, 35) + (text.length > 35 ? '...' : '');
                        await renameChat(chatId, title);
                    }
                    renderChats();
                }
            } catch (e) {
                typing.remove();
                const aiDiv = document.createElement('div');
                aiDiv.className = 'msg msg-ai';
                aiDiv.innerHTML = "I'm Zakhourani AI. How can I assist you?<div class='powered-by'>⚡ Powered by Zakhourani</div>";
                container.appendChild(aiDiv);
            }
            
            container.scrollTop = container.scrollHeight;
            busy = false;
            document.getElementById('sendBtn').disabled = false;
            input.focus();
        }

        async function updateUsageUI() {
            const l = await checkLimit();
            document.getElementById('usageTxt').textContent = `${l.remaining}/${l.total} remaining`;
            document.getElementById('usageFill').style.width = (l.remaining / l.total * 100) + '%';
        }

        function updateLimitTimer() {
            const el = document.getElementById('limitTimer');
            const update = () => {
                const now = new Date(), tmr = new Date(now);
                tmr.setDate(tmr.getDate() + 1); tmr.setHours(0, 0, 0, 0);
                const diff = tmr - now;
                el.textContent = `⏰ Resets in ${Math.floor(diff/3600000)}h ${Math.floor((diff%3600000)/60000)}m`;
            };
            update(); setInterval(update, 60000);
        }

        // ============================================================
        // EVENTS
        // ============================================================
        document.getElementById('msgInput').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
        });
        document.querySelectorAll('.chip').forEach(c => {
            c.addEventListener('click', () => {
                document.getElementById('msgInput').value = c.dataset.prompt;
                sendMsg();
            });
        });

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            await ZAKH.from('users').upsert({ email: EMAIL, username: 'Zakhourani User' }, { onConflict: 'email' });
            await updateUsageUI();
            
            let chats = await loadChats();
            if (!chats.length) {
                const c = await createChat();
                chats = [c];
            }
            chatId = chats[0].id;
            await openChat(chatId);
            document.getElementById('msgInput').focus();
        }
        init();
    </script>
</body>
</html>
