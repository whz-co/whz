<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zakhourani AI - Database Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e17;
            --bg-card: #111827;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --border: rgba(148, 163, 184, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Loading */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 20px;
        }

        #loader.hidden {
            display: none;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .progress-bar {
            width: 280px;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue), var(--purple));
            width: 0%;
            transition: width 0.4s;
        }

        /* Nav */
        nav {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 18px;
        }

        .nav-brand i {
            color: var(--blue);
            font-size: 22px;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
        }

        .nav-tab {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .nav-tab:hover {
            color: var(--text);
            background: rgba(255,255,255,0.05);
        }

        .nav-tab.active {
            background: var(--blue);
            color: white;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255,255,255,0.05);
        }

        .btn-primary {
            background: var(--blue);
            border-color: var(--blue);
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 11px;
        }

        /* Main */
        main {
            padding: 24px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
        }

        .stat-card .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .stat-icon.blue { background: rgba(59,130,246,0.15); color: var(--blue); }
        .stat-icon.purple { background: rgba(139,92,246,0.15); color: var(--purple); }
        .stat-icon.green { background: rgba(16,185,129,0.15); color: var(--green); }
        .stat-icon.red { background: rgba(239,68,68,0.15); color: var(--red); }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 26px;
            font-weight: 800;
            margin-top: 2px;
        }

        .stat-card .sub {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .chart-card.full {
            grid-column: 1 / -1;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chart-header h3 {
            font-size: 15px;
            font-weight: 600;
        }

        .chart-wrap {
            position: relative;
            height: 320px;
        }

        /* Table */
        .table-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .table-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .table-controls select,
        .table-controls input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 12px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .table-controls select:focus,
        .table-controls input:focus {
            border-color: var(--blue);
        }

        .table-wrap {
            overflow-x: auto;
            max-height: 450px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            background: var(--bg);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tr:hover td {
            background: rgba(255,255,255,0.02);
        }

        .null {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 12px;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-true { background: rgba(16,185,129,0.15); color: var(--green); }
        .badge-false { background: rgba(239,68,68,0.15); color: var(--red); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 20px;
            z-index: 200;
            font-size: 13px;
            animation: slideIn 0.3s ease;
            max-width: 400px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 28px;
            display: block;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .nav-tabs {
                display: none;
            }
            main {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">Connecting to database...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div style="font-size:11px;color:var(--text-secondary);" id="loaderDetail"></div>
    </div>

    <!-- App -->
    <div id="app" style="display:none;">
        <!-- Nav -->
        <nav>
            <div class="nav-brand">
                <i class="fas fa-brain"></i> Zakhourani AI
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-page="dashboard"><i class="fas fa-chart-bar"></i> Dashboard</button>
                <button class="nav-tab" data-page="explorer"><i class="fas fa-table"></i> Explorer</button>
                <button class="nav-tab" data-page="daily"><i class="fas fa-calendar-day"></i> Daily Data</button>
            </div>
            <div class="nav-actions">
                <span class="status-indicator"><span class="status-dot"></span> Connected</span>
                <button class="btn btn-sm" onclick="refreshAll()"><i class="fas fa-sync-alt"></i></button>
            </div>
        </nav>

        <!-- Main -->
        <main>
            <!-- Dashboard -->
            <div class="page active" id="page-dashboard">
                <div class="stats-row" id="statsRow"></div>

                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-line" style="color:var(--blue);"></i> Records Over Time (Monthly)</h3>
                        </div>
                        <div class="chart-wrap">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-pie" style="color:var(--purple);"></i> Table Distribution</h3>
                        </div>
                        <div class="chart-wrap">
                            <canvas id="pieChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="chart-card full">
                    <div class="chart-header">
                        <h3><i class="fas fa-calendar-alt" style="color:var(--green);"></i> Daily Activity (Last 30 Days)</h3>
                    </div>
                    <div class="chart-wrap">
                        <canvas id="dailyChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Explorer -->
            <div class="page" id="page-explorer">
                <div class="table-section">
                    <div class="table-controls">
                        <select id="tableSelect" onchange="loadTable()">
                            <option value="">-- Select table --</option>
                        </select>
                        <input type="text" id="searchInput" placeholder="Search records..." oninput="filterTable()" />
                        <select id="limitSelect" onchange="loadTable()">
                            <option value="25">25 rows</option>
                            <option value="50" selected>50 rows</option>
                            <option value="100">100 rows</option>
                            <option value="500">500 rows</option>
                        </select>
                        <button class="btn btn-primary btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
                    </div>
                    <div class="table-wrap" id="tableContent">
                        <div class="empty-state"><i class="fas fa-arrow-up"></i> Select a table to view data</div>
                    </div>
                    <div style="margin-top:8px;font-size:12px;color:var(--text-secondary);" id="recordInfo"></div>
                </div>
            </div>

            <!-- Daily -->
            <div class="page" id="page-daily">
                <div class="table-section">
                    <div class="table-controls">
                        <label style="color:var(--text-secondary);font-size:13px;">Select Date:</label>
                        <input type="date" id="dailyDate" onchange="loadDailyData()" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-family:'Inter',sans-serif;" />
                        <button class="btn btn-primary btn-sm" onclick="loadDailyData()"><i class="fas fa-search"></i> Load</button>
                    </div>
                    <div id="dailyContent">
                        <div class="empty-state"><i class="fas fa-calendar"></i> Select a date to see what data was added</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer"></div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://wkgldyfxsmkjyallrdtq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZ2xkeWZ4c21ranlhbGxyZHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTg0OTQsImV4cCI6MjA5MjkzNDQ5NH0.WgXSHB6teuUiEKYgeR2ADAK-8A_6VnbEl-wv0RSuxjA';

        // ============================================================
        // STATE
        // ============================================================
        const db = {};
        let client = null;
        let activeTable = '';
        let activeData = [];
        let charts = {};

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            try {
                setLoader('Initializing Supabase client...', 10, '');
                client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                setLoader('Discovering tables...', 25, 'Scanning database');
                await discoverTables();

                if (db.tables.length === 0) {
                    setLoader('No tables found', 100, 'Check your Supabase project');
                    document.getElementById('loaderText').textContent = '❌ No tables found in public schema';
                    return;
                }

                setLoader(`Found ${db.tables.length} tables`, 40, 'Loading counts...');
                await loadCounts();

                setLoader('Loading schemas...', 60, 'Reading table structures');
                await loadSchemas();

                setLoader('Setting up charts...', 85, 'Preparing dashboard');
                
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('app').style.display = 'block';
                    setupAll();
                    toast('✅ Platform ready! Real data loaded.', 'success');
                }, 300);

            } catch (e) {
                console.error(e);
                setLoader('Error', 100, e.message);
                document.getElementById('loaderText').textContent = '❌ ' + e.message;
            }
        }

        function setLoader(text, percent, detail) {
            document.getElementById('loaderText').textContent = text;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('loaderDetail').textContent = detail;
        }

        // ============================================================
        // DISCOVER TABLES
        // ============================================================
        async function discoverTables() {
            db.tables = [];
            db.counts = {};
            db.schemas = {};

            const candidates = [
                'users', 'daily_usage', 'transactions', 'questions',
                'profiles', 'messages', 'notifications', 'payments',
                'subscriptions', 'logs', 'sessions', 'settings'
            ];

            for (const name of candidates) {
                const exists = await tableExists(name);
                if (exists) {
                    db.tables.push(name);
                }
            }

            // If nothing found, try a direct query for common tables
            if (db.tables.length === 0) {
                for (const name of ['users', 'daily_usage']) {
                    try {
                        const { error } = await client.from(name).select('count', { count: 'exact', head: true });
                        if (!error || error.code !== '42P01') {
                            db.tables.push(name);
                        }
                    } catch(e) {}
                }
            }

            console.log('✅ Tables found:', db.tables);
        }

        async function tableExists(name) {
            try {
                const { error } = await client.from(name).select('count', { count: 'exact', head: true });
                // If no error, table exists (even if empty)
                // If error code is not '42P01' (undefined_table), it might still exist
                return !error || (error && error.code !== '42P01');
            } catch(e) {
                return false;
            }
        }

        // ============================================================
        // LOAD COUNTS
        // ============================================================
        async function loadCounts() {
            for (const table of db.tables) {
                try {
                    const { count, error } = await client
                        .from(table)
                        .select('*', { count: 'exact', head: true });
                    db.counts[table] = error ? 0 : (count || 0);
                } catch(e) {
                    db.counts[table] = 0;
                }
            }
        }

        // ============================================================
        // LOAD SCHEMAS
        // ============================================================
        async function loadSchemas() {
            for (const table of db.tables) {
                try {
                    const { data, error } = await client
                        .from(table)
                        .select('*')
                        .limit(1);
                    
                    if (!error && data && data.length > 0) {
                        db.schemas[table] = Object.keys(data[0]);
                    } else {
                        // Table might be empty - try to get column info another way
                        db.schemas[table] = [];
                        // Try with a simple query
                        try {
                            const { data: d2 } = await client.from(table).select('*').limit(0);
                            if (d2 !== null) {
                                // Can't determine columns from empty set
                                db.schemas[table] = [];
                            }
                        } catch(e) {
                            db.schemas[table] = [];
                        }
                    }
                } catch(e) {
                    db.schemas[table] = [];
                }
            }
        }

        // ============================================================
        // SETUP
        // ============================================================
        function setupAll() {
            setupNav();
            setupCharts();
            renderStats();
            populateTableSelect();
            updateCharts();
        }

        function setupNav() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    
                    const page = this.dataset.page;
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById('page-' + page).classList.add('active');
                    
                    if (page === 'dashboard') updateCharts();
                    if (page === 'daily') {
                        document.getElementById('dailyDate').value = new Date().toISOString().split('T')[0];
                    }
                });
            });
        }

        // ============================================================
        // CHARTS
        // ============================================================
        function setupCharts() {
            // Trend
            const trendCtx = document.getElementById('trendChart').getContext('2d');
            charts.trend = new Chart(trendCtx, {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { color: 'rgba(148,163,184,0.06)' } },
                        y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(148,163,184,0.06)' }, beginAtZero: true }
                    }
                }
            });

            // Pie
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            charts.pie = new Chart(pieCtx, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#ef4444','#06b6d4','#ec4899','#6366f1','#84cc16','#f97316'], borderColor: '#111827', borderWidth: 2 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 12, font: { size: 11 } } } }
                }
            });

            // Daily
            const dailyCtx = document.getElementById('dailyChart').getContext('2d');
            charts.daily = new Chart(dailyCtx, {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Records', data: [], backgroundColor: '#3b82f6', borderRadius: 4 }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#94a3b8', font: { size: 9 } }, grid: { display: false } },
                        y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(148,163,184,0.06)' }, beginAtZero: true }
                    }
                }
            });
        }

        async function updateCharts() {
            await updateTrendChart();
            await updatePieChart();
            await updateDailyChart();
        }

        async function updateTrendChart() {
            const months = [];
            const values = [];
            const now = new Date();

            for (let i = 11; i >= 0; i--) {
                const start = new Date(now.getFullYear(), now.getMonth() - i, 1);
                const end = new Date(now.getFullYear(), now.getMonth() - i + 1, 1);
                months.push(start.toLocaleString('default', { month: 'short' }));

                let total = 0;
                for (const table of db.tables) {
                    try {
                        const { count, error } = await client
                            .from(table)
                            .select('*', { count: 'exact', head: true })
                            .gte('created_at', start.toISOString())
                            .lt('created_at', end.toISOString());
                        if (!error && count) total += count;
                    } catch(e) {}
                }
                values.push(total);
            }

            charts.trend.data.labels = months;
            charts.trend.data.datasets = [{
                label: 'Records',
                data: values,
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59,130,246,0.1)',
                borderWidth: 2,
                fill: true,
                tension: 0.3,
                pointRadius: 3,
                pointBackgroundColor: '#3b82f6'
            }];
            charts.trend.update();
        }

        async function updatePieChart() {
            charts.pie.data.labels = db.tables;
            charts.pie.data.datasets[0].data = db.tables.map(t => db.counts[t] || 0);
            charts.pie.update();
        }

        async function updateDailyChart() {
            const labels = [];
            const values = [];

            for (let i = 29; i >= 0; i--) {
                const day = new Date();
                day.setDate(day.getDate() - i);
                const next = new Date(day);
                next.setDate(next.getDate() + 1);
                
                labels.push(day.toISOString().split('T')[0].substring(5));

                let total = 0;
                for (const table of db.tables) {
                    try {
                        const { count, error } = await client
                            .from(table)
                            .select('*', { count: 'exact', head: true })
                            .gte('created_at', day.toISOString())
                            .lt('created_at', next.toISOString());
                        if (!error && count) total += count;
                    } catch(e) {}
                }
                values.push(total);
            }

            charts.daily.data.labels = labels;
            charts.daily.data.datasets[0].data = values;
            charts.daily.update();
        }

        // ============================================================
        // STATS
        // ============================================================
        function renderStats() {
            const totalRecords = Object.values(db.counts).reduce((a,b) => a+b, 0);
            const today = new Date().toISOString().split('T')[0];

            document.getElementById('statsRow').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-table"></i></div>
                    <div class="label">Tables</div>
                    <div class="value">${db.tables.length}</div>
                    <div class="sub">in public schema</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon purple"><i class="fas fa-database"></i></div>
                    <div class="label">Total Records</div>
                    <div class="value">${totalRecords.toLocaleString()}</div>
                    <div class="sub">across all tables</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-calendar-check"></i></div>
                    <div class="label">Today</div>
                    <div class="value" id="statToday">-</div>
                    <div class="sub">${today}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red"><i class="fas fa-clock"></i></div>
                    <div class="label">Last Updated</div>
                    <div class="value" style="font-size:16px;" id="statUpdated">-</div>
                    <div class="sub">auto-refresh: 5min</div>
                </div>
            `;

            // Get today's count
            getTodayCount().then(count => {
                document.getElementById('statToday').textContent = count.toLocaleString();
            });

            document.getElementById('statUpdated').textContent = new Date().toLocaleTimeString();
        }

        async function getTodayCount() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            let total = 0;
            for (const table of db.tables) {
                try {
                    const { count, error } = await client
                        .from(table)
                        .select('*', { count: 'exact', head: true })
                        .gte('created_at', today.toISOString())
                        .lt('created_at', tomorrow.toISOString());
                    if (!error && count) total += count;
                } catch(e) {}
            }
            return total;
        }

        // ============================================================
        // TABLE EXPLORER
        // ============================================================
        function populateTableSelect() {
            const select = document.getElementById('tableSelect');
            select.innerHTML = '<option value="">-- Select table --</option>' +
                db.tables.map(t => `<option value="${t}">${t} (${(db.counts[t]||0).toLocaleString()} rows)</option>`).join('');
        }

        async function loadTable() {
            const table = document.getElementById('tableSelect').value;
            if (!table) return;

            activeTable = table;
            const limit = parseInt(document.getElementById('limitSelect').value) || 50;

            try {
                const { data, error } = await client
                    .from(table)
                    .select('*')
                    .limit(limit)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                activeData = data || [];
                renderTable(activeData);
                document.getElementById('recordInfo').textContent = 
                    `Showing ${activeData.length} of ${(db.counts[table]||0).toLocaleString()} records`;
            } catch(e) {
                document.getElementById('tableContent').innerHTML = 
                    `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i>Error: ${e.message}</div>`;
            }
        }

        function renderTable(data) {
            const wrap = document.getElementById('tableContent');

            if (!data || data.length === 0) {
                wrap.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>No data in this table</div>';
                return;
            }

            const cols = Object.keys(data[0]);
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = data;
            if (search) {
                filtered = data.filter(row =>
                    Object.values(row).some(v => 
                        v !== null && v !== undefined && String(v).toLowerCase().includes(search)
                    )
                );
            }

            let html = '<table><thead><tr>';
            cols.forEach(c => html += `<th>${c}</th>`);
            html += '</tr></thead><tbody>';

            filtered.forEach(row => {
                html += '<tr>';
                cols.forEach(c => {
                    const v = row[c];
                    if (v === null || v === undefined) {
                        html += '<td><span class="null">null</span></td>';
                    } else if (typeof v === 'boolean') {
                        html += `<td><span class="badge badge-${v}">${v}</span></td>`;
                    } else if (typeof v === 'object') {
                        html += `<td>${JSON.stringify(v).substring(0, 60)}</td>`;
                    } else {
                        const s = String(v);
                        html += `<td title="${s}">${s.length > 80 ? s.substring(0, 80) + '...' : s}</td>`;
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';

            if (filtered.length === 0 && search) {
                html = '<div class="empty-state"><i class="fas fa-search"></i>No results match your search</div>';
            }

            wrap.innerHTML = html;
        }

        function filterTable() {
            if (activeData.length > 0) renderTable(activeData);
        }

        function exportCSV() {
            if (!activeTable || activeData.length === 0) {
                toast('⚠️ Select a table with data first', 'error');
                return;
            }

            const cols = Object.keys(activeData[0]);
            let csv = cols.join(',') + '\n';
            
            activeData.forEach(row => {
                csv += cols.map(c => {
                    const v = row[c];
                    if (v === null || v === undefined) return '';
                    if (typeof v === 'object') return '"' + JSON.stringify(v).replace(/"/g, '""') + '"';
                    const s = String(v);
                    return s.includes(',') || s.includes('"') || s.includes('\n') ? 
                        '"' + s.replace(/"/g, '""') + '"' : s;
                }).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${activeTable}_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            toast('✅ CSV exported!', 'success');
        }

        // ============================================================
        // DAILY DATA
        // ============================================================
        async function loadDailyData() {
            const dateStr = document.getElementById('dailyDate').value;
            if (!dateStr) return;

            const date = new Date(dateStr);
            const nextDate = new Date(date);
            nextDate.setDate(nextDate.getDate() + 1);

            const container = document.getElementById('dailyContent');
            container.innerHTML = '<div style="text-align:center;padding:20px;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';

            let html = `<h4 style="margin-bottom:16px;">📅 Data added on ${date.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</h4>`;
            html += '<div style="display:grid;gap:10px;">';

            let grandTotal = 0;

            for (const table of db.tables) {
                try {
                    const { count, error } = await client
                        .from(table)
                        .select('*', { count: 'exact', head: true })
                        .gte('created_at', date.toISOString())
                        .lt('created_at', nextDate.toISOString());

                    const num = error ? 0 : (count || 0);
                    grandTotal += num;

                    html += `
                        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;">
                            <span style="font-weight:500;">📊 ${table}</span>
                            <span style="font-size:18px;font-weight:700;color:var(--blue);">${num.toLocaleString()}</span>
                        </div>`;
                } catch(e) {
                    html += `
                        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;">
                            <span style="font-weight:500;">📊 ${table}</span>
                            <span style="color:var(--text-secondary);">N/A</span>
                        </div>`;
                }
            }

            html += '</div>';
            html += `
                <div style="margin-top:16px;padding:16px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:10px;text-align:center;">
                    <span style="font-size:14px;font-weight:600;">Total records added: </span>
                    <span style="font-size:22px;font-weight:800;color:var(--blue);">${grandTotal.toLocaleString()}</span>
                </div>`;

            container.innerHTML = html;
        }

        // ============================================================
        // REFRESH
        // ============================================================
        async function refreshAll() {
            toast('🔄 Refreshing...', 'success');
            await loadCounts();
            renderStats();
            populateTableSelect();
            await updateCharts();
            toast('✅ Data refreshed!', 'success');
        }

        // Auto refresh every 5 minutes
        setInterval(async () => {
            await loadCounts();
            renderStats();
            if (document.getElementById('page-dashboard').classList.contains('active')) {
                await updateCharts();
            }
        }, 300000);

        // ============================================================
        // TOAST
        // ============================================================
        function toast(msg, type) {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            container.appendChild(el);
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transition = 'opacity 0.3s';
                setTimeout(() => el.remove(), 300);
            }, 3000);
        }

        // ============================================================
        // START
        // ============================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
