<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakhourani Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 Zakhourani Dictionary</h1>
            <p>Your trusted source for word definitions</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search for a word...">
                <button id="searchBtn">🔍 Search</button>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="noun">Nouns</button>
                <button class="filter-btn" data-filter="verb">Verbs</button>
                <button class="filter-btn" data-filter="adjective">Adjectives</button>
                <button class="filter-btn" data-filter="phrase">Phrases</button>
            </div>
        </div>

        <div class="stats">
            <span id="wordCount">0</span> words in dictionary
        </div>

        <div id="results" class="results-container">
            <!-- Search results will appear here -->
        </div>

        <div class="info-panel">
            <button id="showAllBtn" class="info-btn">📚 Show All Words</button>
            <button id="randomWordBtn" class="info-btn">🎲 Random Word</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
