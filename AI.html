<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zakhourani AI - Database Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e17;
            --bg-card: #111827;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --green: #10b981;
            --red: #ef4444;
            --yellow: #f59e0b;
            --border: rgba(148, 163, 184, 0.1);
            --glow: 0 0 30px rgba(59,130,246,0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Loading */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            gap: 20px;
        }

        #loader.hidden { display: none; }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader-text { color: var(--text-secondary); font-size: 14px; }
        .progress-bar { width: 280px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); width: 0%; transition: width 0.4s; }

        /* Nav */
        nav {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-brand:hover { transform: scale(1.02); }

        .nav-brand i {
            color: var(--blue);
            font-size: 22px;
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(59,130,246,0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(59,130,246,0.6)); }
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
        }

        .nav-tab {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            position: relative;
        }

        .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .nav-tab.active { background: var(--blue); color: white; }

        .nav-tab .badge-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            display: inline-block;
            margin-left: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { background: rgba(255,255,255,0.05); transform: translateY(-1px); }
        .btn-primary { background: var(--blue); border-color: var(--blue); color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
        .btn-sm { padding: 5px 10px; font-size: 11px; }

        .btn-home {
            background: var(--purple);
            border-color: var(--purple);
            color: white;
        }

        .btn-home:hover {
            background: #7c3aed;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(139,92,246,0.3);
        }

        /* Main */
        main {
            padding: 24px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            transition: all 0.3s;
            cursor: default;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow);
            border-color: var(--blue);
        }

        .stat-card .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .stat-icon.blue { background: rgba(59,130,246,0.15); color: var(--blue); }
        .stat-icon.purple { background: rgba(139,92,246,0.15); color: var(--purple); }
        .stat-icon.green { background: rgba(16,185,129,0.15); color: var(--green); }
        .stat-icon.red { background: rgba(239,68,68,0.15); color: var(--red); }
        .stat-icon.yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }

        .stat-card .label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .stat-card .value { font-size: 26px; font-weight: 800; margin-top: 2px; }
        .stat-card .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

        .stat-card .trend-up { color: var(--green); font-size: 12px; }
        .stat-card .trend-down { color: var(--red); font-size: 12px; }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 1024px) { .charts-grid { grid-template-columns: 1fr; } }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .chart-card:hover { border-color: rgba(59,130,246,0.2); box-shadow: var(--glow); }
        .chart-card.full { grid-column: 1 / -1; }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chart-header h3 { font-size: 15px; font-weight: 600; }
        .chart-wrap { position: relative; height: 320px; }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .filter-bar input,
        .filter-bar select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 12px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .filter-bar input:focus,
        .filter-bar select:focus { border-color: var(--blue); }

        .filter-bar .filter-label { font-size: 12px; color: var(--text-secondary); }

        /* Table */
        .table-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        .table-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .table-controls select,
        .table-controls input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 12px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .table-controls select:focus,
        .table-controls input:focus { border-color: var(--blue); }

        .table-wrap {
            overflow-x: auto;
            max-height: 450px;
            overflow-y: auto;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            background: var(--bg);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: background 0.2s;
        }

        tr:hover td { background: rgba(255,255,255,0.02); }
        .null { color: var(--text-secondary); font-style: italic; font-size: 12px; }

        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-true { background: rgba(16,185,129,0.15); color: var(--green); }
        .badge-false { background: rgba(239,68,68,0.15); color: var(--red); }

        /* Sound Toggle */
        .sound-toggle {
            position: fixed;
            bottom: 24px;
            left: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            transition: all 0.3s;
            color: var(--text-secondary);
        }

        .sound-toggle:hover {
            transform: scale(1.1);
            border-color: var(--blue);
            color: var(--text);
        }

        .sound-toggle.active { color: var(--green); }

        /* Typing animation */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--blue);
            margin-left: 2px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .typing-text {
            display: inline;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 20px;
            z-index: 200;
            font-size: 13px;
            animation: slideIn 0.3s ease;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--red); }
        .toast.info { border-color: var(--blue); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state i { font-size: 28px; display: block; margin-bottom: 10px; }

        /* Progress ring for daily limit */
        .progress-ring {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .progress-ring circle {
            transition: stroke-dashoffset 0.5s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .nav-tabs { display: none; }
            main { padding: 16px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .sound-toggle { bottom: 16px; left: 16px; width: 38px; height: 38px; }
        }

        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr; }
            .chart-wrap { height: 220px; }
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">Connecting to database...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div style="font-size:11px;color:var(--text-secondary);" id="loaderDetail"></div>
    </div>

    <!-- Sound Toggle -->
    <div class="sound-toggle active" id="soundToggle" title="Toggle sound">
        <i class="fas fa-volume-up"></i>
    </div>

    <!-- App -->
    <div id="app" style="display:none;">
        <!-- Nav -->
        <nav>
            <div class="nav-brand" onclick="goHome()">
                <i class="fas fa-brain"></i> Zakhourani AI
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-page="dashboard"><i class="fas fa-chart-bar"></i> Dashboard <span class="badge-dot"></span></button>
                <button class="nav-tab" data-page="explorer"><i class="fas fa-table"></i> Explorer</button>
                <button class="nav-tab" data-page="daily"><i class="fas fa-calendar-day"></i> Daily Data</button>
                <button class="nav-tab" data-page="analytics"><i class="fas fa-chart-pie"></i> Analytics</button>
            </div>
            <div class="nav-actions">
                <span class="status-indicator"><span class="status-dot"></span> Connected</span>
                <button class="btn btn-sm" onclick="refreshAll()"><i class="fas fa-sync-alt"></i></button>
                <button class="btn btn-sm btn-home" onclick="goHome()" title="Return to Main"><i class="fas fa-home"></i></button>
            </div>
        </nav>

        <!-- Main -->
        <main>
            <!-- Dashboard -->
            <div class="page active" id="page-dashboard">
                <!-- Stats -->
                <div class="stats-row" id="statsRow"></div>

                <!-- Filter Bar -->
                <div class="filter-bar">
                    <span class="filter-label"><i class="fas fa-filter"></i> Filters:</span>
                    <input type="text" id="dashboardSearch" placeholder="Search data..." oninput="filterDashboard()" />
                    <select id="dashboardTableFilter" onchange="filterDashboard()">
                        <option value="">All Tables</option>
                    </select>
                    <select id="dashboardDateFilter" onchange="filterDashboard()">
                        <option value="7">Last 7 days</option>
                        <option value="30" selected>Last 30 days</option>
                        <option value="90">Last 90 days</option>
                        <option value="365">Last year</option>
                    </select>
                    <button class="btn btn-sm btn-primary" onclick="refreshAll()"><i class="fas fa-undo"></i> Reset</button>
                </div>

                <!-- Charts -->
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-line" style="color:var(--blue);"></i> Records Over Time</h3>
                        </div>
                        <div class="chart-wrap">
                            <canvas id="trendChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-header">
                            <h3><i class="fas fa-chart-pie" style="color:var(--purple);"></i> Table Distribution</h3>
                        </div>
                        <div class="chart-wrap">
                            <canvas id="pieChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="chart-card full">
                    <div class="chart-header">
                        <h3><i class="fas fa-calendar-alt" style="color:var(--green);"></i> Daily Activity</h3>
                    </div>
                    <div class="chart-wrap">
                        <canvas id="dailyChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Explorer -->
            <div class="page" id="page-explorer">
                <div class="table-section">
                    <div class="table-controls">
                        <select id="tableSelect" onchange="loadTable()">
                            <option value="">-- Select table --</option>
                        </select>
                        <input type="text" id="searchInput" placeholder="Search records..." oninput="filterTable()" />
                        <select id="limitSelect" onchange="loadTable()">
                            <option value="25">25 rows</option>
                            <option value="50" selected>50 rows</option>
                            <option value="100">100 rows</option>
                            <option value="500">500 rows</option>
                        </select>
                        <button class="btn btn-primary btn-sm" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
                        <button class="btn btn-sm" onclick="loadTable()"><i class="fas fa-refresh"></i> Refresh</button>
                    </div>
                    <div class="table-wrap" id="tableContent">
                        <div class="empty-state"><i class="fas fa-arrow-up"></i> Select a table to view data</div>
                    </div>
                    <div style="margin-top:8px;font-size:12px;color:var(--text-secondary);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;">
                        <span id="recordInfo"></span>
                        <span id="tableStats"></span>
                    </div>
                </div>
            </div>

            <!-- Daily -->
            <div class="page" id="page-daily">
                <div class="table-section">
                    <div class="table-controls">
                        <label style="color:var(--text-secondary);font-size:13px;"><i class="fas fa-calendar"></i> Select Date:</label>
                        <input type="date" id="dailyDate" onchange="loadDailyData()" />
                        <button class="btn btn-primary btn-sm" onclick="loadDailyData()"><i class="fas fa-search"></i> Load</button>
                        <button class="btn btn-sm" onclick="document.getElementById('dailyDate').value = new Date().toISOString().split('T')[0]; loadDailyData();"><i class="fas fa-today"></i> Today</button>
                    </div>
                    <div id="dailyContent">
                        <div class="empty-state"><i class="fas fa-calendar"></i> Select a date to see what data was added</div>
                    </div>
                </div>
            </div>

            <!-- Analytics -->
            <div class="page" id="page-analytics">
                <div class="stats-row" id="analyticsStats"></div>
                <div class="charts-grid">
                    <div class="chart-card full">
                        <div class="chart-header">
                            <h3><i class="fas fa-arrow-trend-up" style="color:var(--yellow);"></i> Growth Rate</h3>
                        </div>
                        <div class="chart-wrap">
                            <canvas id="growthChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="table-section">
                    <h4 style="margin-bottom:12px;"><i class="fas fa-trophy" style="color:var(--yellow);"></i> Top Performing Tables</h4>
                    <div id="topTables"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer"></div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://wkgldyfxsmkjyallrdtq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZ2xkeWZ4c21ranlhbGxyZHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTg0OTQsImV4cCI6MjA5MjkzNDQ5NH0.WgXSHB6teuUiEKYgeR2ADAK-8A_6VnbEl-wv0RSuxjA';

        // ============================================================
        // STATE
        // ============================================================
        const db = {};
        let client = null;
        let activeTable = '';
        let activeData = [];
        let charts = {};
        let isSoundOn = true;
        let typingInterval = null;

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            try {
                setLoader('Initializing Supabase client...', 10, '');
                client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                setLoader('Discovering tables...', 25, 'Scanning database');
                await discoverTables();

                if (db.tables.length === 0) {
                    setLoader('No tables found', 100, 'Check your Supabase project');
                    document.getElementById('loaderText').textContent = '❌ No tables found in public schema';
                    return;
                }

                setLoader(`Found ${db.tables.length} tables`, 40, 'Loading counts...');
                await loadCounts();

                setLoader('Loading schemas...', 60, 'Reading table structures');
                await loadSchemas();

                setLoader('Setting up charts...', 85, 'Preparing dashboard');
                
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('app').style.display = 'block';
                    setupAll();
                    toast('✅ Platform ready! Real data loaded.', 'success');
                }, 300);

            } catch (e) {
                console.error(e);
                setLoader('Error', 100, e.message);
                document.getElementById('loaderText').textContent = '❌ ' + e.message;
            }
        }

        function setLoader(text, percent, detail) {
            document.getElementById('loaderText').textContent = text;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('loaderDetail').textContent = detail;
        }

        // ============================================================
        // DISCOVER TABLES
        // ============================================================
        async function discoverTables() {
            db.tables = [];
            db.counts = {};
            db.schemas = {};

            const candidates = [
                'users', 'daily_usage', 'transactions', 'questions',
                'profiles', 'messages', 'notifications', 'payments',
                'subscriptions', 'logs', 'sessions', 'settings',
                'products', 'orders', 'reviews', 'comments'
            ];

            for (const name of candidates) {
                const exists = await tableExists(name);
                if (exists) {
                    db.tables.push(name);
                }
            }

            if (db.tables.length === 0) {
                for (const name of ['users', 'daily_usage']) {
                    try {
                        const { error } = await client.from(name).select('count', { count: 'exact', head: true });
                        if (!error || error.code !== '42P01') {
                            db.tables.push(name);
                        }
                    } catch(e) {}
                }
            }

            console.log('✅ Tables found:', db.tables);
        }

        async function tableExists(name) {
            try {

        async function getTodayCount() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            let total = 0;
            for (const table of db.tables) {
                try {
                    const { count, error } = await client
                        .from(table)
                        .select('*', { count: 'exact', head: true })
                        .gte('created_at', today.toISOString())
                        .lt('created_at', tomorrow.toISOString());
                    if (!error && count) total += count;
                } catch(e) {}
            }
            return total;
        }

        async function calculateGrowth() {
            const now = new Date();
            const start = new Date(now);
            start.setDate(start.getDate() - 30);
            const prevStart = new Date(start);
            prevStart.setDate(prevStart.getDate() - 30);

            let current = 0, previous = 0;

            for (const table of db.tables) {
                try {
                    const { count: c1 } = await client
                        .from(table)
                        .select('*', { count: 'exact', head: true })
                        .gte('created_at', start.toISOString());
                    if (c1) current += c1;

                    const { count: c2 } = await client
                        .from(table)
                        .select('*', { count: 'exact', head: true })
                        .gte('created_at', prevStart.toISOString())
                        .lt('created_at', start.toISOString());
                    if (c2) previous += c2;
                } catch(e) {}
            }

            if (previous === 0) return current > 0 ? 100 : 0;
            return ((current - previous) / previous) * 100;
        }

        function renderTable(data) {
            const wrap = document.getElementById('tableContent');

            if (!data || data.length === 0) {
                wrap.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>No data in this table</div>';
                return;
            }

            const cols = Object.keys(data[0]);
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = data;
            if (search) {
                filtered = data.filter(row =>
                    Object.values(row).some(v => 
                        v !== null && v !== undefined && String(v).toLowerCase().includes(search)
                    )
                );
            }

            let html = '<table><thead><tr>';
            cols.forEach(c => html += `<th>${c}</th>`);
            html += '</tr></thead><tbody>';

            filtered.forEach(row => {
                html += '<tr>';
                cols.forEach(c => {
                    const v = row[c];
                    if (v === null || v === undefined) {
                        html += '<td><span class="null">null</span></td>';
                    } else if (typeof v === 'boolean') {
                        html += `<td><span class="badge badge-${v}">${v}</span></td>`;
                    } else if (typeof v === 'object') {
                        html += `<td>${JSON.stringify(v).substring(0, 60)}</td>`;
                    } else {
                        const s = String(v);
                        html += `<td title="${s}">${s.length > 80 ? s.substring(0, 80) + '...' : s}</td>`;
                    }
                });
                html += '</tr>';
            });

            html += '</tbody></table>';

            if (filtered.length === 0 && search) {
                html = '<div class="empty-state"><i class="fas fa-search"></i>No results match your search</div>';
            }

            wrap.innerHTML = html;
        }

        function filterTable() {

        function exportCSV() {
            if (!activeTable || activeData.length === 0) {
                toast('⚠️ Select a table with data first', 'error');
                return;
            }

            const cols = Object.keys(activeData[0]);
            let csv = cols.join(',') + '\n';
            
            activeData.forEach(row => {
                csv += cols.map(c => {
                    const v = row[c];
                    if (v === null || v === undefined) return '';
                    if (typeof v === 'object') return '"' + JSON.stringify(v).replace(/"/g, '""') + '"';
                    const s = String(v);
                    return s.includes(',') || s.includes('"') || s.includes('\n') ? 
                        '"' + s.replace(/"/g, '""') + '"' : s;
                }).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${activeTable}_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            toast('✅ CSV exported!', 'success');
            if (isSoundOn) playSound();
        }

        // ============================================================
        // SOUND
        // ============================================================
        function playSound() {
            if (!isSoundOn) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 600;
                gainNode.gain.value = 0.1;
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.08);
            } catch(e) {}
        }

        // ============================================================
        // TOAST
        // ============================================================
        function toast(msg, type = 'info') {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = msg;
            container.appendChild(el);
            
            if (isSoundOn && type === 'success') playSound();
            
            setTimeout(() => {
                el.style.opacity = '0';
                el.style.transition = 'opacity 0.3s';
                setTimeout(() => el.remove(), 300);
            }, 3500);
        }

        // ============================================================
        // TYPING ANIMATION (for future use)
        // ============================================================
        function typeWriter(element, text, speed = 30) {
            return new Promise((resolve) => {
                if (typingInterval) clearInterval(typingInterval);
                let i = 0;
                element.innerHTML = '';
                
                typingInterval = setInterval(() => {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                    } else {
                        clearInterval(typingInterval);
                        resolve();
                    }
                }, speed);
            });
        }

        // ============================================================
        // AUTO REFRESH
        // ============================================================
        setInterval(async () => {
            await loadCounts();
            renderStats();
            if (document.getElementById('page-dashboard').classList.contains('active')) {
                await updateCharts();
            }
        }, 300000);

        // ============================================================
        // START
        // ============================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
