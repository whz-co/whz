<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Bets - X Lodon | رهاناتي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0a0f1a;
            --bg2: #111827;
            --bg3: #1a2332;
            --green: #00ff9d;
            --orange: #ff9800;
            --red: #ff5252;
            --blue: #00bcd4;
            --purple: #9c27b0;
            --text: #ffffff;
            --text2: #a0a8c9;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', 'Tajawal', sans-serif; 
            min-height: 100vh; 
        }
        
        .header { 
            background: var(--bg2); 
            padding: 12px 15px; 
            border-bottom: 2px solid var(--green); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .header-top { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            flex-wrap: wrap; 
            gap: 10px; 
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .back-btn { color: var(--green); text-decoration: none; font-size: 20px; transition: transform 0.2s; }
        .back-btn:hover { transform: scale(1.1); }
        .lang-toggle { 
            background: var(--bg3); 
            border: 1px solid var(--green); 
            color: var(--green); 
            padding: 5px 12px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 12px;
            transition: all 0.2s;
        }
        .lang-toggle:hover { background: var(--green); color: black; }
        
        .tabs { 
            display: flex; 
            gap: 5px; 
            overflow-x: auto; 
            padding-bottom: 3px; 
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { 
            padding: 8px 14px; 
            background: var(--bg3); 
            border-radius: 20px; 
            color: var(--text); 
            text-decoration: none; 
            font-size: 12px; 
            white-space: nowrap;
            transition: all 0.2s;
        }
        .tab:hover { background: rgba(0,255,157,0.2); }
        .tab.active { background: var(--green); color: black; font-weight: bold; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }
        
        /* Balance & Win Rate Bar */
        .balance-bar { 
            background: linear-gradient(135deg, var(--bg2), var(--bg3)); 
            padding: 15px 20px; 
            border-radius: 16px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid rgba(0,255,157,0.2); 
            flex-wrap: wrap; 
            gap: 10px; 
        }
        .balance-label { font-size: 13px; color: var(--text2); }
        .balance-amount { font-size: 26px; font-weight: bold; color: var(--green); }
        
        .win-rate-bar { 
            height: 4px; 
            background: var(--bg3); 
            border-radius: 2px; 
            margin-bottom: 15px; 
            overflow: hidden; 
        }
        .win-rate-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--green), #4caf50); 
            border-radius: 2px; 
            transition: width 0.5s ease; 
        }
        
        /* Stats Grid */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        .stat-box { 
            background: var(--bg2); 
            padding: 15px 10px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.2s; 
        }
        .stat-box:hover { 
            transform: translateY(-2px); 
            border-color: rgba(0,255,157,0.2); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .stat-box .val { font-size: 22px; font-weight: bold; }
        .stat-box .val.win { color: #4caf50; }
        .stat-box .val.lose { color: var(--red); }
        .stat-box .val.neutral { color: var(--orange); }
        .stat-box .lbl { font-size: 10px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-box .sub { font-size: 10px; margin-top: 3px; }
        
        /* Filters */
        .filter-row { 
            display: flex; 
            gap: 6px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .filter-chip { 
            padding: 8px 14px; 
            background: var(--bg3); 
            border: 1px solid transparent;
            border-radius: 25px; 
            color: var(--text2); 
            font-size: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
            white-space: nowrap;
        }
        .filter-chip:hover { border-color: var(--green); color: var(--text); }
        .filter-chip.active { background: var(--green); color: black; border-color: var(--green); }
        .filter-chip .count { 
            background: rgba(0,0,0,0.2); 
            padding: 2px 7px; 
            border-radius: 12px; 
            margin-left: 5px; 
            font-size: 10px; 
        }
        
        /* Bet Cards */
        .bet-card { 
            background: var(--bg2); 
            border-radius: 16px; 
            padding: 16px; 
            margin-bottom: 12px; 
            border-left: 5px solid var(--orange); 
            cursor: pointer; 
            transition: all 0.3s; 
            animation: fadeIn 0.3s ease; 
            position: relative;
        }
        .bet-card:hover { 
            transform: translateX(3px); 
            background: var(--bg3); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .bet-card.won { border-left-color: #4caf50; background: linear-gradient(135deg, var(--bg2), #0a1a0f); }
        .bet-card.lost { border-left-color: var(--red); background: linear-gradient(135deg, var(--bg2), #1a0a0a); }
        .bet-card.active { border-left-color: var(--orange); }
        .bet-card.cancelled { border-left-color: var(--purple); background: linear-gradient(135deg, var(--bg2), #1a0a2a); opacity: 0.85; }
        .bet-card.cashed-out { border-left-color: var(--blue); background: linear-gradient(135deg, var(--bg2), #0a2a2a); opacity: 0.85; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bet-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            flex-wrap: wrap; 
            gap: 8px; 
        }
        .bet-type-tag { 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 10px; 
            font-weight: 700; 
            letter-spacing: 0.5px;
        }
        .bet-type-tag.single { background: rgba(0,255,157,0.15); color: var(--green); }
        .bet-type-tag.accumulator { background: rgba(255,152,0,0.15); color: var(--orange); }
        .bet-ticket-num { 
            font-size: 10px; 
            color: var(--text2); 
            font-family: monospace; 
            background: rgba(0,0,0,0.3); 
            padding: 2px 8px; 
            border-radius: 8px; 
        }
        
        .bet-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .bet-status-badge.won { background: rgba(76,175,80,0.2); color: #4caf50; }
        .bet-status-badge.lost { background: rgba(255,82,82,0.2); color: var(--red); }
        .bet-status-badge.active { background: rgba(255,152,0,0.2); color: var(--orange); animation: pulse 2s infinite; }
        .bet-status-badge.cancelled { background: rgba(156,39,176,0.2); color: var(--purple); }
        .bet-status-badge.cashed-out { background: rgba(0,188,212,0.2); color: var(--blue); }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        
        .bet-body { margin-bottom: 12px; }
        .bet-match-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .team-logo-small { 
            width: 32px; 
            height: 32px; 
            object-fit: contain; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.1); 
            padding: 4px; 
        }
        .bet-match-name { 
            font-weight: 600; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            flex-wrap: wrap; 
        }
        .bet-pick { color: var(--green); font-size: 12px; margin-top: 4px; }
        .bet-odds { color: var(--orange); font-size: 13px; font-weight: bold; }
        .bet-league { font-size: 10px; color: var(--text2); margin-top: 4px; }
        
        .bet-score-display {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            font-family: monospace;
        }
        
        .bet-details-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            margin: 12px 0; 
            font-size: 11px; 
        }
        .bet-detail { text-align: center; }
        .bet-detail .lbl { color: var(--text2); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
        .bet-detail .val { font-weight: 700; font-size: 13px; margin-top: 2px; }
        
        .selections-container { 
            margin-top: 10px; 
            padding: 10px; 
            background: rgba(0,0,0,0.2); 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .selection-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 6px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 11px; 
        }
        .selection-item:last-child { border-bottom: none; }
        .selection-match { flex: 1; font-weight: 500; }
        .selection-pick { color: var(--green); font-size: 10px; }
        .selection-odds { color: var(--orange); font-weight: bold; }
        .selection-status { font-size: 14px; }
        
        .settlement-timer { 
            font-family: monospace; 
            font-size: 11px; 
            background: rgba(0,0,0,0.3); 
            padding: 4px 10px; 
            border-radius: 8px; 
            display: inline-block; 
            margin-top: 8px; 
        }
        .settlement-timer.urgent { color: var(--orange); animation: pulse 1s infinite; }
        
        .bet-result-row { 
            padding: 10px; 
            border-radius: 8px; 
            margin-top: 10px; 
            font-size: 12px; 
            background: rgba(0,0,0,0.2);
        }
        .bet-result-row.won { border-left: 3px solid #4caf50; }
        .bet-result-row.lost { border-left: 3px solid var(--red); }
        
        .bet-timestamps { 
            font-size: 10px; 
            color: var(--text2); 
            margin-top: 8px; 
            display: flex; 
            justify-content: space-between; 
            flex-wrap: wrap; 
            gap: 8px; 
        }
        
        .bet-actions { 
            display: flex; 
            gap: 10px; 
            margin-top: 12px; 
            padding-top: 12px; 
            border-top: 1px solid rgba(255,255,255,0.05); 
        }
        .cancel-btn { 
            background: rgba(255,82,82,0.15); 
            color: var(--red); 
            border: 1px solid var(--red); 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 11px; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-weight: 600;
        }
        .cancel-btn:hover { background: var(--red); color: white; }
        .cashout-btn { 
            background: rgba(0,188,212,0.15); 
            color: var(--blue); 
            border: 1px solid var(--blue); 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 11px; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-weight: 600;
        }
        .cashout-btn:hover { background: var(--blue); color: black; }
        .btn-disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        /* Modal */
        .modal-overlay { 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            padding: 15px; 
        }
        .modal-overlay.show { display: flex; }
        .modal-content { 
            background: var(--bg2); 
            border-radius: 20px; 
            padding: 25px; 
            max-width: 550px; 
            width: 100%; 
            max-height: 85vh; 
            overflow-y: auto; 
            border: 2px solid var(--green); 
        }
        .modal-close { 
            background: none; 
            border: none; 
            color: var(--text2); 
            font-size: 24px; 
            cursor: pointer; 
            float: right; 
            transition: color 0.2s;
        }
        .modal-close:hover { color: var(--red); }
        .modal-section { margin-bottom: 20px; }
        .modal-section h4 { 
            color: var(--green); 
            font-size: 14px; 
            margin-bottom: 10px; 
            border-bottom: 1px solid rgba(0,255,157,0.2); 
            padding-bottom: 6px; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 13px; 
            flex-wrap: wrap; 
            gap: 8px; 
        }
        .modal-row .lbl { color: var(--text2); }
        
        /* Empty State */
        .empty-state { 
            text-align: center; 
            padding: 60px 20px; 
            color: var(--text2); 
        }
        .empty-state i { font-size: 60px; opacity: 0.2; margin-bottom: 15px; display: block; }
        
        /* Export Button */
        .export-btn { 
            background: rgba(0,255,157,0.1); 
            border: 1px solid var(--green); 
            color: var(--green); 
            padding: 8px 14px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-size: 11px; 
            transition: all 0.2s; 
            font-weight: 600;
        }
        .export-btn:hover { background: var(--green); color: black; }
        
        /* Loading */
        .loading-spinner { 
            display: inline-block; 
            width: 20px; 
            height: 20px; 
            border: 2px solid var(--green); 
            border-top-color: transparent; 
            border-radius: 50%; 
            animation: spin 0.6s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .notification { 
            position: fixed; 
            top: 20px; 
            right: 20px; 
            padding: 12px 20px; 
            border-radius: 10px; 
            z-index: 9999; 
            font-size: 13px; 
            font-weight: bold;
            animation: slideIn 0.3s ease; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            max-width: 350px;
        }
        .notification.success { background: #4caf50; color: white; }
        .notification.error { background: var(--red); color: white; }
        .notification.info { background: var(--orange); color: black; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Auto-settle indicator */
        .auto-settle-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,255,157,0.1);
            color: var(--green);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .bet-details-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 400px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

        // ===== AUTO-SETTLE LOGIC =====
        function determineBetResult(bet, match) {
            if (!match || !bet) return null;
            
            const goals = { home: match.goals_home || 0, away: match.goals_away || 0 };
            const htGoals = { home: match.ht_home || 0, away: match.ht_away || 0 };
            const totalGoals = goals.home + goals.away;
            const htTotal = htGoals.home + htGoals.away;
            
            const betType = bet.bet_type;
            let won = false;
            let reason = '';
            
            // Single bet settlement logic
            const settlementRules = {
                'home': () => { won = goals.home > goals.away; reason = `${goals.home}-${goals.away}`; },
                'draw': () => { won = goals.home === goals.away; reason = `${goals.home}-${goals.away}`; },
                'away': () => { won = goals.away > goals.home; reason = `${goals.home}-${goals.away}`; },
                '1X': () => { won = goals.home >= goals.away; reason = `${goals.home}-${goals.away}`; },
                '12': () => { won = goals.home !== goals.away; reason = `${goals.home}-${goals.away}`; },
                'X2': () => { won = goals.away >= goals.home; reason = `${goals.home}-${goals.away}`; },
                'home_dnb': () => { won = goals.home > goals.away; reason = `${goals.home}-${goals.away}`; },
                'away_dnb': () => { won = goals.away > goals.home; reason = `${goals.home}-${goals.away}`; },
                'over05': () => { won = totalGoals > 0.5; reason = `${totalGoals} goals`; },
                'under05': () => { won = totalGoals < 0.5; reason = `${totalGoals} goals`; },
                'over15': () => { won = totalGoals > 1.5; reason = `${totalGoals} goals`; },
                'under15': () => { won = totalGoals < 1.5; reason = `${totalGoals} goals`; },
                'over25': () => { won = totalGoals > 2.5; reason = `${totalGoals} goals`; },
                'under25': () => { won = totalGoals < 2.5; reason = `${totalGoals} goals`; },
                'over35': () => { won = totalGoals > 3.5; reason = `${totalGoals} goals`; },
                'under35': () => { won = totalGoals < 3.5; reason = `${totalGoals} goals`; },
                'over45': () => { won = totalGoals > 4.5; reason = `${totalGoals} goals`; },
                'under45': () => { won = totalGoals < 4.5; reason = `${totalGoals} goals`; },
                'over55': () => { won = totalGoals > 5.5; reason = `${totalGoals} goals`; },
                'under55': () => { won = totalGoals < 5.5; reason = `${totalGoals} goals`; },
                'btts_yes': () => { won = goals.home > 0 && goals.away > 0; reason = `BTTS ${won ? 'Yes' : 'No'}`; },
                'btts_no': () => { won = !(goals.home > 0 && goals.away > 0); reason = `BTTS ${won ? 'No' : 'Yes'}`; },
                'ht_home': () => { won = htGoals.home > htGoals.away; reason = `HT ${htGoals.home}-${htGoals.away}`; },
                'ht_draw': () => { won = htGoals.home === htGoals.away; reason = `HT ${htGoals.home}-${htGoals.away}`; },
                'ht_away': () => { won = htGoals.away > htGoals.home; reason = `HT ${htGoals.home}-${htGoals.away}`; },
                'ht_over05': () => { won = htTotal > 0.5; reason = `HT ${htTotal} goals`; },
                'ht_under05': () => { won = htTotal < 0.5; reason = `HT ${htTotal} goals`; },
                'ht_over15': () => { won = htTotal > 1.5; reason = `HT ${htTotal} goals`; },
                'ht_under15': () => { won = htTotal < 1.5; reason = `HT ${htTotal} goals`; },
            };
            
            // Check specific rules
            if (settlementRules[betType]) {
                settlementRules[betType]();
                return { won, reason: `${reason} | ${betType}` };
            }
            
            // Check over/under patterns
            if (betType.startsWith('over')) {
                const threshold = parseFloat(betType.replace('over', '').replace('_', '.'));
                if (!isNaN(threshold)) {
                    won = totalGoals > threshold;
                    return { won, reason: `${totalGoals} goals vs O${threshold}` };
                }
            }
            if (betType.startsWith('under')) {
                const threshold = parseFloat(betType.replace('under', '').replace('_', '.'));
                if (!isNaN(threshold)) {
                    won = totalGoals < threshold;
                    return { won, reason: `${totalGoals} goals vs U${threshold}` };
                }
            }
            
            // Asian handicap
            if (betType.startsWith('ah_home_')) {
                const handicap = parseFloat(betType.replace('ah_home_', '').replace('_', '.'));
                if (!isNaN(handicap)) {
                    const adjustedHome = goals.home + handicap;
                    won = adjustedHome > goals.away;
                    return { won, reason: `AH Home ${handicap}: ${goals.home}+${handicap}=${adjustedHome} vs ${goals.away}` };
                }
            }
            if (betType.startsWith('ah_away_')) {
                const handicap = parseFloat(betType.replace('ah_away_', '').replace('_', '.'));
                if (!isNaN(handicap)) {
                    const adjustedAway = goals.away + handicap;
                    won = adjustedAway > goals.home;
                    return { won, reason: `AH Away ${handicap}: ${goals.away}+${handicap}=${adjustedAway} vs ${goals.home}` };
                }
            }
            
            // Exact score
            if (betType.startsWith('exact_score_')) {
                const parts = betType.replace('exact_score_', '').split('_');
                const expectedHome = parseInt(parts[0]);
                const expectedAway = parseInt(parts[1]);
                won = goals.home === expectedHome && goals.away === expectedAway;
                return { won, reason: `Exact ${expectedHome}-${expectedAway} vs ${goals.home}-${goals.away}` };
            }
            
            // Total goals exact
            if (betType.startsWith('total_goals_')) {
                const goalStr = betType.replace('total_goals_', '');
                if (goalStr === '7plus') {
                    won = totalGoals >= 7;
                    return { won, reason: `Total: ${totalGoals} (7+)` };
                }
                const expected = parseInt(goalStr);
                won = totalGoals === expected;
                return { won, reason: `Total: ${totalGoals} (expected ${expected})` };
            }
            
            // HT/FT
            if (betType.startsWith('ht_ft_')) {
                const parts = betType.replace('ht_ft_', '').split('_');
                const htResult = parts[0]; // home, draw, away
                const ftResult = parts[1];
                
                let actualHT = 'draw';
                if (htGoals.home > htGoals.away) actualHT = 'home';
                else if (htGoals.away > htGoals.home) actualHT = 'away';
                
                let actualFT = 'draw';
                if (goals.home > goals.away) actualFT = 'home';
                else if (goals.away > goals.home) actualFT = 'away';
                
                won = (htResult === actualHT && ftResult === actualFT);
                return { won, reason: `HT/FT: ${actualHT}/${actualFT} (bet ${htResult}/${ftResult})` };
            }
            
            // Clean sheets
            if (betType === 'home_clean_sheet_yes') {
                won = goals.away === 0;
                return { won, reason: `Home CS: ${goals.away === 0 ? 'Yes' : 'No'}` };
            }
            if (betType === 'home_clean_sheet_no') {
                won = goals.away > 0;
                return { won, reason: `Home CS: ${goals.away > 0 ? 'No (conceded)' : 'Yes'}` };
            }
            if (betType === 'away_clean_sheet_yes') {
                won = goals.home === 0;
                return { won, reason: `Away CS: ${goals.home === 0 ? 'Yes' : 'No'}` };
            }
            if (betType === 'away_clean_sheet_no') {
                won = goals.home > 0;
                return { won, reason: `Away CS: ${goals.home > 0 ? 'No (conceded)' : 'Yes'}` };
            }
            
            // Second half
            if (betType.startsWith('2h_')) {
                const shGoals = { home: goals.home - htGoals.home, away: goals.away - htGoals.away };
                const shTotal = shGoals.home + shGoals.away;
                
                if (betType === '2h_home') won = shGoals.home > shGoals.away;
                else if (betType === '2h_draw') won = shGoals.home === shGoals.away;
                else if (betType === '2h_away') won = shGoals.away > shGoals.home;
                else if (betType === '2h_over05') won = shTotal > 0.5;
                else if (betType === '2h_under05') won = shTotal < 0.5;
                else if (betType === '2h_over15') won = shTotal > 1.5;
                else if (betType === '2h_under15') won = shTotal < 1.5;
                else if (betType === '2h_btts_yes') won = shGoals.home > 0 && shGoals.away > 0;
                else if (betType === '2h_btts_no') won = !(shGoals.home > 0 && shGoals.away > 0);
                return { won, reason: `2H: ${shGoals.home}-${shGoals.away}` };
            }
            
            // Default: check if bet type contains goal-related keywords
            if (betType.includes('home_over')) {
                const threshold = parseFloat(betType.match(/[\d.]+/)?.[0] || '0.5');
                won = goals.home > threshold;
                return { won, reason: `Home ${goals.home} goals vs ${threshold}` };
            }
            if (betType.includes('home_under')) {
                const threshold = parseFloat(betType.match(/[\d.]+/)?.[0] || '0.5');
                won = goals.home < threshold;
                return { won, reason: `Home ${goals.home} goals vs ${threshold}` };
            }
            if (betType.includes('away_over')) {
                const threshold = parseFloat(betType.match(/[\d.]+/)?.[0] || '0.5');
                won = goals.away > threshold;
                return { won, reason: `Away ${goals.away} goals vs ${threshold}` };
            }
            if (betType.includes('away_under')) {
                const threshold = parseFloat(betType.match(/[\d.]+/)?.[0] || '0.5');
                won = goals.away < threshold;
                return { won, reason: `Away ${goals.away} goals vs ${threshold}` };
            }
            
            return null; // Cannot determine
        }
        
        async function autoSettleBets() {
            const activeBets = allBets.filter(b => b.status === 'active' && !settledBets.has(b.id));
            if (activeBets.length === 0) return;
            
            console.log(`🔍 Checking ${activeBets.length} active bets for settlement...`);
            
            for (const bet of activeBets) {
                if (!bet.fixture_id) continue;
                
                try {
                    const match = await getMatchDetails(bet.fixture_id);
                    if (!match) continue;
                    
                    // Only settle finished matches
                    if (match.status !== 'finished') continue;
                    
                    let result;
                    if (bet.bet_type === 'accumulator' && bet.selections) {
                        // Accumulator settlement
                        let allWon = true;
                        let selectionResults = [];
                        
                        for (const sel of bet.selections) {
                            const selMatch = await getMatchDetails(sel.fixtureId);
                            if (selMatch && selMatch.status === 'finished') {
                                const selResult = determineBetResult({ bet_type: sel.betType }, selMatch);
                                if (selResult) {
                                    selectionResults.push({ ...sel, won: selResult.won, reason: selResult.reason });
                                    if (!selResult.won) allWon = false;
                                } else {
                                    allWon = false;
                                }
                            } else {
                                allWon = false; // Match not finished yet
                                break;
                            }
                        }
                        
                        if (selectionResults.length === bet.selections.length) {
                            result = { won: allWon, reason: `Acca: ${allWon ? 'ALL WON' : 'At least one lost'}` };
                        }
                    } else {
                        // Single bet settlement
                        result = determineBetResult(bet, match);
                    }
                    
                    if (result) {
                        await settleBet(bet, result);
                        settledBets.add(bet.id);
                    }
                } catch(e) {
                    console.error(`Settle error for bet ${bet.id}:`, e);
                }
            }
        }
        
        async function settleBet(bet, result) {
            const newStatus = result.won ? 'won' : 'lost';
            const payout = result.won ? (bet.amount * bet.odds) : 0;
            const profit = result.won ? (payout - bet.amount) : -bet.amount;
            
            console.log(`⚖️ Settling bet ${bet.id}: ${newStatus.toUpperCase()} - ${result.reason}`);
            
            try {
                const { error } = await supabaseClient
                    .from('bets')
                    .update({
                        status: newStatus,
                        payout: payout,
                        settlement_reason: result.reason,
                        settled_at: new Date().toISOString(),
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', bet.id)
                    .eq('status', 'active');
                
                if (error) throw error;
                
                // Credit winnings to wallet
                if (result.won && payout > 0) {
                    await updateWalletBalance(bet.user_id, payout);
                }
                
                // Update local data
                bet.status = newStatus;
                bet.payout = payout;
                bet.settlement_reason = result.reason;
                bet.settled_at = new Date().toISOString();
                
                showNotification(
                    `${result.won ? '🏆' : '❌'} Bet ${result.won ? 'WON' : 'LOST'}: ${escapeHtml(bet.match_name || 'Match')} - ${result.won ? '+' : '-'}$${Math.abs(profit).toFixed(2)}`,
                    result.won ? 'success' : 'error'
                );
                
                await loadBalance();
                updateStats();
                updateCounts();
                filterBets(currentFilter);
                
            } catch(e) {
                console.error('Settlement error:', e);
            }
        }
        
        // ===== CANCEL BET =====
        async function cancelBet(betId) {
            const bet = allBets.find(b => b.id === betId);
            if (!bet || bet.status !== 'active') {
                showNotification('❌ Cannot cancel this bet', 'error');
                return;
            }
            
            if (settledBets.has(betId)) {
                showNotification('❌ This bet has been processed', 'error');
                return;
            }
            
            // Check if match has started
            let matchStarted = false;
            if (bet.fixture_id) {
                const match = await getMatchDetails(bet.fixture_id);
                if (match) {
                    const now = new Date();
                    const kickoff = new Date(match.start_time);
                    matchStarted = match.status === 'live' || match.status === 'finished' || kickoff < now;
                }
            }
            
            if (matchStarted) {
                showNotification('❌ Cannot cancel - Match has started! Use Cash Out instead.', 'error');
                return;
            }
            
            const feePercent = 5;
            const refundAmount = bet.amount * (1 - feePercent / 100);
            const fee = bet.amount - refundAmount;
            
            if (!confirm(`Cancel this bet?\n\nStake: $${bet.amount.toFixed(2)}\nRefund: $${refundAmount.toFixed(2)}\nFee (${feePercent}%): $${fee.toFixed(2)}`)) return;
            
            try {
                const { error } = await supabaseClient
                    .from('bets')
                    .update({
                        status: 'cancelled',
                        cancellation_fee: fee,
                        refund_amount: refundAmount,
                        cancelled_at: new Date().toISOString(),
                        settlement_reason: `Cancelled before match - ${feePercent}% fee`,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', betId)
                    .eq('status', 'active');
                
                if (error) throw error;
                
                settledBets.add(betId);
                await updateWalletBalance(bet.user_id, refundAmount);
                
                bet.status = 'cancelled';
                showNotification(`✅ Cancelled! Refunded: $${refundAmount.toFixed(2)}`, 'success');
                await loadBalance();
                updateStats();
                updateCounts();
                filterBets(currentFilter);
                
            } catch(e) {
                showNotification(`Error: ${e.message}`, 'error');
            }
        }
        
        // ===== CASHOUT BET =====
        async function cashoutBet(betId) {
            const bet = allBets.find(b => b.id === betId);
            if (!bet || bet.status !== 'active') {
                showNotification('❌ Cannot cash out this bet', 'error');
                return;
            }
            
            if (settledBets.has(betId)) {
                showNotification('❌ This bet has been processed', 'error');
                return;
            }
            
            // Check if match is live
            let matchLive = false;
            let elapsed = 0;
            let score = { home: 0, away: 0 };
            
            if (bet.fixture_id) {
                const match = await getMatchDetails(bet.fixture_id);
                if (match) {
                    matchLive = match.status === 'live';
                    elapsed = match.elapsed || 0;
                    score = { home: match.goals_home || 0, away: match.goals_away || 0 };
                }
            }
            
            if (!matchLive) {
                showNotification('❌ Cash Out only available during live matches', 'error');
                return;
            }
            
            let cashoutPercent = 0.7;
            if (elapsed < 30) cashoutPercent = 0.85;
            else if (elapsed < 60) cashoutPercent = 0.75;
            else cashoutPercent = 0.65;
            
            const cashoutValue = bet.amount * bet.odds * cashoutPercent;
            const fee = (bet.amount * bet.odds) - cashoutValue;
            
            if (!confirm(`Cash Out?\n\nStake: $${bet.amount.toFixed(2)} @ ${bet.odds}\nCash Out: $${cashoutValue.toFixed(2)}\nFee: $${fee.toFixed(2)}\nMatch: ${elapsed}' ${score.home}-${score.away}`)) return;
            
            try {
                const { error } = await supabaseClient
                    .from('bets')
                    .update({
                        status: 'cashed-out',
                        cashout_amount: cashoutValue,
                        cashout_fee: fee,
                        cashed_out_at: new Date().toISOString(),
                        settlement_reason: `Cashed out at ${elapsed}' - Score: ${score.home}-${score.away}`,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', betId)
                    .eq('status', 'active');
                
                if (error) throw error;
                
                settledBets.add(betId);
                await updateWalletBalance(bet.user_id, cashoutValue);
                
                bet.status = 'cashed-out';
                showNotification(`✅ Cashed Out! Received: $${cashoutValue.toFixed(2)}`, 'success');
                await loadBalance();
                updateStats();
                updateCounts();
                filterBets(currentFilter);
                
            } catch(e) {
                showNotification(`Error: ${e.message}`, 'error');
            }
        }

                    .select('*')
                    .eq('user_id', user.uid)
                    .order('placed_at', { ascending: false });
                
                if (error) throw error;
                
                allBets = data || [];
                
                // Enrich with match data
                const matchCache = {};
                for (let bet of allBets) {
                    if (bet.fixture_id) {
                        if (!matchCache[bet.fixture_id]) {
                            matchCache[bet.fixture_id] = await getMatchDetails(bet.fixture_id);
                        }
                        const match = matchCache[bet.fixture_id];
                        if (match) {
                            bet._match = match;
                            bet.match_name = `${match.home_team?.name || 'Home'} vs ${match.away_team?.name || 'Away'}`;
                            bet._homeTeam = match.home_team;
                            bet._awayTeam = match.away_team;
                            bet._league = match.league_name;
                            bet._kickoff = match.start_time;
                            bet._matchStatus = match.status;
                            bet._elapsed = match.elapsed;
                            bet._score = { home: match.goals_home || 0, away: match.goals_away || 0 };
                        }
                    }
                    if (!bet.match_name) bet.match_name = `Match #${bet.fixture_id || 'N/A'}`;
                }
                
                updateStats();
                updateCounts();
                filterBets(currentFilter);
                startSettlementTimers();
                
                // Auto-settle check
                await autoSettleBets();
                
            } catch(e) {
                console.error('Load error:', e);
                document.getElementById('bet-list-container').innerHTML = 
                    `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading bets</p><small>${escapeHtml(e.message)}</small></div>`;
            }
        }
        
        function startSettlementTimers() {
            settlementTimers.forEach(clearInterval);
            settlementTimers = [];
            
            allBets.filter(b => b.status === 'active').forEach(bet => {
                const timerEl = document.getElementById(`timer-${bet.id}`);
                if (!timerEl) return;
                
                const updateTimer = () => {
                    const kickoff = bet._kickoff ? new Date(bet._kickoff) : null;
                    if (!kickoff) {
                        timerEl.textContent = 'TBD';
                        return;
                    }
                    
                    const estimatedEnd = new Date(kickoff.getTime() + 115 * 60000);
                    const now = new Date();
                    const diff = estimatedEnd - now;
                    
                    if (diff <= 0) {
                        timerEl.innerHTML = '<span style="color:#4caf50;">Settling...</span>';
                    } else {
                        const h = Math.floor(diff / 3600000);
                        const m = Math.floor((diff % 3600000) / 60000);
                        timerEl.textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
                        if (m < 10 && h === 0) timerEl.classList.add('urgent');
                    }
                };
                
                updateTimer();
                settlementTimers.push(setInterval(updateTimer, 60000));
            });
        }
        
        function formatBetTypeName(betType) {
            const names = {
                'home': '🏠 Home Win', 'draw': '🤝 Draw', 'away': '✈️ Away Win',
                '1X': 'Home or Draw', '12': 'Home or Away', 'X2': 'Draw or Away',
                'home_dnb': 'Home DNB', 'away_dnb': 'Away DNB',
                'over25': 'Over 2.5', 'under25': 'Under 2.5',
                'over15': 'Over 1.5', 'under15': 'Under 1.5',
                'over35': 'Over 3.5', 'under35': 'Under 3.5',
                'btts_yes': 'BTTS Yes', 'btts_no': 'BTTS No',
                'accumulator': 'Accumulator'
            };
            return names[betType] || betType.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        }
        
        function updateStats() {
            const total = allBets.length;
            const won = allBets.filter(b => b.status === 'won');
            const lost = allBets.filter(b => b.status === 'lost');
            const active = allBets.filter(b => b.status === 'active');
            
            let wonAmt = 0, lostAmt = 0, netProfit = 0;
            
            won.forEach(b => { wonAmt += parseFloat(b.payout || b.potential_win || 0); netProfit += parseFloat(b.payout || b.potential_win || 0) - parseFloat(b.amount || 0); });
            lost.forEach(b => { lostAmt += parseFloat(b.amount || 0); netProfit -= parseFloat(b.amount || 0); });
            allBets.filter(b => b.status === 'cashed-out').forEach(b => { netProfit += parseFloat(b.cashout_amount || 0) - parseFloat(b.amount || 0); });
            
            const winRate = (won.length + lost.length) > 0 ? ((won.length / (won.length + lost.length)) * 100).toFixed(1) : 0;
            
            document.getElementById('total-bets').textContent = total;
            document.getElementById('total-won').textContent = won.length;
            document.getElementById('total-lost').textContent = lost.length;
            document.getElementById('total-active').textContent = active.length;
            document.getElementById('won-amount').textContent = `$${wonAmt.toFixed(2)}`;
            document.getElementById('lost-amount').textContent = `$${lostAmt.toFixed(2)}`;
            document.getElementById('win-rate-display').textContent = `${winRate}%`;
            document.getElementById('win-rate-fill').style.width = `${winRate}%`;
            
            const plEl = document.getElementById('total-pl');
            plEl.textContent = (netProfit >= 0 ? '+' : '') + '$' + netProfit.toFixed(2);
            plEl.style.color = netProfit >= 0 ? '#4caf50' : 'var(--red)';
        }
        
        function updateCounts() {
            const counts = {
                all: allBets.length,
                active: allBets.filter(b => b.status === 'active').length,
                won: allBets.filter(b => b.status === 'won').length,
                lost: allBets.filter(b => b.status === 'lost').length,
                cancelled: allBets.filter(b => b.status === 'cancelled').length,
                'cashed-out': allBets.filter(b => b.status === 'cashed-out').length
            };
            
            for (const [key, val] of Object.entries(counts)) {
                const el = document.getElementById(`cnt-${key}`);
                if (el) el.textContent = val;
            }
        }
        
        function filterBets(filter) {
            currentFilter = filter;
            let filtered = allBets;
            
            if (filter !== 'all') {
                filtered = allBets.filter(b => b.status === filter);
            }
            
            const container = document.getElementById('bet-list-container');
            
            if (!filtered.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-ticket-alt"></i>
                        <p>No ${filter === 'all' ? '' : filter} bets found</p>
                        <small>Place bets from live or upcoming matches</small>
                    </div>`;
                return;
            }
            
            container.innerHTML = filtered.map(b => createBetCard(b)).join('');
            startSettlementTimers();
        }
        
        function createBetCard(bet) {
            const isAcc = bet.bet_type === 'accumulator';
            const amount = parseFloat(bet.amount || 0);
            const odds = parseFloat(bet.odds || 2);
            const payout = parseFloat(bet.payout || bet.potential_win || 0);
            const profit = bet.status === 'won' ? payout - amount : (bet.status === 'lost' ? -amount : 
                           bet.status === 'cashed-out' ? (parseFloat(bet.cashout_amount || 0) - amount) : 0);
            const ticket = 'XL' + (bet.id?.toString().slice(-8) || '00000000').toUpperCase();
            const placed = bet.placed_at ? new Date(bet.placed_at) : new Date();
            
            const isActive = bet.status === 'active';
            const matchStarted = bet._matchStatus === 'live' || bet._matchStatus === 'finished' || 
                                (bet._kickoff && new Date(bet._kickoff) < new Date());
            const canCancel = isActive && !matchStarted && !settledBets.has(bet.id);
            const canCashout = isActive && bet._matchStatus === 'live' && !settledBets.has(bet.id);
            
            const homeTeam = bet._homeTeam || { name: 'Home', logo: '' };
            const awayTeam = bet._awayTeam || { name: 'Away', logo: '' };
            const homeLogo = homeTeam.logo || `https://ui-avatars.com/api/?name=${encodeURIComponent(homeTeam.name?.substring(0,2) || 'H')}&size=32&background=1a2332&color=00ff9d`;
            const awayLogo = awayTeam.logo || `https://ui-avatars.com/api/?name=${encodeURIComponent(awayTeam.name?.substring(0,2) || 'A')}&size=32&background=1a2332&color=ff9800`;
            
            let selectionsHtml = '';
            if (isAcc && bet.selections?.length > 0) {
                selectionsHtml = `
                    <div class="selections-container">
                        <div style="font-size:10px;color:var(--text2);margin-bottom:5px;">📋 ${bet.selections.length} Selections</div>
                        ${bet.selections.map(s => `
                            <div class="selection-item">
                                <span class="selection-match">${escapeHtml(s.matchName)}</span>
                                <span class="selection-pick">${escapeHtml(s.betTypeName)}</span>
                                <span class="selection-odds">@${s.odds}</span>
                            </div>
                        `).join('')}
                    </div>`;
            }
            
            const scoreDisplay = bet._score ? 
                `<span class="bet-score-display">${bet._score.home} - ${bet._score.away}</span>` : '';
            
            return `
                <div class="bet-card ${bet.status}" onclick="showDetails('${bet.id}')">
                    <div class="bet-top">
                        <div>
                            <span class="bet-type-tag ${isAcc ? 'accumulator' : 'single'}">${isAcc ? 'ACCUMULATOR' : 'SINGLE'}</span>
                            <span class="bet-ticket-num">#${ticket}</span>
                        </div>
                        <span class="bet-status-badge ${bet.status}">
                            ${bet.status === 'won' ? '🏆 WON' : 
                              bet.status === 'lost' ? '❌ LOST' : 
                              bet.status === 'cancelled' ? '⛔ CANCELLED' : 
                              bet.status === 'cashed-out' ? '💰 CASHED OUT' : 
                              '⏳ ACTIVE'}
                        </span>
                    </div>
                    <div class="bet-body">
                        <div class="bet-match-row">
                            <img class="team-logo-small" src="${homeLogo}" onerror="this.style.display='none'" alt="">
                            <div class="bet-match-name">
                                ${escapeHtml(homeTeam.name || 'Home')} 
                                <span style="color:var(--text2);">vs</span> 
                                ${escapeHtml(awayTeam.name || 'Away')}
                                ${scoreDisplay}
                            </div>
                            <img class="team-logo-small" src="${awayLogo}" onerror="this.style.display='none'" alt="">
                        </div>
                        <div class="bet-league">${escapeHtml(bet._league || '')} ${bet._elapsed ? `| ${bet._elapsed}'` : ''}</div>
                        <div class="bet-pick">
                            ${escapeHtml(formatBetTypeName(bet.bet_type))} 
                            <span class="bet-odds">@${odds.toFixed(2)}</span>
                        </div>
                    </div>
                    ${selectionsHtml}
                    <div class="bet-details-grid">
                        <div class="bet-detail"><div class="lbl">Stake</div><div class="val">$${amount.toFixed(2)}</div></div>
                        <div class="bet-detail"><div class="lbl">${isActive ? 'Potential' : 'Payout'}</div><div class="val" style="color:${bet.status === 'won' ? '#4caf50' : bet.status === 'lost' ? 'var(--red)' : '#fff'}">$${payout.toFixed(2)}</div></div>
                        <div class="bet-detail"><div class="lbl">P/L</div><div class="val" style="color:${profit >= 0 ? '#4caf50' : 'var(--red)'}">${profit >= 0 ? '+' : ''}$${Math.abs(profit).toFixed(2)}</div></div>
                        ${isActive ? `<div class="bet-detail"><div class="lbl">Est. Settlement</div><div class="val"><span class="settlement-timer" id="timer-${bet.id}">Calculating...</span></div></div>` : ''}
                    </div>
                    ${bet.settlement_reason ? `<div class="bet-result-row ${bet.status}"><i class="fas fa-gavel"></i> ${escapeHtml(bet.settlement_reason)}</div>` : ''}
                    <div class="bet-timestamps">
                        <span><i class="far fa-calendar-alt"></i> ${placed.toLocaleString()}</span>
                        ${bet.settled_at ? `<span><i class="fas fa-check-double"></i> Settled: ${new Date(bet.settled_at).toLocaleString()}</span>` : ''}
                    </div>
                    ${isActive ? `
                        <div class="bet-actions">
                            ${canCancel ? `<button class="cancel-btn" onclick="event.stopPropagation();cancelBet('${bet.id}')"><i class="fas fa-ban"></i> Cancel</button>` : 
                              (isActive && matchStarted ? `<span style="font-size:10px;color:var(--text2);">Cannot cancel - match started</span>` : '')}
                            ${canCashout ? `<button class="cashout-btn" onclick="event.stopPropagation();cashoutBet('${bet.id}')"><i class="fas fa-money-bill-wave"></i> Cash Out</button>` : 
                              (isActive && !matchStarted ? `<span style="font-size:10px;color:var(--text2);">Cash out available when live</span>` : '')}
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        function showDetails(betId) {
            const bet = allBets.find(b => b.id === betId);
            if (!bet) return;
            
            const modal = document.getElementById('bet-modal');
            const body = document.getElementById('modal-body');
            const amount = parseFloat(bet.amount || 0);
            const payout = parseFloat(bet.payout || bet.potential_win || 0);
            const profit = bet.status === 'won' ? payout - amount : (bet.status === 'lost' ? -amount : 
                           bet.status === 'cashed-out' ? (parseFloat(bet.cashout_amount || 0) - amount) : 0);
            const ticket = 'XL' + (bet.id?.toString().slice(-8) || '00000000').toUpperCase();
            const placed = bet.placed_at ? new Date(bet.placed_at) : new Date();
            
            const homeTeam = bet._homeTeam || { name: 'Home', logo: '' };
            const awayTeam = bet._awayTeam || { name: 'Away', logo: '' };
            
            let selectionsHtml = '';
            if (bet.bet_type === 'accumulator' && bet.selections?.length > 0) {
                selectionsHtml = `
                    <div class="modal-section">
                        <h4><i class="fas fa-layer-group"></i> Accumulator Selections (${bet.selections.length})</h4>
                        ${bet.selections.map((s, i) => `
                            <div class="modal-row">
                                <span class="lbl">#${i+1}</span>
                                <span>${escapeHtml(s.matchName)} - ${escapeHtml(s.betTypeName)} @ ${s.odds}</span>
                            </div>
                        `).join('')}
                    </div>`;
            }
            
            body.innerHTML = `
                <div class="modal-section">
                    <h4><i class="fas fa-ticket-alt"></i> Ticket #${ticket}</h4>
                    <div class="modal-row"><span class="lbl">Type</span><span>${bet.bet_type === 'accumulator' ? 'Accumulator' : 'Single'}</span></div>
                    <div class="modal-row"><span class="lbl">Status</span><span>${bet.status?.toUpperCase()}</span></div>
                    <div class="modal-row"><span class="lbl">Match</span><span>${escapeHtml(homeTeam.name)} vs ${escapeHtml(awayTeam.name)}</span></div>
                    <div class="modal-row"><span class="lbl">League</span><span>${escapeHtml(bet._league || 'N/A')}</span></div>
                </div>
                
                <div class="modal-section">
                    <h4><i class="fas fa-info-circle"></i> Bet Details</h4>
                    <div class="modal-row"><span class="lbl">Pick</span><span>${escapeHtml(formatBetTypeName(bet.bet_type))}</span></div>
                    <div class="modal-row"><span class="lbl">Odds</span><span>${parseFloat(bet.odds || 2).toFixed(2)}</span></div>
                    <div class="modal-row"><span class="lbl">Placed</span><span>${placed.toLocaleString()}</span></div>
                    ${bet.settled_at ? `<div class="modal-row"><span class="lbl">Settled</span><span>${new Date(bet.settled_at).toLocaleString()}</span></div>` : ''}
                </div>
                
                ${selectionsHtml}
                
                <div class="modal-section">
                    <h4><i class="fas fa-chart-line"></i> Financial Summary</h4>
                    <div class="modal-row"><span class="lbl">Stake</span><span>$${amount.toFixed(2)}</span></div>
                    <div class="modal-row"><span class="lbl">Potential Win</span><span>$${parseFloat(bet.potential_win || 0).toFixed(2)}</span></div>
                    <div class="modal-row"><span class="lbl">Actual Payout</span><span>$${payout.toFixed(2)}</span></div>
                    <div class="modal-row"><span class="lbl">Profit/Loss</span><span style="color:${profit >= 0 ? '#4caf50' : 'var(--red)'}">${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}</span></div>
                    ${bet.cancellation_fee ? `<div class="modal-row"><span class="lbl">Cancel Fee</span><span>$${bet.cancellation_fee.toFixed(2)}</span></div>` : ''}
                    ${bet.refund_amount ? `<div class="modal-row"><span class="lbl">Refund</span><span>$${bet.refund_amount.toFixed(2)}</span></div>` : ''}
                    ${bet.cashout_amount ? `<div class="modal-row"><span class="lbl">Cash Out</span><span>$${bet.cashout_amount.toFixed(2)}</span></div>` : ''}
                </div>
                
                ${bet.settlement_reason ? `
                <div class="modal-section">
                    <h4><i class="fas fa-gavel"></i> Settlement</h4>
                    <div class="modal-row"><span class="lbl">Reason</span><span>${escapeHtml(bet.settlement_reason)}</span></div>
                </div>` : ''}
                
                <div class="modal-section">
                    <h4><i class="fas fa-headset"></i> Support</h4>
                    <div class="modal-row"><span class="lbl">Ticket</span><span><strong>${ticket}</strong></span></div>
                    <div class="modal-row"><span class="lbl">Email</span><span>support@xlodon.co.uk</span></div>
                </div>
            `;
            
            modal.classList.add('show');
        }
        
        function closeModal(event) {
            if (!event || event.target === document.getElementById('bet-modal')) {
                document.getElementById('bet-modal').classList.remove('show');
            }
        }
        
        function exportBetsToCSV() {
            if (!allBets.length) { alert('No bets to export'); return; }
            
            const headers = ['Ticket','Date','Type','Match','Pick','Odds','Stake','Payout','P/L','Status','Settlement'];
            const rows = allBets.map(b => {
                const amount = parseFloat(b.amount || 0);
                const payout = parseFloat(b.payout || b.potential_win || 0);
                const profit = b.status === 'won' ? payout - amount : (b.status === 'lost' ? -amount : 0);
                return [
                    'XL' + (b.id?.toString().slice(-8) || '00000000').toUpperCase(),
                    new Date(b.placed_at).toLocaleDateString(),
                    b.bet_type === 'accumulator' ? 'Acca' : 'Single',
                    b.match_name || '',
                    formatBetTypeName(b.bet_type),
                    parseFloat(b.odds || 2).toFixed(2),
                    amount.toFixed(2),
                    payout.toFixed(2),
                    (profit >= 0 ? '+' : '') + profit.toFixed(2),
                    b.status,
                    b.settlement_reason || ''
                ];
            });
            
            const csv = headers.join(',') + '\n' + rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `xlodon-bets-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
        }
        
        // ===== INITIALIZATION =====
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '../login.html';
                return;
            }
            
            await loadBalance();
            await loadBets();
            
            // Auto-refresh every 30s
            refreshInterval = setInterval(async () => {
                await loadBets();
                await loadBalance();
            }, 30000);
            
            // Auto-settle check every 60s
            settleInterval = setInterval(async () => {
                await autoSettleBets();
                await loadBalance();
            }, 60000);
        });
        
        // Filter chips
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                filterBets(this.dataset.filter);
            });
        });
        
        // Keyboard shortcut to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
        
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
            if (settleInterval) clearInterval(settleInterval);
            settlementTimers.forEach(clearInterval);
        });
        
        // Expose functions
        window.toggleLanguage = toggleLanguage;
        window.closeModal = closeModal;
        window.cancelBet = cancelBet;
        window.cashoutBet = cashoutBet;
        window.showDetails = showDetails;
        window.exportBetsToCSV = exportBetsToCSV;
        
        console.log('✅ My Bets v6.0 - AUTO-SETTLE SYSTEM READY');
        console.log('   - Automatic win/loss determination');
        console.log('   - Cancel: BEFORE match start only');
        console.log('   - Cash Out: DURING live match only');
        console.log('   - Team names & logos from API');
        console.log('   - Auto-refresh every 30s');
        console.log('   - Auto-settle check every 60s');
    </script>
</body>
</html>
